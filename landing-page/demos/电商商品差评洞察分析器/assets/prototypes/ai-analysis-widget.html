<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI分析进度 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 24px; color: #333; }
.widget-container { background: #fff; border-radius: 12px; padding: 28px; max-width: 640px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h3 { font-size: 16px; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
.progress-card { background: #f8faff; border: 1px solid #e0e8ff; border-radius: 10px; padding: 20px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.status-label { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: #4f7cff; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4f7cff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.progress-num { font-size: 13px; color: #666; }
.progress-bar-bg { width: 100%; height: 10px; background: #e8ecf0; border-radius: 5px; overflow: hidden; margin-bottom: 12px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4f7cff, #7ba3ff); border-radius: 5px; width: 68%; transition: width .3s; }
.progress-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.detail-item { text-align: center; }
.detail-value { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.detail-label { font-size: 11px; color: #888; margin-top: 2px; }
.progress-eta { margin-top: 14px; text-align: center; font-size: 12px; color: #888; }
.controls { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
.btn-secondary { background: #f0f2f5; color: #555; }
.btn-danger { background: #fff0f0; color: #e53e3e; }
.btn-primary { background: #4f7cff; color: #fff; }
.log-section { margin-top: 20px; }
.log-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555; }
.log-list { max-height: 140px; overflow-y: auto; font-size: 12px; color: #666; }
.log-item { padding: 4px 0; border-bottom: 1px solid #f5f5f5; display: flex; gap: 8px; }
.log-time { color: #aaa; white-space: nowrap; }
.log-ok { color: #38a169; }
.log-err { color: #e53e3e; }
</style>
</head>
<body>
<div class="widget-container">
  <h3>AI 分类分析进行中</h3>
  <p class="subtitle">正在调用大语言模型对差评进行智能分类，请勿关闭页面</p>

  <div class="progress-card">
    <div class="progress-top">
      <span class="status-label"><span class="status-dot"></span>分析中</span>
      <span class="progress-num">680 / 1,000 条</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="progress-details">
      <div class="detail-item">
        <div class="detail-value" style="color:#38a169">672</div>
        <div class="detail-label">已成功分类</div>
      </div>
      <div class="detail-item">
        <div class="detail-value" style="color:#e5a000">5</div>
        <div class="detail-label">建议人工复核</div>
      </div>
      <div class="detail-item">
        <div class="detail-value" style="color:#e53e3e">3</div>
        <div class="detail-label">分析失败</div>
      </div>
    </div>
    <div class="progress-eta">⏱ 预计剩余时间：<strong style="color:#333">约 1 分 42 秒</strong></div>
  </div>

  <div class="log-section">
    <div class="log-title">处理日志</div>
    <div class="log-list">
      <div class="log-item"><span class="log-time">14:32:18</span> <span class="log-ok">✓</span> 批次#68 完成（10条），平均置信度 92%</div>
      <div class="log-item"><span class="log-time">14:32:12</span> <span class="log-ok">✓</span> 批次#67 完成（10条），平均置信度 88%</div>
      <div class="log-item"><span class="log-time">14:32:08</span> <span class="log-err">⚠</span> 批次#66 中 1 条分析失败，已标记</div>
      <div class="log-item"><span class="log-time">14:32:01</span> <span class="log-ok">✓</span> 批次#65 完成（10条），平均置信度 95%</div>
      <div class="log-item"><span class="log-time">14:31:55</span> <span class="log-ok">✓</span> 批次#64 完成（10条），平均置信度 90%</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-danger">暂停分析</button>
    <button class="btn btn-primary" disabled>查看结果</button>
  </div>
</div>
</body>
</html>
