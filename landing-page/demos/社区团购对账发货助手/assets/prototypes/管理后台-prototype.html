<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>社区团购对账发货助手｜管理后台 SPA 原型</title>
<style>
:root{
  --primary:#2563eb;--primary-700:#1d4ed8;--success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--panel:#ffffff;--soft:#eff6ff;
  --nav:#0f172a;--nav-muted:#94a3b8;--shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--ink)}
a{color:inherit;text-decoration:none}.hidden{display:none!important}.sr-only{position:absolute;left:-9999px}.app{min-height:100vh}.login-shell{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eff6ff,#dcfce7)}
.login-card{width:min(420px,92vw);background:#fff;border:1px solid var(--line);border-radius:24px;padding:34px;box-shadow:var(--shadow)}.brand{display:flex;align-items:center;gap:12px}.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#22c55e);display:grid;place-items:center;color:#fff}.brand h1{font-size:20px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.login-card .field{margin-top:18px}.label{display:block;font-size:13px;color:#334155;margin-bottom:7px}.input,.select,.textarea{width:100%;height:40px;border:1px solid #cbd5e1;border-radius:10px;padding:0 12px;background:#fff;color:var(--ink);font-size:14px;outline:none;transition:.18s}.textarea{height:96px;padding:10px 12px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.btn{height:40px;border:1px solid #cbd5e1;border-radius:10px;padding:0 14px;background:#fff;color:#0f172a;font-weight:600;font-size:14px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{border-color:var(--primary);color:var(--primary);box-shadow:0 4px 12px rgba(15,23,42,.08)}.btn:focus{outline:3px solid rgba(37,99,235,.18)}.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn.primary:hover{background:var(--primary-700);color:#fff}.btn.success{background:var(--success);border-color:var(--success);color:#fff}.btn.danger{background:#fff;border-color:#fecaca;color:var(--danger)}.btn.sm{height:32px;padding:0 10px;font-size:12px}.btn[disabled]{opacity:.5;cursor:not-allowed}.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.icon-fill{fill:currentColor;stroke:none}
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}.sidebar{background:var(--nav);color:#fff;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}.side-head{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}.side-head .brand-mark{width:38px;height:38px}.side-head h2{font-size:16px;margin:0}.side-head small{color:var(--nav-muted)}.nav{padding:14px 10px;display:grid;gap:6px}.nav a{display:flex;align-items:center;gap:10px;color:var(--nav-muted);padding:11px 12px;border-radius:12px;font-size:14px;cursor:pointer;transition:.18s}.nav a:hover{background:rgba(255,255,255,.08);color:#fff}.nav a.active{background:#1e40af;color:#fff}.side-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);color:var(--nav-muted);font-size:12px}.main{min-width:0}.topbar{height:64px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px}.crumb{font-size:14px;color:var(--muted)}.crumb strong{color:var(--ink)}.top-actions{display:flex;align-items:center;gap:12px}.user-pill{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:#fff}.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#dcfce7);display:grid;place-items:center;color:var(--primary);font-weight:800}.content{padding:24px;max-width:1440px;margin:0 auto}.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.page-head h2{font-size:24px;margin:0 0 6px}.page-head p{margin:0;color:var(--muted);font-size:14px}.grid{display:grid;gap:16px}.grid.kpi{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.two{grid-template-columns:1.4fr .9fr}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.card-title h3{font-size:16px;margin:0}.muted{color:var(--muted)}.kpi-card{position:relative;overflow:hidden}.kpi-card:after{content:"";position:absolute;right:-22px;top:-22px;width:90px;height:90px;background:var(--soft);border-radius:50%}.kpi-label{color:var(--muted);font-size:13px}.kpi-value{font-size:28px;font-weight:800;margin:8px 0 4px}.kpi-trend{font-size:12px;color:var(--success)}.badge{display:inline-flex;align-items:center;gap:5px;height:24px;border-radius:999px;padding:0 9px;font-size:12px;font-weight:700}.badge.green{background:#dcfce7;color:#166534}.badge.red{background:#fee2e2;color:#991b1b}.badge.orange{background:#ffedd5;color:#9a3412}.badge.blue{background:#dbeafe;color:#1e40af}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.toolbar .input{max-width:220px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;min-width:850px}.table th{background:#f8fafc;color:#475569;text-align:left;font-weight:800;padding:12px;border-bottom:1px solid var(--line);white-space:nowrap}.table td{padding:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}.table tr:hover{background:#f8fafc}.table tr.selected{background:#eff6ff}.empty{padding:42px;text-align:center;color:var(--muted)}.progress{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#22c55e);border-radius:999px;transition:width .25s}.bars{display:flex;align-items:end;height:190px;gap:12px;padding:16px 8px 26px;border:1px solid var(--line);border-radius:14px;background:#fff}.bar{flex:1;background:linear-gradient(180deg,#60a5fa,#2563eb);border-radius:8px 8px 2px 2px;position:relative;min-height:18px}.bar:after{content:attr(data-label);position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}.detail-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden}.detail-item{display:grid;grid-template-columns:120px 1fr;border-bottom:1px solid #f1f5f9}.detail-item:nth-last-child(-n+2){border-bottom:0}.detail-item label{background:#f8fafc;padding:12px;color:var(--muted);font-size:13px}.detail-item div{padding:12px;font-size:13px}.timeline{display:grid;gap:12px}.time-row{display:grid;grid-template-columns:18px 1fr;gap:10px}.dot{width:10px;height:10px;border-radius:50%;background:var(--primary);margin-top:5px}.time-row p{margin:0;color:var(--muted);font-size:13px}.time-row strong{display:block;color:var(--ink);margin-bottom:2px}.modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:80;display:grid;place-items:center;padding:18px}.modal{width:min(560px,96vw);background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(15,23,42,.24);overflow:hidden}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head h3{margin:0;font-size:18px}.modal-body{padding:20px}.modal-foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}.toast-stack{position:fixed;right:20px;bottom:20px;display:grid;gap:10px;z-index:90}.toast{background:#0f172a;color:#fff;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);font-size:14px;min-width:240px}.export-progress{padding:16px;background:#f8fafc;border:1px solid var(--line);border-radius:14px}.checkbox-row{display:flex;gap:12px;flex-wrap:wrap}.check{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer}.check input{width:16px;height:16px}.route-hint{font-size:12px;color:var(--muted);background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;padding:10px;margin-top:14px}
@media(max-width:1024px){.shell{grid-template-columns:72px 1fr}.side-head h2,.side-head small,.nav span.label,.side-foot{display:none}.nav a{justify-content:center}.grid.kpi{grid-template-columns:repeat(2,1fr)}.grid.two,.grid.three{grid-template-columns:1fr}.detail-list{grid-template-columns:1fr}.detail-item:nth-last-child(-n+2){border-bottom:1px solid #f1f5f9}}@media(max-width:640px){.content{padding:14px}.topbar{padding:0 14px}.grid.kpi{grid-template-columns:1fr}.page-head{display:block}.toolbar{display:grid}.toolbar .input,.toolbar .select,.toolbar .btn{max-width:none;width:100%}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<div id="modal-root"></div>
<div id="toast-root" class="toast-stack"></div>
<script>
const icons={
  dashboard:'<svg class="icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10Z"/><path d="M13 21h8V3h-8v18Z"/><path d="M3 21h8v-6H3v6Z"/></svg>',
  orders:'<svg class="icon" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>',
  export:'<svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>',
  account:'<svg class="icon" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>',
  search:'<svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  eye:'<svg class="icon" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
  check:'<svg class="icon" viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"/></svg>',
  back:'<svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>',
  close:'<svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>'
};
const state={
  authed:true,
  filters:{q:'',batch:'全部批次',payment:'全部收款状态',pickup:'全部提货状态'},
  export:{running:false,progress:0,history:[{name:'全部订单数据_20260628.xlsx',time:'2026-06-28 14:40',status:'已完成'}]},
  account:{name:'王团长',phone:'138****8888',plan:'团长版',expire:'2026-12-31',location:'幸福小区3号楼一楼大厅',time:'18:00 - 20:00'},
  orders:[
    {id:'ORD-20260628-001',batch:'本周水果团购',buyer:'张三',phone:'138****1234',product:'苹果5斤',qty:1,price:25,amount:25,supplier:'水果张记',category:'水果',payment:'已收款',pickup:'已提货',method:'Excel导入',created:'2026-06-28 14:30'},
    {id:'ORD-20260628-002',batch:'本周水果团购',buyer:'李四',phone:'139****5678',product:'樱桃2斤',qty:1,price:60,amount:60,supplier:'水果张记',category:'水果',payment:'未收款',pickup:'已提货',method:'Excel导入',created:'2026-06-28 14:31'},
    {id:'ORD-20260628-003',batch:'本周水果团购',buyer:'王五',phone:'136****9012',product:'香蕉3斤',qty:2,price:15,amount:30,supplier:'水果张记',category:'水果',payment:'未收款',pickup:'待提货',method:'OCR导入',created:'2026-06-28 14:32'},
    {id:'ORD-20260628-004',batch:'本周水果团购',buyer:'赵六',phone:'135****3456',product:'芒果4斤',qty:1,price:45,amount:45,supplier:'水果张记',category:'水果',payment:'已收款',pickup:'已提货',method:'OCR导入',created:'2026-06-28 14:35'},
    {id:'ORD-20260628-005',batch:'本周水果团购',buyer:'钱七',phone:'137****7890',product:'葡萄2斤',qty:1,price:38,amount:38,supplier:'生鲜李叔',category:'水果',payment:'已收款',pickup:'待提货',method:'手动录入',created:'2026-06-28 14:38'},
    {id:'ORD-20260618-001',batch:'上周生鲜团购',buyer:'孙八',phone:'132****6666',product:'鸡蛋30枚',qty:1,price:32,amount:32,supplier:'生鲜李叔',category:'生鲜',payment:'已收款',pickup:'已提货',method:'Excel导入',created:'2026-06-18 09:12'},
    {id:'ORD-20260618-002',batch:'上周生鲜团购',buyer:'周九',phone:'131****7777',product:'牛奶12盒',qty:2,price:45,amount:90,supplier:'本地牧场',category:'乳品',payment:'已收款',pickup:'已提货',method:'Excel导入',created:'2026-06-18 09:18'}
  ]
};
function money(n){return '¥'+n.toLocaleString('zh-CN')}
function $(id){return document.getElementById(id)}
function route(){const h=location.hash || '#/dashboard'; const raw=h.startsWith('#') ? h.slice(1) : h; return raw.startsWith('/') ? raw : '/' + raw}
function go(path){location.hash=path}
function badge(text){const cls=text.includes('已收')||text.includes('已提')||text.includes('完成')?'green':text.includes('未收')?'red':text.includes('待')?'orange':'blue';return `<span class="badge ${cls}">${text}</span>`}
function toast(msg){const root=$('toast-root');const el=document.createElement('div');el.className='toast';el.textContent=msg;root.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(8px)';},2400);setTimeout(()=>el.remove(),2900)}
function openModal(html){$('modal-root').innerHTML=`<div class="modal-mask"><div class="modal">${html}</div></div>`}
function closeModal(){ $('modal-root').innerHTML='' }
function stats(){const total=state.orders.reduce((s,o)=>s+o.amount,0);const paid=state.orders.filter(o=>o.payment==='已收款').reduce((s,o)=>s+o.amount,0);const picked=state.orders.filter(o=>o.pickup==='已提货').length;return {count:state.orders.length,total,paid,unpaid:total-paid,payRate:Math.round(paid/total*100),pickupRate:Math.round(picked/state.orders.length*100)}}
function filteredOrders(){return state.orders.filter(o=>{
  const f=state.filters; const kw=f.q.trim();
  return (f.batch==='全部批次'||o.batch===f.batch) && (f.payment==='全部收款状态'||o.payment===f.payment) && (f.pickup==='全部提货状态'||o.pickup===f.pickup) && (!kw||[o.id,o.buyer,o.phone,o.product].some(v=>v.includes(kw)));
})}
function layout(content,title='工作台',desc=''){
  const r=route();
  return `<div class="shell"><aside class="sidebar"><div class="side-head"><div class="brand"><div class="brand-mark">${icons.dashboard}</div><div><h2>对账发货助手</h2><small>管理后台 SPA</small></div></div></div><nav class="nav">
    ${nav('/dashboard',icons.dashboard,'工作台',r)}${nav('/orders',icons.orders,'订单管理',r)}${nav('/export',icons.export,'数据导出',r)}${nav('/account',icons.account,'账户设置',r)}
  </nav><div class="side-foot">WEB端全站点单页应用<br>Hash Router · Unified Shell</div></aside><main class="main"><header class="topbar"><div class="crumb">首页 / <strong>${title}</strong></div><div class="top-actions"><button class="btn sm" onclick="openHelp()">操作说明</button><div class="user-pill"><div class="avatar">王</div><span>${state.account.name}</span></div></div></header><section class="content"><div class="page-head"><div><h2>${title}</h2>${desc?`<p>${desc}</p>`:''}</div></div>${content}<div class="route-hint">当前路由：<strong>${route()}</strong>；侧边栏与按钮均通过 hash 路由切换，不刷新页面。</div></section></main></div>`;
}
function nav(path,icon,label,r){const active=r===path|| (path==='/orders'&&r.startsWith('/orders/'));return `<a class="${active?'active':''}" href="#${path}">${icon}<span class="label">${label}</span></a>`}
function renderLogin(){return `<div class="login-shell"><div class="login-card"><div class="brand"><div class="brand-mark">${icons.dashboard}</div><div><h1>社区团购对账发货助手</h1><p>管理后台 · 全站点 SPA 原型</p></div></div><div class="field"><label class="label">登录方式</label><button class="btn primary" style="width:100%" onclick="state.authed=true;go('/dashboard')">微信扫码登录并进入工作台</button></div><p class="muted" style="font-size:13px;line-height:1.7;margin-top:16px">原型说明：登录成功后进入统一应用壳，可通过侧边栏、表格、详情页、导出页和账户页完成闭环交互。</p></div></div>`}
function renderDashboard(){const s=stats();return layout(`<div class="grid kpi"><div class="card kpi-card"><div class="kpi-label">订单总量</div><div class="kpi-value">${s.count}</div><div class="kpi-trend">当前样例数据</div></div><div class="card kpi-card"><div class="kpi-label">应收总额</div><div class="kpi-value">${money(s.total)}</div><div class="kpi-trend">含全部批次</div></div><div class="card kpi-card"><div class="kpi-label">已收金额</div><div class="kpi-value" style="color:var(--success)">${money(s.paid)}</div><div class="kpi-trend">收款率 ${s.payRate}%</div></div><div class="card kpi-card"><div class="kpi-label">未收金额</div><div class="kpi-value" style="color:var(--danger)">${money(s.unpaid)}</div><div class="kpi-trend" style="color:var(--danger)">${state.orders.filter(o=>o.payment==='未收款').length} 笔待处理</div></div></div>
  <div class="grid two" style="margin-top:16px"><div class="card"><div class="card-title"><h3>交易趋势</h3><span class="muted">近6个批次</span></div><div class="bars"><div class="bar" style="height:62%" data-label="第1批"></div><div class="bar" style="height:78%" data-label="第2批"></div><div class="bar" style="height:44%" data-label="第3批"></div><div class="bar" style="height:86%" data-label="第4批"></div><div class="bar" style="height:70%" data-label="第5批"></div><div class="bar" style="height:95%" data-label="本周"></div></div></div><div class="card"><div class="card-title"><h3>快捷操作</h3></div><div class="grid" style="gap:10px"><button class="btn primary" onclick="go('/orders')">${icons.orders}查看订单并处理状态</button><button class="btn" onclick="state.filters.payment='未收款';go('/orders')">筛选未收款订单</button><button class="btn" onclick="go('/export')">${icons.export}导出对账数据</button><button class="btn" onclick="go('/account')">维护提货地址</button></div></div></div>
  <div class="card" style="margin-top:16px"><div class="card-title"><h3>最近订单</h3><button class="btn sm" onclick="go('/orders')">查看全部</button></div>${ordersTable(state.orders.slice(0,5),true)}</div>`, '工作台','汇总对账、收款、提货与导出状态，作为管理后台入口。')}
function ordersTable(rows,compact=false){if(!rows.length)return '<div class="empty">未找到符合条件的订单，请调整筛选条件。</div>';return `<div class="table-wrap"><table class="table"><thead><tr><th>订单号</th><th>买家</th><th>商品</th><th>金额</th><th>收款</th><th>提货</th><th>批次</th><th>操作</th></tr></thead><tbody>${rows.map(o=>`<tr><td>${o.id}</td><td><strong>${o.buyer}</strong><br><span class="muted">${o.phone}</span></td><td>${o.product}<br><span class="muted">${o.supplier}</span></td><td>${money(o.amount)}</td><td>${badge(o.payment)}</td><td>${badge(o.pickup)}</td><td>${o.batch}</td><td><button class="btn sm" onclick="go('/orders/${o.id}')">${icons.eye}详情</button>${compact?'':` ${o.payment==='未收款'?`<button class="btn sm success" onclick="markPaid('${o.id}')">收款</button>`:''} ${o.pickup==='待提货'?`<button class="btn sm" onclick="markPicked('${o.id}')">提货</button>`:''}`}</td></tr>`).join('')}</tbody></table></div>`}
function renderOrders(){const rows=filteredOrders();return layout(`<div class="card"><div class="toolbar"><input class="input" placeholder="搜索姓名/手机号/商品/订单号" value="${state.filters.q}" oninput="state.filters.q=this.value;render()"><select class="select" onchange="state.filters.batch=this.value;render()">${opts(['全部批次','本周水果团购','上周生鲜团购'],state.filters.batch)}</select><select class="select" onchange="state.filters.payment=this.value;render()">${opts(['全部收款状态','已收款','未收款'],state.filters.payment)}</select><select class="select" onchange="state.filters.pickup=this.value;render()">${opts(['全部提货状态','已提货','待提货'],state.filters.pickup)}</select><button class="btn" onclick="resetFilters()">重置筛选</button><button class="btn primary" onclick="go('/export')">导出当前结果</button></div>${ordersTable(rows)}<p class="muted" style="font-size:13px;margin:12px 0 0">当前结果：${rows.length} 条。支持筛选、查看详情、标记收款、确认提货，操作后状态实时回写。</p></div>`, '订单管理','查看、筛选、处理所有批次订单，完成对账与提货状态闭环。')}
function opts(arr,val){return arr.map(x=>`<option ${x===val?'selected':''}>${x}</option>`).join('')}
function resetFilters(){state.filters={q:'',batch:'全部批次',payment:'全部收款状态',pickup:'全部提货状态'};render();toast('已重置筛选条件')}
function orderById(id){return state.orders.find(o=>o.id===id)}
function renderDetail(id){const o=orderById(id);if(!o)return layout('<div class="card empty">订单不存在。<br><button class="btn primary" onclick="go(\'/orders\')">返回订单列表</button></div>','订单详情');return layout(`<div class="card"><div class="card-title"><h3>${o.id}</h3><button class="btn sm" onclick="go('/orders')">${icons.back}返回列表</button></div><div class="detail-list">${item('买家姓名',o.buyer)}${item('手机号',o.phone)}${item('商品名称',o.product)}${item('数量/单价',`${o.qty} × ${money(o.price)}`)}${item('小计金额',`<strong style="color:var(--primary)">${money(o.amount)}</strong>`)}${item('供应商/品类',`${o.supplier} / ${o.category}`)}${item('收款状态',badge(o.payment))}${item('提货状态',badge(o.pickup))}${item('所属批次',o.batch)}${item('导入方式',o.method)}${item('创建时间',o.created)}${item('订单操作',`${o.payment==='未收款'?`<button class="btn sm success" onclick="markPaid('${o.id}')">标记已收款</button>`:'已完成收款'} ${o.pickup==='待提货'?`<button class="btn sm" onclick="markPicked('${o.id}')">确认已提货</button>`:'已完成提货'}`)}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><div class="card-title"><h3>业务状态</h3></div><div class="progress"><span style="width:${o.payment==='已收款'&&o.pickup==='已提货'?100:o.payment==='已收款'?66:33}%"></span></div><p class="muted" style="font-size:13px">订单导入 → 收款确认 → 提货确认，状态操作会实时同步到订单列表与工作台统计。</p></div><div class="card"><div class="card-title"><h3>处理记录</h3></div><div class="timeline"><div class="time-row"><span class="dot"></span><div><strong>订单导入</strong><p>${o.created} · ${o.method}</p></div></div><div class="time-row"><span class="dot" style="background:${o.payment==='已收款'?'var(--success)':'#cbd5e1'}"></span><div><strong>收款状态</strong><p>${o.payment}</p></div></div><div class="time-row"><span class="dot" style="background:${o.pickup==='已提货'?'var(--success)':'#cbd5e1'}"></span><div><strong>提货状态</strong><p>${o.pickup}</p></div></div></div></div></div>`, '订单详情','单笔订单全字段展示，支持回退、状态处理与闭环追踪。')}
function item(k,v){return `<div class="detail-item"><label>${k}</label><div>${v}</div></div>`}
function markPaid(id){const o=orderById(id);if(o){o.payment='已收款';toast(`${o.buyer} 已标记为已收款`);render()}}
function markPicked(id){const o=orderById(id);if(o){o.pickup='已提货';toast(`${o.buyer} 已确认提货`);render()}}
function renderExport(){return layout(`<div class="grid two"><div class="card"><div class="card-title"><h3>导出配置</h3></div><div class="grid" style="gap:14px"><div><label class="label">导出内容</label><div class="checkbox-row"><label class="check"><input type="checkbox" checked>订单明细</label><label class="check"><input type="checkbox" checked>对账记录</label><label class="check"><input type="checkbox">提货记录</label><label class="check"><input type="checkbox">统计报表</label></div></div><div class="toolbar" style="margin:0"><select class="select"><option>全部批次</option><option>本周水果团购</option><option>上周生鲜团购</option></select><input class="input" type="date" value="2026-06-01"><input class="input" type="date" value="2026-06-29"></div><button class="btn primary" ${state.export.running?'disabled':''} onclick="startExport()">开始生成 Excel</button>${state.export.running?`<div class="export-progress"><strong>正在生成导出文件...</strong><div class="progress" style="margin-top:10px"><span style="width:${state.export.progress}%"></span></div><p class="muted" style="margin-bottom:0">进度 ${state.export.progress}% · 生成完成后自动加入导出历史</p></div>`:''}</div></div><div class="card"><div class="card-title"><h3>导出说明</h3></div><p class="muted" style="line-height:1.8">导出功能覆盖订单数据、对账记录、提货记录与统计报表。1000条以内数据应在5秒内完成生成，生成后可从右侧历史中下载。</p><button class="btn" onclick="toast('已复制导出说明')">复制说明</button></div></div><div class="card" style="margin-top:16px"><div class="card-title"><h3>导出历史</h3></div><div class="table-wrap"><table class="table"><thead><tr><th>文件名</th><th>生成时间</th><th>状态</th><th>操作</th></tr></thead><tbody>${state.export.history.map(h=>`<tr><td>${h.name}</td><td>${h.time}</td><td>${badge(h.status)}</td><td><button class="btn sm" onclick="toast('原型中模拟下载：${h.name}')">下载</button></td></tr>`).join('')}</tbody></table></div></div>`, '数据导出','配置导出范围、生成Excel、查看导出历史，形成数据备份闭环。')}
function startExport(){state.export.running=true;state.export.progress=0;render();const timer=setInterval(()=>{state.export.progress+=20;if(state.export.progress>=100){clearInterval(timer);state.export.running=false;state.export.progress=100;state.export.history.unshift({name:'对账发货数据_'+new Date().toISOString().slice(0,10)+'.xlsx',time:new Date().toLocaleString('zh-CN',{hour12:false}),status:'已完成'});toast('导出文件已生成');}render();},350)}
function renderAccount(){const a=state.account;return layout(`<div class="grid two"><div class="card"><div class="card-title"><h3>基本信息</h3><button class="btn sm" onclick="saveAccount()">保存设置</button></div><div class="grid" style="gap:12px"><div><label class="label">团长昵称</label><input class="input" value="${a.name}" oninput="state.account.name=this.value"></div><div><label class="label">绑定手机号</label><input class="input" value="${a.phone}" oninput="state.account.phone=this.value"></div><div><label class="label">默认提货地点</label><input class="input" value="${a.location}" oninput="state.account.location=this.value"></div><div><label class="label">默认提货时间</label><input class="input" value="${a.time}" oninput="state.account.time=this.value"></div></div></div><div class="card"><div class="card-title"><h3>套餐与订阅</h3>${badge(a.plan)}</div><div style="border-radius:18px;padding:20px;background:linear-gradient(135deg,#2563eb,#22c55e);color:white"><div style="opacity:.82;font-size:13px">当前套餐</div><div style="font-size:30px;font-weight:900;margin:6px 0">${a.plan}</div><div>有效期至 ${a.expire} · 不限单量</div></div><div class="grid" style="gap:10px;margin-top:14px"><button class="btn primary" onclick="openUpgrade()">续费/升级套餐</button><button class="btn danger" onclick="logout()">退出登录</button></div></div></div><div class="card" style="margin-top:16px"><div class="card-title"><h3>使用额度</h3></div><div class="grid three"><div><div class="muted">本月处理订单</div><div class="kpi-value">128</div></div><div><div class="muted">免费版限制</div><div class="kpi-value">50</div></div><div><div class="muted">当前权益</div><div class="kpi-value" style="color:var(--success)">不限</div></div></div></div>`, '账户设置','维护团长信息、默认提货配置与订阅套餐。')}
function saveAccount(){toast('账户与提货设置已保存')}
function openUpgrade(){openModal(`<div class="modal-head"><h3>续费/升级套餐</h3><button class="btn sm" onclick="closeModal()">${icons.close}</button></div><div class="modal-body"><p class="muted">团长版 ¥29/月，不限单量，后续支持供应商协同。</p><label class="check"><input type="radio" checked name="plan">团长版 · ¥29/月</label><label class="check" style="margin-top:10px"><input type="radio" name="plan">免费版 · 每月50单</label></div><div class="modal-foot"><button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="state.account.plan='团长版';closeModal();render();toast('套餐设置已更新')">确认</button></div>`)}
function openHelp(){openModal(`<div class="modal-head"><h3>原型交互说明</h3><button class="btn sm" onclick="closeModal()">${icons.close}</button></div><div class="modal-body"><p class="muted" style="line-height:1.8">本文件是单文件 HTML 的 WEB端全站点 SPA 原型：统一应用壳固定不变，侧边栏通过 Hash Router 切换页面；订单列表支持筛选、详情跳转、状态回写；导出页支持进度与历史；账户页支持保存与套餐弹窗。</p></div><div class="modal-foot"><button class="btn primary" onclick="closeModal()">知道了</button></div>`)}
function logout(){state.authed=false;go('/login');toast('已退出登录')}
function render(){let r=route(); if(!state.authed||r==='/login'){ $('app').innerHTML=renderLogin(); return; } if(r==='/dashboard') $('app').innerHTML=renderDashboard(); else if(r==='/orders') $('app').innerHTML=renderOrders(); else if(r.startsWith('/orders/')) $('app').innerHTML=renderDetail(decodeURIComponent(r.split('/')[2])); else if(r==='/export') $('app').innerHTML=renderExport(); else if(r==='/account') $('app').innerHTML=renderAccount(); else {go('/dashboard');}}
window.addEventListener('hashchange',render); if(!location.hash) location.hash='/dashboard'; render();
</script>
</body>
</html>
