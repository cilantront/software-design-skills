<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多平台预览组件原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3FF;padding:32px;color:#312E81;}
.widget{max-width:800px;margin:0 auto;background:white;border-radius:16px;border:1px solid #E5E7EB;padding:32px;box-shadow:0 4px 12px rgba(99,102,241,0.08);}
.title{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.tabs{display:flex;gap:4px;background:#F3F4F6;padding:4px;border-radius:10px;margin-bottom:20px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;color:#6B7280;cursor:pointer;}
.tab.active{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.preview-phone{border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;}
.phone-header{padding:10px 14px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;font-size:11px;color:#6B7280;text-align:center;}
.phone-content{padding:14px;}
.phone-img{aspect-ratio:3/4;background:linear-gradient(135deg,#EEF2FF,#EDE9FE);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:11px;color:#6B7280;}
.phone-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.phone-body{font-size:11px;line-height:1.9;color:#374151;}
.phone-tags{margin-top:10px;font-size:10px;color:#6366F1;}
.preview-edit{border:1px solid #E5E7EB;border-radius:12px;padding:20px;}
.edit-section{margin-bottom:16px;}
.edit-label{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:6px;}
.edit-title{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;}
.edit-textarea{width:100%;min-height:140px;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.8;font-family:inherit;resize:vertical;}
.edit-title:focus,.edit-textarea:focus{outline:none;border-color:#6366F1;}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag-chip{font-size:11px;background:#EEF2FF;color:#6366F1;padding:3px 8px;border-radius:4px;}
</style>
</head>
<body>
<div class="widget">
  <div class="title">多平台预览<span style="font-size:12px;color:#6B7280;font-weight:400;">所见即所得 · 可在线编辑</span></div>
  <div class="tabs">
    <div class="tab active">📕 小红书</div>
    <div class="tab">🎵 抖音</div>
    <div class="tab">💬 公众号</div>
    <div class="tab">📺 B站</div>
    <div class="tab">🎬 视频号</div>
  </div>
  <div class="preview-grid">
    <div class="preview-phone">
      <div class="phone-header">小红书 · 发布预览</div>
      <div class="phone-content">
        <div class="phone-img">3:4 竖图<br>1080×1440</div>
        <div class="phone-title">🍂 秋季新品来啦！这件外套太绝了～</div>
        <div class="phone-body">姐妹们！今年秋天的第一件外套我必须安利这件！<br><br>✨ 面料超级柔软亲肤<br>✨ 版型微微oversize<br>✨ 焦糖棕超好看<br><br>学生党也能冲～</div>
        <div class="phone-tags">#秋季穿搭 #显瘦穿搭 #OOTD #新品推荐 ...</div>
      </div>
    </div>
    <div class="preview-edit">
      <div class="edit-section">
        <div class="edit-label">标题（≤20字）</div>
        <input type="text" class="edit-title" value="🍂 秋季新品来啦！这件外套太绝了～">
      </div>
      <div class="edit-section">
        <div class="edit-label">正文</div>
        <textarea class="edit-textarea">姐妹们！今年秋天的第一件外套我必须安利这件！

✨ 面料超级柔软亲肤，穿上一整天都不会觉得闷
✨ 版型是那种微微oversize的感觉，显瘦又时髦
✨ 配色是今年最火的焦糖棕，搭配什么内搭都好看

学生党也能冲～你们秋天最喜欢穿什么外套呀？</textarea>
      </div>
      <div class="edit-section">
        <div class="edit-label">标签（8/10）</div>
        <div class="tag-list">
          <span class="tag-chip">#秋季穿搭</span>
          <span class="tag-chip">#显瘦穿搭</span>
          <span class="tag-chip">#OOTD</span>
          <span class="tag-chip">#新品推荐</span>
          <span class="tag-chip">#焦糖色系</span>
          <span class="tag-chip">#学生党好物</span>
          <span class="tag-chip">#外套推荐</span>
          <span class="tag-chip">#每日穿搭</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
