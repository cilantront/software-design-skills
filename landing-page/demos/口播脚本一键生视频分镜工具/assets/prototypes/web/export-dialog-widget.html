<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>导出对话框组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: rgba(0,0,0,0.4); padding: 80px 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #fff; }
.dialog { max-width: 440px; background: #fff; border-radius: 16px; padding: 24px; margin: 0 auto; }
.dialog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.dialog-title { font-size: 16px; font-weight: 700; }
.close-btn { background: none; border: none; font-size: 18px; color: #999; cursor: pointer; }
.progress-info { background: #f0f2ff; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.progress-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
.progress-label { color: #333; font-weight: 600; }
.progress-value { color: #667eea; font-weight: 600; }
.progress-bar { height: 6px; background: #e0e5ff; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 65%; }
.file-list { list-style: none; }
.file-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.file-icon { font-size: 18px; }
.file-name { flex: 1; color: #333; }
.file-size { color: #999; font-size: 11px; }
.file-status { font-size: 11px; color: #4caf50; }
.dialog-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; }
.btn-outline { background: #fff; border: 1px solid #e0e0e0; color: #333; }
.btn-fill { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 600; }
</style>
</head>
<body>
<div class="widget-title">💬 导出对话框 Widget</div>
<div class="dialog">
  <div class="dialog-header">
    <div class="dialog-title">📥 正在导出分镜板</div>
    <button class="close-btn">✕</button>
  </div>
  <div class="progress-info">
    <div class="progress-row">
      <div class="progress-label">渲染中...</div>
      <div class="progress-value">65%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
  <ul class="file-list">
    <li class="file-item">
      <span class="file-icon">📱</span>
      <span class="file-name">分镜板_抖音_9x16.png</span>
      <span class="file-size">2.4 MB</span>
      <span class="file-status">✓ 完成</span>
    </li>
    <li class="file-item">
      <span class="file-icon">📺</span>
      <span class="file-name">分镜板_B站_16x9.png</span>
      <span class="file-size">1.8 MB</span>
      <span class="file-status" style="color:#f57c00;">⏳ 渲染中</span>
    </li>
    <li class="file-item" style="opacity:0.4;">
      <span class="file-icon">📑</span>
      <span class="file-name">分镜板_完整版.pdf</span>
      <span class="file-size">—</span>
      <span class="file-status" style="color:#999;">⏸ 等待</span>
    </li>
  </ul>
  <div class="dialog-footer">
    <button class="btn btn-outline">取消</button>
    <button class="btn btn-fill" disabled style="opacity:0.5;">等待完成...</button>
  </div>
</div>
</body>
</html>
