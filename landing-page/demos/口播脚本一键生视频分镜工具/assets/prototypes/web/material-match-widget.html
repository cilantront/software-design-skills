<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>素材匹配组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.material-widget { max-width: 640px; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.match-title { font-size: 15px; font-weight: 600; }
.match-progress { font-size: 13px; color: #667eea; font-weight: 600; }
.match-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
.match-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); }

.shot-row { display: flex; gap: 12px; padding: 12px; border: 1px solid #f0f0f0; border-radius: 10px; margin-bottom: 10px; }
.shot-info { flex: 1; }
.shot-num { font-size: 11px; font-weight: 700; color: #667eea; margin-bottom: 4px; }
.shot-desc { font-size: 12px; color: #333; line-height: 1.5; margin-bottom: 6px; }
.shot-source { font-size: 11px; color: #4caf50; }
.shot-source.pending { color: #f57c00; }
.material-preview { width: 100px; height: 100px; border-radius: 8px; background: linear-gradient(135deg, #f0f2ff, #e8eaff); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.material-preview.matching { background: linear-gradient(135deg, #fff3e0, #ffe0b2); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.replace-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #e0e0e0; background: #fff; font-size: 11px; cursor: pointer; color: #555; margin-top: 4px; }
.replace-btn:hover { border-color: #667eea; color: #667eea; }

.pro-badge { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="widget-title">🖼️ 素材匹配 Widget <span class="pro-badge">Pro</span></div>
<div class="material-widget">
  <div class="match-header">
    <div class="match-title">🔍 AI 素材匹配进度</div>
    <div class="match-progress">4/6 完成</div>
  </div>
  <div class="match-bar"><div class="match-fill" style="width:66%;"></div></div>

  <div class="shot-row">
    <div class="shot-info">
      <div class="shot-num">分镜 01</div>
      <div class="shot-desc">博主面对镜头微笑开场，背景明亮温暖</div>
      <div class="shot-source">✓ 素材库匹配</div>
      <button class="replace-btn">🔄 替换素材</button>
    </div>
    <div class="material-preview">🎬</div>
  </div>

  <div class="shot-row">
    <div class="shot-info">
      <div class="shot-num">分镜 02</div>
      <div class="shot-desc">特写：手持玻璃杯倒温水</div>
      <div class="shot-source">✓ AI 生成</div>
      <button class="replace-btn">🔄 替换素材</button>
    </div>
    <div class="material-preview">🥛</div>
  </div>

  <div class="shot-row">
    <div class="shot-info">
      <div class="shot-num">分镜 05</div>
      <div class="shot-desc">手在笔记本上书写计划</div>
      <div class="shot-source pending">⏳ 匹配中...</div>
    </div>
    <div class="material-preview matching">⏳</div>
  </div>

  <div class="shot-row">
    <div class="shot-info">
      <div class="shot-num">分镜 06</div>
      <div class="shot-desc">等待中</div>
      <div class="shot-source pending">⏸ 队列中</div>
    </div>
    <div class="material-preview" style="background:#f5f7fa;color:#ccc;">—</div>
  </div>
</div>
</body>
</html>
