<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录注册组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
.login-widget { max-width: 420px; background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.tabs { display: flex; border-bottom: 2px solid #f0f0f0; margin-bottom: 24px; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 15px; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
.form-input { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; }
.form-input:focus { outline: none; border-color: #667eea; }
.code-row { display: flex; gap: 8px; }
.code-row input { flex: 1; }
.code-btn { padding: 12px; background: #f0f2ff; border: none; border-radius: 10px; color: #667eea; font-size: 13px; cursor: pointer; white-space: nowrap; }
.submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.divider { display: flex; align-items: center; margin: 20px 0; color: #999; font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
.divider span { padding: 0 12px; }
.tp-row { display: flex; justify-content: center; gap: 16px; }
.tp-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
.tp-btn:hover { border-color: #667eea; }
.agreement { font-size: 12px; color: #999; text-align: center; margin-top: 16px; }
.agreement a { color: #667eea; text-decoration: none; }
</style>
</head>
<body>
<div class="widget-title">🔐 登录注册 Widget</div>
<div class="login-widget">
  <div class="tabs">
    <div class="tab active">验证码登录</div>
    <div class="tab">密码登录</div>
    <div class="tab">注册</div>
  </div>
  <div class="form-group">
    <label class="form-label">手机号</label>
    <input class="form-input" placeholder="请输入手机号" />
  </div>
  <div class="form-group">
    <label class="form-label">验证码</label>
    <div class="code-row">
      <input class="form-input" placeholder="6位验证码" />
      <button class="code-btn">获取验证码 (60s)</button>
    </div>
  </div>
  <button class="submit-btn">登 录</button>
  <div class="divider"><span>其他方式</span></div>
  <div class="tp-row">
    <div class="tp-btn" title="微信">💬</div>
    <div class="tp-btn" title="抖音">🎵</div>
  </div>
  <div class="agreement">登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></div>
</div>
</body>
</html>
