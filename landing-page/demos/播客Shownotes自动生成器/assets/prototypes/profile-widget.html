<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>个人中心 - Widget</title><style>*{box-sizing:border-box}body{margin:0;padding:24px;background:#0D0D1A;color:#E8E8F0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}.label{color:#8A8AA0;font-size:12px;margin-bottom:16px}.card{max-width:760px;margin:auto;background:#1A1A2E;border:1px solid #2A2A45;border-radius:16px;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:#121225;border:1px solid #2A2A45;border-radius:12px;padding:18px}.input{width:100%;background:#0D0D1A;border:1px solid #2A2A45;color:#E8E8F0;border-radius:10px;padding:11px;margin-top:8px}.btn{border:0;border-radius:10px;padding:10px 14px;margin-top:14px;cursor:pointer}.primary{background:linear-gradient(135deg,#7C5CFF,#4A9EFF);color:#fff}.danger{background:rgba(255,88,88,.12);color:#FF8888}.quota{height:8px;background:#0D0D1A;border-radius:99px;overflow:hidden;margin-top:12px}.fill{height:100%;width:35%;background:#7C5CFF}</style></head><body><div class="label">Widget: 个人中心（3.1.2）</div><div class="card"><h2>个人中心</h2><div class="grid"><div class="panel"><h3>个人资料</h3><label>昵称<input class="input" value="独立主播"></label><label>绑定手机<input class="input" value="138****8888" disabled></label><button class="btn primary" onclick="alert('资料已保存')">保存资料</button></div><div class="panel"><h3>订阅状态</h3><p>当前方案：免费版</p><p>本月剩余：3/3 期</p><div class="quota"><div class="fill"></div></div><button class="btn primary">升级专业版</button></div><div class="panel" style="grid-column:1/3"><h3 style="color:#FF8888">账号注销</h3><p style="color:#8A8AA0">注销后进入 30 天冷静期，期间可撤销。冷静期结束后永久删除用户资料、音频与 Shownotes。</p><button class="btn danger" onclick="confirm('确认申请注销账号？')">申请注销</button></div></div></div></body></html>
