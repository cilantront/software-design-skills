<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录/注册 - Widget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0D0D1A;
  color: #E8E8F0;
  padding: 24px;
  min-height: 100vh;
}
.widget-label {
  color: #8A8AA0;
  font-size: 12px;
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.login-card {
  background: #1A1A2E;
  border: 1px solid #2A2A45;
  border-radius: 16px;
  padding: 40px;
  max-width: 420px;
  margin: 0 auto;
  box-shadow: 0 20px 60px rgba(124, 92, 255, 0.08);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.brand-logo {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #7C5CFF, #4A9EFF);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.brand-name { font-size: 18px; font-weight: 600; }
.brand-sub { font-size: 12px; color: #8A8AA0; }
.title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.subtitle { color: #8A8AA0; font-size: 14px; margin-bottom: 28px; }
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 13px;
  color: #A0A0B8;
  margin-bottom: 8px;
}
.input-with-btn { display: flex; gap: 8px; }
.input {
  flex: 1;
  background: #0D0D1A;
  border: 1px solid #2A2A45;
  border-radius: 10px;
  padding: 12px 14px;
  color: #E8E8F0;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.input:focus { border-color: #7C5CFF; }
.input::placeholder { color: #555568; }
.code-btn {
  background: transparent;
  border: 1px solid #7C5CFF;
  color: #7C5CFF;
  padding: 0 16px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.code-btn:hover { background: rgba(124, 92, 255, 0.1); }
.code-btn.countdown { color: #555568; border-color: #2A2A45; cursor: not-allowed; }
.submit-btn {
  width: 100%;
  background: linear-gradient(135deg, #7C5CFF, #4A9EFF);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  transition: transform .1s;
}
.submit-btn:hover { transform: translateY(-1px); }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0;
  color: #555568; font-size: 12px;
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px; background: #2A2A45;
}
.wechat-btn {
  width: 100%;
  background: #07C160;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.wechat-btn:hover { background: #06AD56; }
.footer-links {
  margin-top: 24px;
  text-align: center;
  font-size: 12px;
  color: #555568;
}
.footer-links a { color: #7C5CFF; text-decoration: none; margin: 0 6px; }
.footer-links a:hover { text-decoration: underline; }
.error-hint {
  background: rgba(255, 88, 88, 0.08);
  border: 1px solid rgba(255, 88, 88, 0.3);
  color: #FF8888;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
</style>
</head>
<body>

<div class="widget-label">Widget: 登录/注册表单（3.1.1）</div>

<div class="login-card">
  <div class="brand">
    <div class="brand-logo">🎙️</div>
    <div>
      <div class="brand-name">PodNotes</div>
      <div class="brand-sub">播客 Shownotes 自动生成器</div>
    </div>
  </div>

  <div class="title">登录 / 注册</div>
  <div class="subtitle">使用手机号快速登录，新用户自动注册</div>

  <div class="error-hint" id="error">请输入正确的 11 位手机号</div>

  <form onsubmit="return handleSubmit(event)">
    <div class="form-group">
      <label class="form-label">手机号</label>
      <input class="input" type="tel" id="phone" placeholder="请输入 11 位手机号" maxlength="11">
    </div>

    <div class="form-group">
      <label class="form-label">验证码</label>
      <div class="input-with-btn">
        <input class="input" type="text" id="code" placeholder="6 位验证码" maxlength="6">
        <button type="button" class="code-btn" id="codeBtn" onclick="sendCode()">获取验证码</button>
      </div>
    </div>

    <button type="submit" class="submit-btn">登录 / 注册</button>
  </form>

  <div class="divider">或</div>

  <button class="wechat-btn" onclick="alert('微信登录（P1 预留）')">
    <span style="font-size:18px">💬</span>
    <span>微信扫码登录</span>
  </button>

  <div class="footer-links">
    登录即表示同意
    <a href="#">用户协议</a>
    与
    <a href="#">隐私政策</a>
  </div>
</div>

<script>
let countdown = 0;
function sendCode() {
  const phone = document.getElementById('phone').value;
  const err = document.getElementById('error');
  if (!/^1\d{10}$/.test(phone)) {
    err.style.display = 'block';
    err.textContent = '请输入正确的 11 位手机号';
    return;
  }
  err.style.display = 'none';
  const btn = document.getElementById('codeBtn');
  countdown = 60;
  btn.classList.add('countdown');
  const timer = setInterval(() => {
    countdown--;
    btn.textContent = `${countdown}s`;
    if (countdown <= 0) {
      clearInterval(timer);
      btn.classList.remove('countdown');
      btn.textContent = '获取验证码';
    }
  }, 1000);
}
function handleSubmit(e) {
  e.preventDefault();
  const phone = document.getElementById('phone').value;
  const code = document.getElementById('code').value;
  const err = document.getElementById('error');
  if (!/^1\d{10}$/.test(phone)) {
    err.style.display = 'block';
    err.textContent = '请输入正确的 11 位手机号';
    return false;
  }
  if (!/^\d{6}$/.test(code)) {
    err.style.display = 'block';
    err.textContent = '请输入 6 位数字验证码';
    return false;
  }
  err.style.display = 'none';
  alert('登录成功，跳转工作台…');
  return false;
}
</script>
</body>
</html>
