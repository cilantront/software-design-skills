<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>活动列表 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; padding: 20px; background: #f5f5f5; }
h2 { font-size: 16px; margin-bottom: 15px; color: #333; }
.widget-container { background: #fff; border-radius: 12px; padding: 20px; max-width: 500px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
.widget-title { font-size: 16px; font-weight: 600; color: #333; }
.create-btn { padding: 6px 12px; background: #07c160; color: #fff; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }

.filter-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.filter-tab { padding: 6px 14px; background: #f5f5f5; border-radius: 15px; font-size: 12px; color: #666; cursor: pointer; }
.filter-tab.active { background: #07c160; color: #fff; }
.filter-count { margin-left: 3px; font-size: 10px; }

.activity-card { border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
.activity-card:hover { border-color: #07c160; box-shadow: 0 2px 8px rgba(7,193,96,0.15); }
.activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.activity-name { font-size: 14px; font-weight: 600; color: #333; }
.activity-status { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
.status-pending { background: #f0f0f0; color: #666; }
.status-active { background: #e6f7ff; color: #1890ff; }
.status-done { background: #f6ffed; color: #52c41a; }
.activity-info { display: flex; gap: 10px; font-size: 12px; color: #999; margin-bottom: 8px; }
.activity-stats { display: flex; justify-content: space-between; align-items: center; }
.progress-wrap { flex: 1; margin-right: 10px; }
.progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #07c160; border-radius: 3px; }
.progress-fill.warning { background: #fa8c16; }
.progress-fill.success { background: #52c41a; }
.progress-text { font-size: 11px; color: #999; margin-top: 3px; }
.activity-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
.badge-excellent { background: #f6ffed; color: #52c41a; }
.badge-good { background: #fff7e6; color: #fa8c16; }

.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon { font-size: 50px; opacity: 0.3; margin-bottom: 10px; }
.empty-text { font-size: 13px; color: #999; margin-bottom: 15px; }
.empty-btn { padding: 8px 20px; background: #07c160; color: #fff; border: none; border-radius: 20px; font-size: 12px; cursor: pointer; }

.loading-state { text-align: center; padding: 20px; color: #999; font-size: 12px; }
</style>
</head>
<body>
<h2>📋 活动列表 Widget</h2>
<div class="widget-container">
  <div class="widget-header">
    <div class="widget-title">我的活动</div>
    <button class="create-btn">+ 创建新活动</button>
  </div>

  <div class="filter-tabs">
    <div class="filter-tab active">全部 <span class="filter-count">28</span></div>
    <div class="filter-tab">待准备 <span class="filter-count">8</span></div>
    <div class="filter-tab">进行中 <span class="filter-count">5</span></div>
    <div class="filter-tab">已完成 <span class="filter-count">15</span></div>
  </div>

  <div class="activity-card">
    <div class="activity-header">
      <div class="activity-name">春季招聘会</div>
      <div class="activity-status status-active">进行中</div>
    </div>
    <div class="activity-info">
      <span>📅 2026-06-28</span>
      <span>📍 会展中心A馆</span>
      <span>👤 张三</span>
    </div>
    <div class="activity-stats">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill warning" style="width:75%"></div></div>
        <div class="progress-text">物料完成率 75% (15/20)</div>
      </div>
    </div>
  </div>

  <div class="activity-card">
    <div class="activity-header">
      <div class="activity-name">科技创新展</div>
      <div class="activity-status status-pending">待准备</div>
    </div>
    <div class="activity-info">
      <span>📅 2026-07-05</span>
      <span>📍 科技园展厅</span>
      <span>👤 李四</span>
    </div>
    <div class="activity-stats">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill warning" style="width:30%"></div></div>
        <div class="progress-text">物料完成率 30% (6/20)</div>
      </div>
    </div>
  </div>

  <div class="activity-card">
    <div class="activity-header">
      <div class="activity-name">品牌市集</div>
      <div class="activity-status status-done">已完成</div>
    </div>
    <div class="activity-info">
      <span>📅 2026-06-20</span>
      <span>📍 文化广场</span>
      <span>👤 王五</span>
    </div>
    <div class="activity-stats">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill success" style="width:100%"></div></div>
        <div class="progress-text">完整率 95% · 20 项物料</div>
      </div>
      <div class="activity-badge badge-excellent">⭐ 优秀</div>
    </div>
  </div>

  <div class="activity-card">
    <div class="activity-header">
      <div class="activity-name">校园招聘会</div>
      <div class="activity-status status-done">已完成</div>
    </div>
    <div class="activity-info">
      <span>📅 2026-06-15</span>
      <span>📍 大学城体育馆</span>
      <span>👤 赵六</span>
    </div>
    <div class="activity-stats">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:88%"></div></div>
        <div class="progress-text">完整率 88% · 25 项物料</div>
      </div>
      <div class="activity-badge badge-good">✓ 良好</div>
    </div>
  </div>

  <div class="loading-state">↑ 下拉刷新 · 上拉加载更多 ↓</div>
</div>
</body>
</html>
