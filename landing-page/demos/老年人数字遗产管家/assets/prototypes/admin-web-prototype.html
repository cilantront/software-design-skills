.review-card{padding:18px;border-left:4px solid var(--amber);margin-bottom:14px}.review-card.death{border-left-color:var(--red)}.review-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px}.review-title{font-size:16px;font-weight:800}.review-meta{font-size:13px;color:var(--muted);margin-top:4px}.review-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 24px;font-size:14px;line-height:1.6}.review-grid strong{color:#334155}.review-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.proof-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.proof{height:34px;padding:0 10px;border-radius:10px;border:1px dashed #cbd5e1;background:#f8fafc;color:#334155;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}.proof svg{width:16px;height:16px;stroke:currentColor}
.form-grid{display:grid;grid-template-columns:180px 1fr;gap:14px;align-items:center;max-width:760px}.form-label{font-size:14px;font-weight:700;color:#334155}.hint{font-size:12px;color:var(--muted);margin-left:8px}.switch{width:48px;height:26px;background:#cbd5e1;border-radius:99px;position:relative;border:0}.switch::after{content:"";position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2)}.switch.on{background:var(--primary)}.switch.on::after{left:25px}.settings-block{padding:18px;margin-bottom:16px}

@media (max-width:1100px){.app{grid-template-columns:76px 1fr}.brand-title-wrap,.nav-btn span,.nav-group,.side-foot{display:none}.brand{justify-content:center;padding:0}.nav-btn{justify-content:center}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}

    <div class="card panel"><div class="panel-head"><div><div class="panel-title">近7日新增用户</div><div class="panel-desc">按日统计注册量</div></div></div><div class="chart">${[50,68,45,82,66,94,76].map((h,i)=>`<div class="chart-col"><div class="chart-bar" style="height:${h}%"></div><div class="chart-label">${i+1}日</div></div>`).join('')}</div></div>
    <div class="card panel"><div class="panel-head"><div><div class="panel-title">账户活跃度分布</div><div class="panel-desc">平台托管账户健康状态</div></div></div><div class="progress-list">
      ${progress('活跃',62,'#16a34a','9,692')}${progress('低活跃',23,'#d97706','3,595')}${progress('长期未登录',12,'#ea580c','1,876')}${progress('可能遗忘',3,'#dc2626','469')}
    </div></div>
  </div>
  <div class="card panel" style="margin-top:16px"><div class="panel-head"><div><div class="panel-title">最近待处理事项</div><div class="panel-desc">继承审核、账户异常、系统提醒</div></div><button class="btn primary" onclick="setPage('reviews')">进入审核</button></div>${reviewList(true)}</div>`}
function statCard(label,value,trend,bg,kind,tclass=''){return `<div class="card stat"><div class="stat-top"><div class="stat-label">${label}</div><div class="stat-icon" style="background:${bg}">${svgMini(kind)}</div></div><div class="stat-value">${value}</div><div class="trend ${tclass}">${trend}</div></div>`}
function svgMini(){return '<svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path d="M4 19V5m0 14h16M8 16V9m4 7V6m4 10v-4" stroke="currentColor"/></svg>'}
function progress(name,pct,color,val){return `<div class="progress-row"><div>${name}</div><div class="bar"><span style="width:${pct}%;background:${color}"></span></div><div class="muted">${pct}%</div></div><div style="margin-top:-10px;margin-left:142px" class="muted">${val} 个账户</div>`}
function renderUsers(list=users){document.getElementById('page-users').innerHTML=`<div class="card panel"><div class="panel-head"><div><div class="panel-title">用户列表</div><div class="panel-desc">支持按手机号、昵称、版本、状态筛选</div></div><button class="btn">导出数据</button></div><div class="toolbar"><div class="filters"><input id="userKeyword" class="input" placeholder="搜索手机号/昵称/ID"><select id="userPlan" class="select"><option value="">全部版本</option><option>免费版</option><option>个人版</option><option>家庭版</option></select><select id="userStatus" class="select"><option value="">全部状态</option><option>正常</option><option>已禁用</option></select><button class="btn primary" onclick="filterUsers()">${icon('search')}搜索</button></div></div><div class="table-wrap"><table><thead><tr><th>用户</th><th>手机号</th><th>版本</th><th>托管账户</th><th>继承人</th><th>活跃度</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>${list.map((u,i)=>`<tr><td><div class="user-cell"><div class="mini-avatar" style="background:${i%2?'#14b8a6':'#3b82f6'}">${u.name[0]}</div><div><strong>${u.name}</strong><div class="muted">${u.id}</div></div></div></td><td>${u.phone}</td><td>${planTag(u.plan)}</td><td>${u.accounts}</td><td>${u.heirs}</td><td>${activityTag(u.activity)}</td><td>${statusTag(u.status)}</td><td>${u.created}</td><td><button class="btn sm" onclick="showUser('${u.id}')">详情</button></td></tr>`).join('')}</tbody></table></div>${list.length?'':'<div class="empty">未找到匹配用户</div>'}<div class="pagination"><span>共 ${list.length} 条</span><button class="page-btn active">1</button></div></div>`}
function activityTag(a){return a==='活跃'?tag(a,'green'):a==='低活跃'?tag(a,'amber'):a==='长期未登录'?tag(a,'red'):tag(a,'red')}
function filterUsers(){const k=document.getElementById('userKeyword').value.trim();const p=document.getElementById('userPlan').value;const s=document.getElementById('userStatus').value;renderUsers(users.filter(u=>(!k||u.name.includes(k)||u.phone.includes(k)||u.id.includes(k))&&(!p||u.plan===p)&&(!s||u.status===s)))}
function showUser(id){const u=users.find(x=>x.id===id);openModal('用户详情',`<div class="review-grid"><div><strong>用户：</strong>${u.name}</div><div><strong>手机号：</strong>${u.phone}</div><div><strong>版本：</strong>${u.plan}</div><div><strong>账户数：</strong>${u.accounts}</div><div><strong>继承人：</strong>${u.heirs}</div><div><strong>状态：</strong>${u.status}</div></div><div class="card panel" style="margin-top:16px;box-shadow:none"><div class="panel-title">近期操作日志</div><p class="muted" style="margin-top:10px;line-height:1.8">2026-06-28 查看密码：中国工商银行<br>2026-06-27 更新继承人：张小明<br>2026-06-26 标记医保账户已登录</p></div>`)}
function renderFamilies(list=families){document.getElementById('page-families').innerHTML=`<div class="grid-3">${families.map(f=>`<div class="card stat"><div class="stat-label">${f.name}</div><div class="stat-value" style="font-size:24px;margin-top:8px">${f.members} 人</div><div class="muted" style="margin-top:8px">管理员：${f.admin} · 托管账户 ${f.accounts}</div><div style="margin-top:12px">${planTag(f.plan)} ${statusTag(f.status)}</div></div>`).join('')}</div><div class="card panel" style="margin-top:16px"><div class="panel-head"><div><div class="panel-title">家庭组列表</div><div class="panel-desc">查看家庭订阅与成员构成</div></div></div><div class="table-wrap"><table><thead><tr><th>家庭组</th><th>管理员</th><th>成员数</th><th>订阅</th><th>到期时间</th><th>托管账户</th><th>状态</th><th>操作</th></tr></thead><tbody>${list.map(f=>`<tr><td><strong>${f.name}</strong><div class="muted">${f.id}</div></td><td>${f.admin}</td><td>${f.members}/6</td><td>${planTag(f.plan)}</td><td>${f.expire}</td><td>${f.accounts}</td><td>${statusTag(f.status)}</td><td><button class="btn sm" onclick="showToast('已打开家庭组详情原型')">详情</button></td></tr>`).join('')}</tbody></table></div></div>`}
function renderReviews(){document.getElementById('page-reviews').innerHTML=`<div class="card panel"><div class="panel-head"><div><div class="panel-title">继承授权审核</div><div class="panel-desc">失能/身故证明必须人工审核，审核通过需记录审计日志</div></div><div class="filters"><select id="reviewStatus" class="select" onchange="renderReviewCards()"><option value="">全部状态</option><option>待审核</option><option>待补充</option><option>已通过</option><option>已拒绝</option></select></div></div><div id="reviewContainer"></div></div>`;renderReviewCards()}
function reviewList(compact=false){const list=reviews.filter(r=>r.status==='待审核').slice(0,compact?2:99);return list.length?list.map(r=>reviewCard(r,compact)).join(''):'<div class="empty">暂无待审核事项</div>'}
function renderReviewCards(){const sel=document.getElementById('reviewStatus');const status=sel?sel.value:'';const list=reviews.filter(r=>!status||r.status===status);document.getElementById('reviewContainer').innerHTML=list.length?list.map(r=>reviewCard(r,false)).join(''):'<div class="empty">暂无符合条件的审核申请</div>'}
function reviewCard(r,compact){return `<div class="review-card ${r.level==='death'?'death':''}"><div class="review-top"><div><div class="review-title">${r.type}申请 #${r.id}</div><div class="review-meta">提交时间：${r.time}</div></div>${statusTag(r.status)}</div><div class="review-grid"><div><strong>申请人：</strong>${r.applicant}（${r.relation}）· ${r.phone}</div><div><strong>被继承人：</strong>${r.owner} · ${r.ownerPhone}</div><div><strong>继承条件：</strong>${r.type}</div><div><strong>可继承账户：</strong>${r.accounts}</div></div><div class="muted" style="margin-top:8px;line-height:1.6">${r.desc}</div><div class="proof-list">${r.docs.map(d=>`<button class="proof" onclick="previewDoc('${r.id}','${d}')">${icon('file')}${d}</button>`).join('')}</div>${compact?'':`<div class="review-actions"><button class="btn green" onclick="reviewAction('${r.id}','已通过')">通过</button><button class="btn red" onclick="reviewAction('${r.id}','已拒绝')">拒绝</button><button class="btn" onclick="reviewAction('${r.id}','待补充')">要求补充材料</button></div>`}</div>`}
function reviewAction(id,status){reviews=reviews.map(r=>r.id===id?{...r,status}:r);renderReviewCards();showToast('审核状态已更新为：'+status)}
function previewDoc(id,doc){openModal('证明材料预览',`<div class="doc-preview"><div class="doc-card"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V9l-6-6z"/><path d="M14 3v6h6M8 13h8M8 17h5"/></svg><h3>${doc}</h3><p class="muted" style="margin-top:8px">申请单：${id}</p><p class="muted" style="margin-top:8px">原型中以模拟预览展示证明材料；真实系统将加载附件图片/PDF。</p></div></div>`)}
function renderStats(){document.getElementById('page-stats').innerHTML=`<div class="grid-4">${statCard('月新增用户','642','环比 +21.4%','#dbeafe')}${statCard('月收入','¥8,236','个人版/家庭版订阅','#dcfce7')}${statCard('继承申请','18','本月累计','#fef3c7')}${statCard('异常账户','469','可能遗忘状态','#fee2e2','','danger')}</div><div class="grid-2" style="margin-top:16px"><div class="card panel"><div class="panel-title">收入趋势</div><div class="chart" style="margin-top:16px">${[34,42,51,63,72,84,96].map((h,i)=>`<div class="chart-col"><div class="chart-bar" style="height:${h}%;background:linear-gradient(180deg,#34d399,#16a34a)"></div><div class="chart-label">${i+1}月</div></div>`).join('')}</div></div><div class="card panel"><div class="panel-title">账户类型分布</div><div class="progress-list" style="margin-top:20px">${progress('银行账户',38,'#2563eb','5,940')}${progress('社交平台',22,'#16a34a','3,439')}${progress('社保医保',16,'#d97706','2,501')}${progress('支付账户',14,'#0891b2','2,188')}${progress('邮箱/其他',10,'#7c3aed','1,564')}</div></div></div>`}
function renderSettings(){document.getElementById('page-settings').innerHTML=`<div class="card settings-block"><div class="panel-head"><div><div class="panel-title">活跃度检测配置</div><div class="panel-desc">默认阈值可被用户在个人端覆盖</div></div></div><div class="form-grid"><div class="form-label">低活跃阈值</div><div><input class="input" value="30" style="width:90px"><span class="hint">天</span></div><div class="form-label">长期未登录阈值</div><div><input class="input" value="90" style="width:90px"><span class="hint">天</span></div><div class="form-label">可能遗忘阈值</div><div><input class="input" value="180" style="width:90px"><span class="hint">天</span></div><div class="form-label">默认检测周期</div><div><select class="select"><option>每日</option><option selected>每周</option><option>每月</option></select></div></div></div><div class="card settings-block"><div class="panel-title" style="margin-bottom:16px">订阅价格配置</div><div class="form-grid"><div class="form-label">个人版月价</div><div><input class="input" value="9" style="width:90px"><span class="hint">元/月</span></div><div class="form-label">家庭版月价</div><div><input class="input" value="19" style="width:90px"><span class="hint">元/月</span></div><div class="form-label">家庭版成员上限</div><div><input class="input" value="6" style="width:90px"><span class="hint">人</span></div><div class="form-label">自动续费</div><div><button class="switch on" onclick="this.classList.toggle('on')"></button></div></div></div><div class="card settings-block"><div class="panel-title" style="margin-bottom:16px">继承审核规则</div><div class="form-grid"><div class="form-label">审核时限</div><div><input class="input" value="48" style="width:90px"><span class="hint">小时</span></div><div class="form-label">双人确认</div><div><button class="switch on" onclick="this.classList.toggle('on')"></button><span class="hint">身故/失能申请必须双人确认</span></div><div class="form-label">拒绝原因必填</div><div><button class="switch on" onclick="this.classList.toggle('on')"></button></div></div></div><div style="display:flex;justify-content:flex-end;gap:10px"><button class="btn">取消</button><button class="btn primary" onclick="showToast('系统设置已保存')">保存设置</button></div>`}
function openModal(title,html){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBackdrop').classList.add('show')}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')}
document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});
renderDashboard();renderUsers();renderFamilies();renderReviews();renderStats();renderSettings();
</script>
</body>
</html>
