<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频上传组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 24px; }
.container { max-width: 800px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h2 { font-size: 18px; color: #333; margin-bottom: 16px; }
.upload-zone { border: 2px dashed #d9d9d9; border-radius: 12px; padding: 60px 24px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa; }
.upload-zone:hover, .upload-zone.dragover { border-color: #667eea; background: #f0f3ff; }
.upload-icon { font-size: 48px; margin-bottom: 16px; }
.upload-title { font-size: 16px; color: #333; font-weight: 500; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #999; margin-bottom: 4px; }
.upload-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; }
.upload-btn:hover { opacity: 0.9; }
.format-tags { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.format-tag { padding: 4px 12px; background: #f0f0f0; border-radius: 4px; font-size: 12px; color: #666; }
.quota-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f8f9fa; border-radius: 8px; margin-top: 16px; }
.quota-info { font-size: 13px; color: #666; }
.quota-info strong { color: #333; }
.quota-upgrade { font-size: 13px; color: #667eea; cursor: pointer; }
.upload-progress { margin-top: 24px; display: none; }
.progress-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; }
.progress-file { flex: 1; }
.progress-name { font-size: 14px; color: #333; font-weight: 500; }
.progress-size { font-size: 12px; color: #999; }
.progress-bar { width: 100%; height: 6px; background: #e8e8e8; border-radius: 3px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; transition: width 0.3s; }
.progress-status { font-size: 12px; color: #667eea; white-space: nowrap; }
.section-title { font-size: 14px; color: #666; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2>📹 上传口播视频</h2>

<div class="upload-zone" id="uploadZone">
  <div class="upload-icon">📁</div>
  <div class="upload-title">拖拽视频文件到此处，或点击上传</div>
  <div class="upload-hint">支持 MP4、MOV、AVI、WebM 格式</div>
  <div class="upload-hint">单文件最大 2GB</div>
  <button class="upload-btn">选择视频文件</button>
  <div class="format-tags">
    <span class="format-tag">MP4</span>
    <span class="format-tag">MOV</span>
    <span class="format-tag">AVI</span>
    <span class="format-tag">WebM</span>
  </div>
</div>

<div class="quota-bar">
  <span class="quota-info">本月剩余配额：<strong>4/5</strong>（免费版）</span>
  <span class="quota-upgrade">升级Pro版 不限次数 →</span>
</div>

<div class="section-title">上传队列</div>

<div class="upload-progress" style="display:block;">
  <div class="progress-item">
    <div style="font-size:24px;">🎬</div>
    <div class="progress-file">
      <div class="progress-name">知识分享_第12期.mp4</div>
      <div class="progress-size">256 MB · 剩余约 30秒</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 72%;"></div></div>
    </div>
    <div class="progress-status">72%</div>
  </div>
  <div class="progress-item">
    <div style="font-size:24px;">✅</div>
    <div class="progress-file">
      <div class="progress-name">产品解读_完整版.mov</div>
      <div class="progress-size">512 MB · 上传完成</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 100%; background: #52c41a;"></div></div>
    </div>
    <div class="progress-status" style="color:#52c41a;">完成</div>
  </div>
</div>

</div>
</div>

<script>
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('dragover'); });
</script>
</body>
</html>
