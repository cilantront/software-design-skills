<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>补药清单组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Header */
        .resupply-header {
            padding: 20px;
            background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%);
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .count-info {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            padding: 12px 16px;
            background: #f0fdfa;
            border-bottom: 1px solid #e0f2fe;
            gap: 8px;
        }

        .filter-tab {
            padding: 6px 12px;
            background: white;
            border: 1px solid #22d3ee;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: #0891b2;
            color: white;
            border-color: #0891b2;
        }

        .filter-tab:hover:not(.active) {
            background: #e0f2fe;
        }

        /* Resupply List */
        .resupply-list {
            padding: 16px;
        }

        .list-item {
            padding: 16px;
            background: #f0fdfa;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #22d3ee;
        }

        .list-item.urgent {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .list-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .list-item.low-stock {
            border-left-color: #f97316;
            background: #fff7ed;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .urgency-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag-urgent {
            background: #fee2e2;
            color: #991b1b;
        }

        .tag-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .tag-low-stock {
            background: #fed7aa;
            color: #9a3412;
        }

        .drug-info {
            flex: 1;
        }

        .drug-name {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
            margin-bottom: 4px;
        }

        .drug-detail {
            font-size: 14px;
            color: #64748b;
        }

        .detail-row {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .member-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            color: #64748b;
        }

        .suggested-qty {
            font-size: 14px;
            color: #164E63;
            font-weight: 500;
        }

        .suggested-qty span {
            color: #0891b2;
            font-weight: 600;
        }

        .action-btn {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #047857;
        }

        .action-btn.completed {
            background: #cbd5e1;
            cursor: default;
        }

        /* Footer Actions */
        .footer-actions {
            padding: 16px;
            border-top: 1px solid #e0f2fe;
            display: flex;
            gap: 12px;
        }

        .btn-full {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-export {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-share {
            background: #0891b2;
            color: white;
        }

        .btn-share:hover {
            background: #0e7490;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Header -->
        <div class="resupply-header">
            <div class="header-top">
                <div class="header-title">📋 补药清单</div>
                <div class="header-actions">
                    <button class="icon-btn" title="导出">📤</button>
                    <button class="icon-btn" title="分享">🔗</button>
                </div>
            </div>
            <div class="count-info">共 4 种药品需要补充</div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active">全部 (4)</div>
            <div class="filter-tab">紧急 (1)</div>
            <div class="filter-tab">临期 (2)</div>
            <div class="filter-tab">不足 (1)</div>
        </div>

        <!-- Resupply List -->
        <div class="resupply-list">
            <!-- Urgent Item -->
            <div class="list-item urgent">
                <div class="item-header">
                    <div class="drug-info">
                        <div class="drug-name">感冒清热颗粒</div>
                        <div class="drug-detail">
                            <div class="detail-row">
                                <span class="member-badge">👴 爷爷</span>
                                <span class="suggested-qty">建议补充：<span>2盒</span></span>
                            </div>
                        </div>
                    </div>
                    <span class="urgency-tag tag-urgent">🔴 紧急</span>
                </div>
                <button class="action-btn">✓ 已补药</button>
            </div>

            <!-- Warning Items -->
            <div class="list-item warning">
                <div class="item-header">
                    <div class="drug-info">
                        <div class="drug-name">降压灵片</div>
                        <div class="drug-detail">
                            <div class="detail-row">
                                <span class="member-badge">👵 奶奶</span>
                                <span class="suggested-qty">建议补充：<span>1瓶</span></span>
                            </div>
                        </div>
                    </div>
                    <span class="urgency-tag tag-warning">🟡 临期</span>
                </div>
                <button class="action-btn">✓ 已补药</button>
            </div>

            <div class="list-item warning">
                <div class="item-header">
                    <div class="drug-info">
                        <div class="drug-name">维生素C片</div>
                        <div class="drug-detail">
                            <div class="detail-row">
                                <span class="member-badge">👶 宝宝</span>
                                <span class="suggested-qty">建议补充：<span>1瓶</span></span>
                            </div>
                        </div>
                    </div>
                    <span class="urgency-tag tag-warning">🟡 临期</span>
                </div>
                <button class="action-btn">✓ 已补药</button>
            </div>

            <!-- Low Stock Item -->
            <div class="list-item low-stock">
                <div class="item-header">
                    <div class="drug-info">
                        <div class="drug-name">维生素D滴剂</div>
                        <div class="drug-detail">
                            <div class="detail-row">
                                <span class="member-badge">👶 宝宝</span>
                                <span class="suggested-qty">建议补充：<span>1盒</span></span>
                            </div>
                        </div>
                    </div>
                    <span class="urgency-tag tag-low-stock">🟠 库存不足</span>
                </div>
                <button class="action-btn">✓ 已补药</button>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="footer-actions">
            <button class="btn-full btn-export">📤 导出清单</button>
            <button class="btn-full btn-share">🔗 分享给家人</button>
        </div>
    </div>

    <script>
        // Filter tab switching
        const filterTabs = document.querySelectorAll('.filter-tab');
        filterTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                filterTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Complete button action
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (confirm('确认已完成补药？')) {
                    this.textContent = '✓ 已完成';
                    this.classList.add('completed');
                    this.disabled = true;

                    // Update count
                    const countInfo = document.querySelector('.count-info');
                    const currentCount = parseInt(countInfo.textContent.match(/\d+/)[0]);
                    if (currentCount > 0) {
                        countInfo.textContent = `共 ${currentCount - 1} 种药品需要补充`;
                    }
                }
            });
        });

        // Export and share buttons
        document.querySelector('.btn-export')?.addEventListener('click', function() {
            alert('补药清单已导出到文件');
        });

        document.querySelector('.btn-share')?.addEventListener('click', function() {
            alert('分享链接已生成，可发送给家人');
        });
    </script>
</body>
</html>
