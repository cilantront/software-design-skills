<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存预警组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .alert-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .alert-title {
            font-size: 18px;
            font-weight: 700;
            color: #164E63;
            margin-bottom: 4px;
        }

        .alert-subtitle {
            font-size: 14px;
            color: #64748b;
        }

        /* Alert Cards */
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alert-card {
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid;
            background: white;
        }

        .alert-urgent {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .alert-warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .alert-low-stock {
            border-left-color: #f97316;
            background: #fff7ed;
        }

        .alert-icon-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .alert-icon {
            font-size: 20px;
        }

        .alert-type {
            font-size: 14px;
            font-weight: 600;
        }

        .type-urgent {
            color: #991b1b;
        }

        .type-warning {
            color: #92400e;
        }

        .type-low-stock {
            color: #9a3412;
        }

        .alert-content {
            margin-bottom: 12px;
        }

        .drug-name {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
            margin-bottom: 4px;
        }

        .alert-detail {
            font-size: 14px;
            color: #64748b;
        }

        .detail-highlight {
            font-weight: 600;
            color: #164E63;
        }

        .alert-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #059669;
            color: white;
        }

        .btn-primary:hover {
            background: #047857;
        }

        .btn-secondary {
            background: white;
            color: #0891b2;
            border: 1px solid #22d3ee;
        }

        .btn-secondary:hover {
            background: #f0fdfa;
        }

        .btn-urgent {
            background: #dc2626;
            color: white;
        }

        .btn-urgent:hover {
            background: #b91c1c;
        }

        /* Alert count badge */
        .alert-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: #ef4444;
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Info section */
        .info-section {
            margin-top: 20px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .info-text {
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="alert-header">
            <div class="alert-title">
                ⚠️ 库存预警
                <span class="alert-count">3</span>
            </div>
            <div class="alert-subtitle">以下药品需要及时处理</div>
        </div>

        <div class="alert-list">
            <!-- Urgent: Near Expiry -->
            <div class="alert-card alert-urgent">
                <div class="alert-icon-row">
                    <span class="alert-icon">🔴</span>
                    <span class="alert-type type-urgent">紧急临期</span>
                </div>
                <div class="alert-content">
                    <div class="drug-name">感冒清热颗粒</div>
                    <div class="alert-detail">
                        有效期至：<span class="detail-highlight" style="color: #ef4444;">2024-03-15</span>（剩余<span class="detail-highlight">12天</span>）
                    </div>
                    <div class="alert-detail">
                        剩余数量：<span class="detail-highlight">5袋</span>
                    </div>
                </div>
                <div class="alert-actions">
                    <button class="btn btn-urgent">加入补药清单</button>
                    <button class="btn btn-secondary">查看详情</button>
                </div>
            </div>

            <!-- Warning: Expiring Soon -->
            <div class="alert-card alert-warning">
                <div class="alert-icon-row">
                    <span class="alert-icon">🟡</span>
                    <span class="alert-type type-warning">近效期</span>
                </div>
                <div class="alert-content">
                    <div class="drug-name">降压灵片</div>
                    <div class="alert-detail">
                        有效期至：<span class="detail-highlight">2024-09-20</span>（剩余<span class="detail-highlight">86天</span>）
                    </div>
                    <div class="alert-detail">
                        剩余数量：<span class="detail-highlight">24片</span>
                    </div>
                </div>
                <div class="alert-actions">
                    <button class="btn btn-primary">加入补药清单</button>
                    <button class="btn btn-secondary">查看详情</button>
                </div>
            </div>

            <!-- Low Stock -->
            <div class="alert-card alert-low-stock">
                <div class="alert-icon-row">
                    <span class="alert-icon">🟠</span>
                    <span class="alert-type type-low-stock">库存不足</span>
                </div>
                <div class="alert-content">
                    <div class="drug-name">维生素D滴剂</div>
                    <div class="alert-detail">
                        当前库存：<span class="detail-highlight">3粒</span>（低于最低库存<span class="detail-highlight">7粒</span>）
                    </div>
                    <div class="alert-detail">
                        按当前用量，预计可用<span class="detail-highlight">1天</span>
                    </div>
                </div>
                <div class="alert-actions">
                    <button class="btn btn-primary">加入补药清单</button>
                    <button class="btn btn-secondary">查看详情</button>
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-text">
                💡 <strong>温馨提示：</strong><br>
                • 紧急临期：有效期不足30天的药品<br>
                • 近效期：有效期在30-90天内的药品<br>
                • 库存不足：剩余量低于设定阈值的药品
            </div>
        </div>
    </div>

    <script>
        // Button interactions
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const action = this.textContent.trim();
                if (action.includes('补药')) {
                    alert('已添加到补药清单');
                } else if (action.includes('详情')) {
                    alert('跳转到药品详情页面');
                }
            });
        });

        // Simulate urgency countdown
        const urgentDays = document.querySelector('.alert-urgent .detail-highlight:nth-child(2)');
        if (urgentDays) {
            setInterval(() => {
                let days = parseInt(urgentDays.textContent);
                if (days > 0) {
                    days--;
                    urgentDays.textContent = days + '天';
                }
            }, 86400000); // Update every day
        }
    </script>
</body>
</html>
