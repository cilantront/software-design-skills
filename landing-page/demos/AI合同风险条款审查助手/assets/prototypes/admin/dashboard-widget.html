<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数据看板 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.kpis div{background:#F8FAFC;border:1px solid var(--line);border-radius:14px;padding:18px}.kpis b{font-size:28px;display:block}.kpis span{color:var(--muted);font-size:13px}.chart{height:240px;margin-top:22px;border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;align-items:end;gap:18px}.chart i{flex:1;background:var(--primary);border-radius:8px 8px 0 0}@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}}</style></head><body>
<div class="container"><section class="card" style="padding:24px"><h2>运营数据看板</h2><div class="kpis"><div><b>128</b><span>今日审查</span></div><div><b>¥4,921</b><span>今日收入</span></div><div><b>2,846</b><span>累计用户</span></div><div><b>18.6%</b><span>付费转化</span></div></div><div class="chart"><i style="height:45%"></i><i style="height:60%"></i><i style="height:52%"></i><i style="height:78%"></i><i style="height:66%"></i><i style="height:88%"></i><i style="height:74%"></i></div></section></div>
</body></html>
