<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>免责声明弹窗 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.notice{border-left:4px solid var(--primary);background:#fff;border-radius:12px;padding:14px;margin:12px 0;line-height:1.7;color:#334155}.agree{display:flex;gap:8px;align-items:center;margin:18px 0;font-size:14px}</style></head><body>
<div class="container" style="min-height:100vh;display:grid;place-items:center"><section class="card" style="width:min(620px,100%);padding:30px"><div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;color:var(--warn)"><svg class="icon" viewBox="0 0 24 24"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg><h2 style="margin:0">服务性质声明与免责声明</h2></div><div class="notice"><b>服务性质：</b>本产品为AI辅助合同风险识别工具，不属于法律咨询服务。</div><div class="notice"><b>结果边界：</b>审查结果仅供参考，不构成法律意见，不能替代执业律师专业判断。</div><div class="notice"><b>数据隐私：</b>合同文件仅用于本次审查，不用于模型训练；用户可随时删除。</div><div class="notice"><b>责任限制：</b>AI结果可能存在误判或遗漏，赔偿责任上限不超过本次已付服务费。</div><label class="agree"><input id="agree" type="checkbox"> 我已阅读并同意上述声明、《服务条款》和《隐私政策》</label><button id="ok" class="btn" disabled style="width:100%;opacity:.45">确认并继续</button></section></div><script>agree.onchange=()=>{ok.disabled=!agree.checked;ok.style.opacity=agree.checked?1:.45}</script>
</body></html>
