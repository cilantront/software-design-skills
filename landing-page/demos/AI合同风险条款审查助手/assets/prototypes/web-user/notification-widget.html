<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>消息通知中心 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.msg{position:relative;border:1px solid var(--line);border-radius:14px;padding:16px 16px 16px 20px;margin:12px 0;display:grid;gap:5px}.msg.unread:before{content:"";position:absolute;left:8px;top:22px;width:7px;height:7px;background:var(--danger);border-radius:50%}.msg b{color:#1E293B}.msg span,.msg small{color:var(--muted);font-size:13px}</style></head><body>
<div class="container"><section class="card" style="padding:24px"><h2>消息中心</h2><div class="msg unread"><b>合同审查已完成</b><span>《商铺租赁合同》风险评分72分，识别到8条风险条款。</span><small>刚刚</small></div><div class="msg"><b>购买成功</b><span>您已购买1份合同审查服务，当前剩余1次。</span><small>10分钟前</small></div><div class="msg"><b>系统提醒</b><span>审查结果由AI生成，仅供参考，不构成法律意见。</span><small>今天 09:00</small></div></section></div>
</body></html>
