<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>用户端小程序全站点原型</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.gridphone{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.screen{background:#111827;border-radius:28px;padding:10px}.wx{height:48px;background:#F8FAFC;border-radius:20px 20px 0 0;display:flex;align-items:center;justify-content:center;font-weight:700;position:relative}.wx span{position:absolute;right:12px;color:#64748B}.body{background:#fff;min-height:430px;border-radius:0 0 20px 20px;padding:18px}.mini-card{margin-top:18px;border:1px solid var(--line);border-radius:16px;padding:24px;background:#F8FAFC;text-align:center}</style></head><body><div class="container"><h1>用户端小程序全站点原型</h1><p class="muted">宫格布局模拟微信小程序各页面。</p><div class="gridphone"><div class="screen"><div class="wx">首页<span>••• ○</span></div><div class="body"><h3>首页</h3><p>拍照上传、相册选择、剩余次数</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">上传<span>••• ○</span></div><div class="body"><h3>上传</h3><p>拍照取景框、重拍、提交</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">审查中<span>••• ○</span></div><div class="body"><h3>审查中</h3><p>步骤条、预计完成时间</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">报告<span>••• ○</span></div><div class="body"><h3>报告</h3><p>评分72、高风险条款</p><button class="btn green">主要操作</button><div class="mini-card">风险评分 72</div></div></div><div class="screen"><div class="wx">购买<span>••• ○</span></div><div class="body"><h3>购买</h3><p>¥19/份、微信支付</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">消息<span>••• ○</span></div><div class="body"><h3>消息</h3><p>审查完成通知</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">我的<span>••• ○</span></div><div class="body"><h3>我的</h3><p>手机号、订单、设置</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div><div class="screen"><div class="wx">免责声明<span>••• ○</span></div><div class="body"><h3>免责声明</h3><p>AI生成仅供参考</p><button class="btn green">主要操作</button><div class="mini-card">内容区域</div></div></div></div></div></body></html>
