<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>片段识别与审阅原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 32px; }
        .widget-container { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); max-width: 800px; margin: 0 auto; }
        .widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .widget-title { font-size: 18px; font-weight: 600; color: #333; }
        .widget-actions { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #fff; color: #667eea; border: 1px solid #667eea; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .audio-player { background: #f8f9ff; border-radius: 8px; padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
        .play-btn { width: 40px; height: 40px; border-radius: 50%; background: #667eea; color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .waveform { flex: 1; height: 40px; background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #667eea 100%); border-radius: 4px; opacity: 0.3; position: relative; }
        .waveform-progress { position: absolute; left: 0; top: 0; bottom: 0; width: 35%; background: #667eea; opacity: 1; border-radius: 4px; }
        .time-display { font-size: 13px; color: #666; min-width: 100px; text-align: right; }

        .fragment-list { display: grid; gap: 12px; }
        .fragment-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 16px; transition: all 0.2s; }
        .fragment-card:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.1); }
        .fragment-card.selected { border-color: #667eea; background: #f8f9ff; }
        .fragment-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .fragment-type { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .type-quote { background: #fff7e6; color: #fa8c16; }
        .type-interesting { background: #f6ffed; color: #52c41a; }
        .type-controversial { background: #fff2f0; color: #ff4d4f; }
        .type-highlight { background: #e6f7ff; color: #1890ff; }
        .fragment-time { font-size: 12px; color: #999; font-family: monospace; }
        .fragment-summary { font-size: 14px; line-height: 1.6; color: #333; margin-bottom: 12px; }
        .fragment-controls { display: flex; gap: 8px; align-items: center; }
        .checkbox { width: 18px; height: 18px; border: 2px solid #d9d9d9; border-radius: 4px; cursor: pointer; }
        .checkbox.checked { background: #667eea; border-color: #667eea; }
        .icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #e8e8e8; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
        .icon-btn:hover { border-color: #667eea; color: #667eea; }

        .batch-bar { background: #f8f9ff; border-radius: 8px; padding: 12px 16px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; display: none; }
        .batch-bar.show { display: flex; }
        .batch-info { font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-header">
            <div class="widget-title">🎯 精彩片段审阅</div>
            <div class="widget-actions">
                <button class="btn btn-secondary btn-sm">+ 手动添加</button>
                <button class="btn btn-primary btn-sm">批量生成文案</button>
            </div>
        </div>

        <div class="audio-player">
            <button class="play-btn">▶</button>
            <div class="waveform"><div class="waveform-progress"></div></div>
            <div class="time-display">15:52 / 45:32</div>
        </div>

        <div class="fragment-list">
            <div class="fragment-card selected">
                <div class="fragment-header">
                    <span class="fragment-type type-quote">金句</span>
                    <span class="fragment-time">12:34 - 13:15</span>
                </div>
                <div class="fragment-summary">"播客不是一个人的独白，而是与听众的对话。每一期节目都是一次心灵的交流。"</div>
                <div class="fragment-controls">
                    <div class="checkbox checked"></div>
                    <button class="icon-btn">▶</button>
                    <button class="icon-btn">✏️</button>
                    <button class="icon-btn">🗑️</button>
                </div>
            </div>

            <div class="fragment-card">
                <div class="fragment-header">
                    <span class="fragment-type type-interesting">有趣时刻</span>
                    <span class="fragment-time">23:45 - 24:30</span>
                </div>
                <div class="fragment-summary">"我第一次录播客的时候，紧张到把'大家好'说成了'大傻好'，整整重录了十遍！"</div>
                <div class="fragment-controls">
                    <div class="checkbox"></div>
                    <button class="icon-btn">▶</button>
                    <button class="icon-btn">✏️</button>
                    <button class="icon-btn">🗑️</button>
                </div>
            </div>

            <div class="fragment-card">
                <div class="fragment-header">
                    <span class="fragment-type type-controversial">争议观点</span>
                    <span class="fragment-time">35:12 - 36:08</span>
                </div>
                <div class="fragment-summary">"我认为播客不需要专业设备，手机录音就能开始，内容质量远比音质重要。"</div>
                <div class="fragment-controls">
                    <div class="checkbox"></div>
                    <button class="icon-btn">▶</button>
                    <button class="icon-btn">✏️</button>
                    <button class="icon-btn">🗑️</button>
                </div>
            </div>

            <div class="fragment-card">
                <div class="fragment-header">
                    <span class="fragment-type type-highlight">故事高光</span>
                    <span class="fragment-time">41:20 - 42:15</span>
                </div>
                <div class="fragment-summary">"有个听众告诉我，我的播客陪她度过了最难熬的失恋期，那一刻我知道这一切都值得。"</div>
                <div class="fragment-controls">
                    <div class="checkbox"></div>
                    <button class="icon-btn">▶</button>
                    <button class="icon-btn">✏️</button>
                    <button class="icon-btn">🗑️</button>
                </div>
            </div>
        </div>

        <div class="batch-bar show">
            <div class="batch-info">已选中 <strong>1</strong> 个片段</div>
            <button class="btn btn-primary btn-sm">为选中片段生成文案 →</button>
        </div>
    </div>

    <script>
        document.querySelectorAll('.checkbox').forEach(cb => {
            cb.addEventListener('click', function() {
                this.classList.toggle('checked');
                this.closest('.fragment-card').classList.toggle('selected');
                const count = document.querySelectorAll('.checkbox.checked').length;
                document.querySelector('.batch-info strong').textContent = count;
            });
        });
    </script>
</body>
</html>
