<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导出发布 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 24px; }
.widget-container { max-width: 700px; margin: 0 auto; }
.label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 12px; }

.export-card { background: #fff; border-radius: 12px; padding: 20px; }
.export-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.export-header .title { font-size: 15px; font-weight: 600; }
.export-header .actions { display: flex; gap: 8px; }
.btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.btn-outline { background: #fff; border: 1px solid #d9d9d9; color: #555; }

.export-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
.slice-card { border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; }
.slice-thumb { height: 90px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; position: relative; }
.slice-platform { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.7); color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.slice-body { padding: 10px; }
.slice-title { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
.slice-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
.slice-tag { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 10px; color: #666; }
.slice-time { font-size: 11px; color: #888; }
.slice-actions { display: flex; gap: 6px; padding: 0 10px 10px; }

.doc-export { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
</style>
</head>
<body>
<div class="widget-container">
  <div class="label">📦 导出发布组件</div>

  <div class="export-card">
    <div class="export-header">
      <span class="title">📦 导出切片（共6个）</span>
      <div class="actions">
        <select class="btn btn-outline"><option>MP4</option><option>MOV</option></select>
        <select class="btn btn-outline"><option>1080P</option><option>720P</option></select>
        <button class="btn btn-primary">📥 批量导出</button>
      </div>
    </div>

    <div class="export-grid">
      <div class="slice-card">
        <div class="slice-thumb" style="background:linear-gradient(135deg,#ff6b6b,#ee5a24)">
          <span class="slice-platform">🎵 抖音</span>🎬
        </div>
        <div class="slice-body">
          <div class="slice-title">🔥 这款面霜用了3个月效果惊人！</div>
          <div class="slice-tags">
            <span class="slice-tag">#面霜推荐</span>
            <span class="slice-tag">#护肤好物</span>
          </div>
          <div class="slice-time">📅 建议：今天 20:00</div>
        </div>
        <div class="slice-actions">
          <button class="btn btn-outline">✏️ 编辑</button>
          <button class="btn btn-outline">👁️ 预览</button>
        </div>
      </div>
      <div class="slice-card">
        <div class="slice-thumb" style="background:linear-gradient(135deg,#26de81,#20bf6b)">
          <span class="slice-platform">🎵 抖音</span>🎬
        </div>
        <div class="slice-body">
          <div class="slice-title">💰 买一送一！直播间专属价！</div>
          <div class="slice-tags">
            <span class="slice-tag">#限时优惠</span>
            <span class="slice-tag">#直播回放</span>
          </div>
          <div class="slice-time">📅 建议：明天 12:00</div>
        </div>
        <div class="slice-actions">
          <button class="btn btn-outline">✏️ 编辑</button>
          <button class="btn btn-outline">👁️ 预览</button>
        </div>
      </div>
      <div class="slice-card">
        <div class="slice-thumb" style="background:linear-gradient(135deg,#ff6b6b,#ee5a24)">
          <span class="slice-platform">📕 小红书</span>📝
        </div>
        <div class="slice-body">
          <div class="slice-title">✨ 敏感肌必入！回购5次的面膜</div>
          <div class="slice-tags">
            <span class="slice-tag">#面膜推荐</span>
            <span class="slice-tag">#敏感肌</span>
          </div>
          <div class="slice-time">📅 建议：今天 19:00</div>
        </div>
        <div class="slice-actions">
          <button class="btn btn-outline">✏️ 编辑</button>
          <button class="btn btn-outline">👁️ 预览</button>
        </div>
      </div>
      <div class="slice-card">
        <div class="slice-thumb" style="background:linear-gradient(135deg,#45aaf2,#2d98da)">
          <span class="slice-platform">🎵 抖音</span>🎬
        </div>
        <div class="slice-body">
          <div class="slice-title">😱 直播间最火单品竟然是它！</div>
          <div class="slice-tags">
            <span class="slice-tag">#直播高光</span>
            <span class="slice-tag">#好物推荐</span>
          </div>
          <div class="slice-time">📅 建议：明天 18:00</div>
        </div>
        <div class="slice-actions">
          <button class="btn btn-outline">✏️ 编辑</button>
          <button class="btn btn-outline">👁️ 预览</button>
        </div>
      </div>
    </div>

    <div class="doc-export">
      <button class="btn btn-outline">📊 导出 Excel 文案文档</button>
      <button class="btn btn-outline">📝 导出 TXT 文案文档</button>
    </div>
  </div>
</div>
</body>
</html>
