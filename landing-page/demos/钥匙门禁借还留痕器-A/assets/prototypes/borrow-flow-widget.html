<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>借用流程 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; gap: 24px; flex-wrap: wrap; }
.phone-frame { width: 375px; height: 720px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; flex-shrink: 0; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; position: relative; }
.nav-back { position: absolute; left: 16px; font-size: 20px; color: #333; cursor: pointer; }
.nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.step-label { font-size: 11px; color: #999; text-align: center; padding: 8px 0 0; }
.content { padding: 16px; overflow-y: auto; height: calc(100% - 52px); }

/* Step indicators */
.steps { display: flex; align-items: center; justify-content: center; padding: 12px 16px; gap: 4px; }
.step-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.step-active { background: #4A90D9; color: #fff; }
.step-done { background: #e8f5e9; color: #388e3c; }
.step-pending { background: #f0f0f0; color: #999; }
.step-line { width: 24px; height: 2px; background: #e0e0e0; }
.step-line.done { background: #388e3c; }

/* Form styles */
.item-preview { display: flex; align-items: center; padding: 12px; background: #fafafa; border-radius: 12px; margin-bottom: 16px; }
.item-preview-icon { width: 48px; height: 48px; background: #f0f0f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 12px; }
.item-preview-name { font-size: 15px; font-weight: 600; color: #333; }
.item-preview-code { font-size: 12px; color: #999; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 6px; display: block; }
.form-input { width: 100%; height: 44px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0 12px; font-size: 14px; }
.form-textarea { width: 100%; height: 80px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; font-size: 14px; resize: none; }

/* Camera */
.camera-area { width: 100%; height: 200px; background: #1a1a1a; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; margin-bottom: 12px; position: relative; }
.camera-icon { font-size: 48px; margin-bottom: 8px; }
.camera-text { font-size: 13px; color: #ccc; }
.photo-thumbs { display: flex; gap: 8px; }
.photo-thumb { width: 60px; height: 60px; border-radius: 8px; background: #e8f4fd; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; }
.photo-thumb-add { border: 2px dashed #ccc; background: #fff; font-size: 24px; color: #999; }

/* Signature */
.signature-area { width: 100%; height: 180px; border: 2px solid #e0e0e0; border-radius: 12px; position: relative; margin-bottom: 8px; background: #fafafa; }
.signature-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #ccc; }
.signature-line { position: absolute; bottom: 40px; left: 20px; right: 20px; border-bottom: 1px dashed #ccc; }
.signature-name { position: absolute; bottom: 48px; right: 24px; font-size: 20px; font-style: italic; color: #333; font-weight: 600; transform: rotate(-5deg); }
.sig-actions { display: flex; justify-content: space-between; }
.btn-clear { padding: 8px 16px; background: #f5f5f5; border: none; border-radius: 8px; font-size: 13px; color: #666; cursor: pointer; }

/* Confirm page */
.summary-card { background: #fafafa; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.summary-row:last-child { border-bottom: none; }
.summary-label { font-size: 13px; color: #999; }
.summary-value { font-size: 13px; color: #333; font-weight: 500; }

.btn-primary { width: 100%; height: 48px; background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
.phone-label { text-align: center; margin-top: 12px; font-size: 13px; color: #666; font-weight: 500; }
</style>
</head>
<body>
<!-- Step 1: Fill borrow info -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">借用信息</span>
  </div>
  <div class="steps">
    <div class="step-dot step-active">1</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">2</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">3</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">4</div>
  </div>
  <div class="content">
    <div class="item-preview">
      <div class="item-preview-icon">🔑</div>
      <div>
        <div class="item-preview-name">A栋大门钥匙</div>
        <div class="item-preview-code">编号 #K001 · 📍 物业前台</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">预计归还时间 *</label>
      <input class="form-input" type="text" placeholder="请选择预计归还时间" value="2026-06-27 18:00">
    </div>
    <div class="form-group">
      <label class="form-label">借用用途（选填）</label>
      <textarea class="form-textarea" placeholder="请简要说明借用用途...">A栋3单元业主报修水管，需借用大门钥匙进入</textarea>
    </div>
    <button class="btn-primary">下一步：拍照确认</button>
  </div>
</div>
<div class="phone-label">① 填写借用信息</div>
</div>

<!-- Step 2: Photo -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">拍照确认</span>
  </div>
  <div class="steps">
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-active">2</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">3</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">4</div>
  </div>
  <div class="content">
    <div class="step-label">请拍摄物品当前状态照片（至少1张）</div>
    <div class="camera-area">
      <div class="camera-icon">📷</div>
      <div class="camera-text">将物品放入框内，点击拍照</div>
      <div style="width:160px;height:120px;border:2px solid rgba(255,255,255,0.3);border-radius:8px;margin-top:12px;"></div>
    </div>
    <div class="photo-thumbs">
      <div class="photo-thumb">🔑</div>
      <div class="photo-thumb photo-thumb-add">+</div>
    </div>
    <button class="btn-primary">下一步：电子签名</button>
  </div>
</div>
<div class="phone-label">② 拍照确认</div>
</div>

<!-- Step 3: Signature -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">电子签名</span>
  </div>
  <div class="steps">
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-active">3</div>
    <div class="step-line"></div>
    <div class="step-dot step-pending">4</div>
  </div>
  <div class="content">
    <div class="step-label">请在下方签名板上手写签名确认</div>
    <div class="signature-area">
      <div class="signature-line"></div>
      <div class="signature-name">李小明</div>
    </div>
    <div class="sig-actions">
      <button class="btn-clear">🗑️ 清除重签</button>
    </div>
    <button class="btn-primary">下一步：确认借出</button>
  </div>
</div>
<div class="phone-label">③ 电子签名</div>
</div>

<!-- Step 4: Confirm -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">确认借出</span>
  </div>
  <div class="steps">
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-done">✓</div>
    <div class="step-line done"></div>
    <div class="step-dot step-active">4</div>
  </div>
  <div class="content">
    <div class="summary-card">
      <div class="summary-row">
        <span class="summary-label">物品名称</span>
        <span class="summary-value">A栋大门钥匙 (#K001)</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">借用人</span>
        <span class="summary-value">李小明</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">借用用途</span>
        <span class="summary-value">A栋3单元业主报修水管</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">预计归还</span>
        <span class="summary-value">2026-06-27 18:00</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">拍照凭证</span>
        <span class="summary-value">1 张照片 📷</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">电子签名</span>
        <span class="summary-value">已完成 ✓</span>
      </div>
    </div>
    <button class="btn-primary">确认借出</button>
  </div>
</div>
<div class="phone-label">④ 确认借出</div>
</div>
</body>
</html>
