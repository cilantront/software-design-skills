<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物品录入与管理 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 720px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; position: relative; }
.nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.nav-add { position: absolute; right: 16px; width: 32px; height: 32px; background: #4A90D9; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; cursor: pointer; }
.filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
.filter-chip { padding: 6px 14px; background: #f5f5f5; border-radius: 20px; font-size: 13px; color: #666; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
.filter-chip.active { background: #e8f4fd; color: #4A90D9; border-color: #4A90D9; }
.content { padding: 0 16px 16px; overflow-y: auto; height: calc(100% - 44px - 48px); }
.item-card { display: flex; align-items: center; padding: 14px; background: #fff; border: 1px solid #f0f0f0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
.item-card:active { background: #fafafa; }
.item-photo { width: 56px; height: 56px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-right: 12px; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.item-meta { font-size: 12px; color: #999; }
.item-status { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.status-available { background: #e8f5e9; color: #388e3c; }
.status-borrowed { background: #fff3e0; color: #f57c00; }
.status-unavailable { background: #fce4ec; color: #c62828; }
.item-code { display: inline-block; background: #f5f5f5; padding: 1px 6px; border-radius: 3px; font-size: 11px; color: #666; margin-left: 4px; }
.stats-bar { display: flex; gap: 12px; padding: 12px 16px; background: #fafafa; }
.stat-item { flex: 1; text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; color: #333; }
.stat-label { font-size: 11px; color: #999; margin-top: 2px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-title">物品管理</span>
    <div class="nav-add">+</div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num">24</div>
      <div class="stat-label">总物品</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#388e3c">18</div>
      <div class="stat-label">可借出</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#f57c00">5</div>
      <div class="stat-label">已借出</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:#c62828">1</div>
      <div class="stat-label">不可借</div>
    </div>
  </div>
  <div class="filter-bar">
    <span class="filter-chip active">全部</span>
    <span class="filter-chip">🔑 钥匙</span>
    <span class="filter-chip">💳 门禁卡</span>
    <span class="filter-chip">🪪 工牌</span>
    <span class="filter-chip">可借出</span>
    <span class="filter-chip">已借出</span>
  </div>
  <div class="content">
    <div class="item-card">
      <div class="item-photo">🔑</div>
      <div class="item-info">
        <div class="item-name">A栋大门钥匙 <span class="item-code">#K001</span></div>
        <div class="item-meta">📍 物业前台抽屉</div>
      </div>
      <span class="item-status status-available">可借</span>
    </div>
    <div class="item-card">
      <div class="item-photo">🔑</div>
      <div class="item-info">
        <div class="item-name">B栋配电房门钥匙 <span class="item-code">#K002</span></div>
        <div class="item-meta">📍 物业储物柜</div>
      </div>
      <span class="item-status status-borrowed">已借出</span>
    </div>
    <div class="item-card">
      <div class="item-photo">💳</div>
      <div class="item-info">
        <div class="item-name">地下车库门禁卡 <span class="item-code">#C001</span></div>
        <div class="item-meta">📍 物业前台</div>
      </div>
      <span class="item-status status-available">可借</span>
    </div>
    <div class="item-card">
      <div class="item-photo">🔑</div>
      <div class="item-info">
        <div class="item-name">天台门钥匙 <span class="item-code">#K003</span></div>
        <div class="item-meta">📍 物业储物柜</div>
      </div>
      <span class="item-status status-unavailable">不可借</span>
    </div>
    <div class="item-card">
      <div class="item-photo">🪪</div>
      <div class="item-info">
        <div class="item-name">访客临时工牌 <span class="item-code">#B001</span></div>
        <div class="item-meta">📍 前台接待</div>
      </div>
      <span class="item-status status-available">可借</span>
    </div>
  </div>
</div>
</body>
</html>
