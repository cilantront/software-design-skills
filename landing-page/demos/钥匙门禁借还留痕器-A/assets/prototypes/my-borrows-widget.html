<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的借用 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 720px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; }
.nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.tabs { display: flex; border-bottom: 1px solid #f0f0f0; }
.tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #999; cursor: pointer; position: relative; }
.tab.active { color: #4A90D9; font-weight: 600; }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: #4A90D9; border-radius: 2px; }
.tab .badge { display: inline-block; min-width: 16px; height: 16px; background: #e74c3c; color: #fff; font-size: 10px; line-height: 16px; text-align: center; border-radius: 8px; padding: 0 4px; margin-left: 4px; vertical-align: top; }
.content { padding: 12px 16px; overflow-y: auto; height: calc(100% - 44px - 45px); }
.record-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; position: relative; }
.record-card:active { background: #fafafa; }
.record-card.overdue { border-left: 4px solid #e74c3c; }
.record-card.borrowed { border-left: 4px solid #f57c00; }
.record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.record-item-name { font-size: 15px; font-weight: 600; color: #333; }
.record-status { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.status-borrowed { background: #fff3e0; color: #f57c00; }
.status-returned { background: #e8f5e9; color: #388e3c; }
.status-overdue { background: #fce4ec; color: #c62828; }
.record-meta { font-size: 12px; color: #999; line-height: 1.8; }
.record-meta span { margin-right: 12px; }
.record-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
.btn-return { padding: 8px 20px; background: #4A90D9; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-return.overdue { background: #e74c3c; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-title">我的借用</span>
  </div>
  <div class="tabs">
    <div class="tab active">全部 <span class="badge">3</span></div>
    <div class="tab">借出中 <span class="badge" style="background:#f57c00">1</span></div>
    <div class="tab">已归还</div>
    <div class="tab">超期 <span class="badge">1</span></div>
  </div>
  <div class="content">
    <!-- Overdue record -->
    <div class="record-card overdue">
      <div class="record-header">
        <span class="record-item-name">🔑 B栋配电房门钥匙</span>
        <span class="record-status status-overdue">超期</span>
      </div>
      <div class="record-meta">
        <span>📅 借出：2026-06-20 09:00</span><br>
        <span>⏰ 应还：2026-06-22 18:00</span><br>
        <span style="color:#e74c3c">⚠️ 已超期 4 天</span>
      </div>
      <div class="record-actions">
        <button class="btn-return overdue">立即归还</button>
      </div>
    </div>

    <!-- Borrowed record -->
    <div class="record-card borrowed">
      <div class="record-header">
        <span class="record-item-name">🔑 A栋大门钥匙</span>
        <span class="record-status status-borrowed">借出中</span>
      </div>
      <div class="record-meta">
        <span>📅 借出：2026-06-26 10:30</span><br>
        <span>⏰ 应还：2026-06-27 18:00</span>
      </div>
      <div class="record-actions">
        <button class="btn-return">归还</button>
      </div>
    </div>

    <!-- Returned record -->
    <div class="record-card">
      <div class="record-header">
        <span class="record-item-name">💳 地下车库门禁卡</span>
        <span class="record-status status-returned">已归还</span>
      </div>
      <div class="record-meta">
        <span>📅 借出：2026-06-15 14:00</span><br>
        <span>✅ 归还：2026-06-16 10:30</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
