<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归还流程 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; gap: 24px; flex-wrap: wrap; }
.phone-frame { width: 375px; height: 640px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; flex-shrink: 0; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; position: relative; }
.nav-back { position: absolute; left: 16px; font-size: 20px; color: #333; cursor: pointer; }
.nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.content { padding: 16px; overflow-y: auto; height: calc(100% - 44px); }
.borrow-info { background: #fafafa; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
.borrow-info-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
.borrow-info-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; padding: 4px 0; }
.camera-area { width: 100%; height: 180px; background: #1a1a1a; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; margin-bottom: 12px; }
.camera-icon { font-size: 48px; margin-bottom: 8px; }
.camera-text { font-size: 13px; color: #ccc; }
.photo-thumbs { display: flex; gap: 8px; margin-bottom: 16px; }
.photo-thumb { width: 60px; height: 60px; border-radius: 8px; background: #e8f4fd; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.photo-thumb-add { border: 2px dashed #ccc; background: #fff; font-size: 24px; color: #999; }
.btn-primary { width: 100%; height: 48px; background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
.phone-label { text-align: center; margin-top: 12px; font-size: 13px; color: #666; font-weight: 500; }
/* Success state */
.success-icon { font-size: 64px; text-align: center; margin: 24px 0 16px; }
.success-title { font-size: 18px; font-weight: 600; color: #333; text-align: center; margin-bottom: 8px; }
.success-desc { font-size: 14px; color: #999; text-align: center; margin-bottom: 24px; }
.success-detail { background: #fafafa; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.success-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.success-label { color: #999; }
.success-value { color: #333; font-weight: 500; }
</style>
</head>
<body>
<!-- Step 1: Photo return -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">归还物品</span>
  </div>
  <div class="content">
    <div class="borrow-info">
      <div class="borrow-info-title">借用信息</div>
      <div class="borrow-info-row">
        <span>物品</span>
        <span>🔑 A栋大门钥匙 (#K001)</span>
      </div>
      <div class="borrow-info-row">
        <span>借出时间</span>
        <span>2026-06-26 10:30</span>
      </div>
      <div class="borrow-info-row">
        <span>应还时间</span>
        <span>2026-06-27 18:00</span>
      </div>
    </div>
    <div style="font-size:14px;font-weight:500;color:#333;margin-bottom:10px;">拍摄归还物品照片</div>
    <div class="camera-area">
      <div class="camera-icon">📷</div>
      <div class="camera-text">将物品放入框内，点击拍照</div>
    </div>
    <div class="photo-thumbs">
      <div class="photo-thumb">🔑</div>
      <div class="photo-thumb photo-thumb-add">+</div>
    </div>
    <button class="btn-primary">确认归还</button>
  </div>
</div>
<div class="phone-label">① 拍照归还</div>
</div>

<!-- Step 2: Success -->
<div>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-title">归还结果</span>
  </div>
  <div class="content">
    <div class="success-icon">✅</div>
    <div class="success-title">归还提交成功</div>
    <div class="success-desc">等待管理员确认（或已自动确认）</div>
    <div class="success-detail">
      <div class="success-row">
        <span class="success-label">物品</span>
        <span class="success-value">A栋大门钥匙</span>
      </div>
      <div class="success-row">
        <span class="success-label">归还时间</span>
        <span class="success-value">2026-06-27 15:30</span>
      </div>
      <div class="success-row">
        <span class="success-label">归还照片</span>
        <span class="success-value">1 张 📷</span>
      </div>
      <div class="success-row">
        <span class="success-label">状态</span>
        <span class="success-value" style="color:#f57c00">待确认</span>
      </div>
    </div>
    <button class="btn-primary" style="background:#f5f5f5;color:#333;">返回我的借用</button>
  </div>
</div>
<div class="phone-label">② 归还成功</div>
</div>
</body>
</html>
