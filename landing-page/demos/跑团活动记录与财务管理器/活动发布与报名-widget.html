<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>活动发布与报名 Widget 原型</title>
  <style>
    :root{--bg:#0c0714;--card:#171024;--paper:#efe2bd;--paper2:#d9c38e;--purple:#7c3aed;--violet:#a78bfa;--green:#22c55e;--red:#ef4444;--text:#f7eed4;--muted:#b8a98a;--line:rgba(239,226,189,.18)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#2d1550 0,#0c0714 42%,#07040d 100%);font-family:"Fira Sans","Microsoft YaHei",Arial,sans-serif;color:var(--text);display:grid;place-items:center;padding:28px}
    .widget{width:min(1080px,100%);background:linear-gradient(145deg,rgba(23,16,36,.96),rgba(12,7,20,.96));border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 40px rgba(124,58,237,.22);overflow:hidden}
    .head{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;align-items:center}.title{font-size:22px;font-weight:800;letter-spacing:.04em}.sub{color:var(--muted);font-size:13px;margin-top:6px}.badge{border:1px solid rgba(167,139,250,.5);color:#ddd6fe;background:rgba(124,58,237,.16);padding:8px 12px;border-radius:999px;font-size:12px}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;padding:22px}@media(max-width:840px){.grid{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}}
    .panel{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:22px;padding:18px}.panel h2{margin:0 0 14px;font-size:16px}.form{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:620px){.row{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.input,.select,.textarea{width:100%;border:1px solid rgba(239,226,189,.2);background:#100a1b;color:var(--text);border-radius:14px;padding:12px 13px;outline:none;min-height:44px}.textarea{min-height:84px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(124,58,237,.22)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}.btn{min-height:44px;border:0;border-radius:14px;padding:0 16px;color:white;font-weight:700;cursor:pointer;transition:.2s;background:rgba(255,255,255,.1)}.btn:hover{filter:brightness(1.12);box-shadow:0 10px 24px rgba(0,0,0,.25)}.primary{background:linear-gradient(135deg,var(--purple),#5b21b6)}.success{background:linear-gradient(135deg,var(--green),#15803d)}.ghost{border:1px solid var(--line);background:transparent;color:var(--text)}
    .activity{background:linear-gradient(180deg,rgba(239,226,189,.1),rgba(239,226,189,.04));border:1px solid rgba(239,226,189,.22);border-radius:20px;padding:16px;margin-bottom:14px}.activity-top{display:flex;justify-content:space-between;gap:12px}.tag{font-size:12px;color:#d9c38e;border:1px solid rgba(217,195,142,.35);border-radius:999px;padding:5px 9px}.activity h3{margin:10px 0 8px;font-size:20px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;color:var(--muted);font-size:13px}.meter{height:10px;background:#0b0712;border-radius:99px;overflow:hidden;margin:14px 0 8px}.meter span{display:block;height:100%;width:83%;background:linear-gradient(90deg,var(--green),var(--violet))}.queue{display:grid;gap:8px;margin-top:12px}.person{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);padding:10px 12px;border-radius:14px}.avatar{width:28px;height:28px;border-radius:50%;display:inline-grid;place-items:center;background:#2b1747;border:1px solid rgba(167,139,250,.35);margin-right:8px}.left{display:flex;align-items:center}.state{font-size:12px;color:var(--green)}.wait{color:#fbbf24}.danger{color:#f87171}.hint{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px}.toast{display:none;margin-top:12px;border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.12);color:#bbf7d0;padding:10px 12px;border-radius:14px}.toast.show{display:block}
  </style>
</head>
<body>
  <main class="widget">
    <header class="head">
      <div><div class="title">活动发布与报名管理</div><div class="sub">Widget 级原型：创建活动、报名、满员候补与自动递补状态展示</div></div>
      <span class="badge">P0 · 小程序端核心流程</span>
    </header>
    <section class="grid">
      <div class="panel">
        <h2>KP 发布活动表单</h2>
        <form class="form" onsubmit="event.preventDefault();document.querySelector('#toast').classList.add('show')">
          <div><label>活动标题 *</label><input class="input" value="暗夜低语 · 克苏鲁短团" /></div>
          <div class="row"><div><label>模组名称 *</label><input class="input" value="克苏鲁的呼唤：暗夜低语" /></div><div><label>人数上限 *</label><input class="input" type="number" value="6" /></div></div>
          <div class="row"><div><label>开始时间 *</label><input class="input" value="2026-07-05 19:30" /></div><div><label>地点 *</label><input class="input" value="星门桌游店 2号包间" /></div></div>
          <div class="row"><div><label>费用预估</label><input class="input" value="约 ¥48/人，含场地与零食" /></div><div><label>报名规则</label><select class="select"><option>允许候补，活动前2小时截止报名</option><option>不允许候补</option></select></div></div>
          <div><label>活动描述</label><textarea class="textarea">适合新手，调查员需自备角色卡。请提前10分钟到场，迟到会影响积分。</textarea></div>
          <div class="actions"><button class="btn primary">发布活动</button><button type="button" class="btn ghost">保存草稿</button><button type="button" class="btn ghost">预览成员视角</button></div>
          <div id="toast" class="toast">活动已发布，系统将向社团成员发送活动通知。</div>
        </form>
      </div>
      <div class="panel">
        <h2>成员报名与候补状态</h2>
        <article class="activity">
          <div class="activity-top"><span class="tag">招募中</span><span class="tag">候补开启</span></div>
          <h3>暗夜低语 · 克苏鲁短团</h3>
          <div class="meta"><span>时间：7月5日 19:30</span><span>地点：星门桌游店</span><span>KP：阿洛</span><span>费用：约 ¥48/人</span></div>
          <div class="meter"><span></span></div>
          <div class="sub">已报名 5 / 6，候补 2 人</div>
          <div class="actions"><button class="btn success" onclick="this.textContent='报名成功';this.disabled=true">立即报名</button><button class="btn ghost">查看详情</button></div>
        </article>
        <div class="queue">
          <div class="person"><span class="left"><span class="avatar">A</span>林雾 · 调查员</span><span class="state">已报名</span></div>
          <div class="person"><span class="left"><span class="avatar">B</span>南星 · 记者</span><span class="state">已报名</span></div>
          <div class="person"><span class="left"><span class="avatar">C</span>白夜 · 医生</span><span class="state">已报名</span></div>
          <div class="person"><span class="left"><span class="avatar">D</span>清川 · 教授</span><span class="wait">候补 #1</span></div>
          <div class="person"><span class="left"><span class="avatar">E</span>小满 · 侦探</span><span class="wait">候补 #2</span></div>
        </div>
        <p class="hint">当已报名成员取消时，候补 #1 自动递补为“已报名”，并收到微信订阅消息；活动开始后成员不可自行取消。</p>
      </div>
    </section>
  </main>
</body>
</html>
