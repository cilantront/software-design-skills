<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>转录文件上传 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f3f4f6; padding: 24px; }
.widget-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #374151; padding-bottom: 8px; border-bottom: 2px solid #6366f1; display: inline-block; }
.card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 24px; margin-bottom: 16px; }
.upload-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 48px 24px; text-align: center; transition: all 0.3s; cursor: pointer; }
.upload-zone:hover { border-color: #6366f1; background: #f5f3ff; }
.upload-zone.dragging { border-color: #6366f1; background: #ede9fe; }
.upload-icon { font-size: 48px; margin-bottom: 16px; }
.upload-text { font-size: 16px; font-weight: 500; color: #374151; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #6b7280; }
.upload-formats { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.format-tag { background: #f3f4f6; color: #4b5563; padding: 4px 12px; border-radius: 16px; font-size: 12px; }
.quota-bar { margin-top: 16px; background: #f3f4f6; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.quota-info { font-size: 13px; color: #6b7280; }
.quota-info strong { color: #6366f1; }
.quota-progress { width: 200px; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.quota-progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #818cf8); border-radius: 3px; transition: width 0.3s; }

/* File list after upload */
.upload-list { margin-top: 20px; }
.upload-item { display: flex; align-items: center; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; }
.upload-item .file-icon { font-size: 24px; margin-right: 12px; }
.upload-item .file-info { flex: 1; }
.upload-item .file-name { font-size: 14px; font-weight: 500; }
.upload-item .file-size { font-size: 12px; color: #9ca3af; }
.upload-item .progress-bar { width: 120px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 6px 0; overflow: hidden; }
.upload-item .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.upload-item .progress-fill.uploading { background: #6366f1; }
.upload-item .progress-fill.done { background: #10b981; }
.upload-item .progress-fill.error { background: #ef4444; }
.upload-item .status { font-size: 12px; margin-left: 12px; }
.status.uploading { color: #6366f1; }
.status.done { color: #10b981; }
.status.error { color: #ef4444; }
.status.queued { color: #9ca3af; }

.btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
.btn-primary { background: #6366f1; color: white; }
.btn-secondary { background: white; color: #374151; border: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div class="widget-title">📤 转录文件上传 Widget</div>

<div class="card">
  <div class="upload-zone" id="uploadZone" onclick="simulateUpload()">
    <div class="upload-icon">📤</div>
    <div class="upload-text">拖拽文件到此处，或点击选择文件</div>
    <div class="upload-hint">支持主流会议工具的导出文件</div>
    <div class="upload-formats">
      <span class="format-tag">.txt</span>
      <span class="format-tag">.srt</span>
      <span class="format-tag">.vtt</span>
      <span class="format-tag">.json</span>
      <span class="format-tag">.docx</span>
    </div>
  </div>

  <div class="quota-bar">
    <div class="quota-info">免费版本月剩余额度：<strong>6 / 10 次</strong></div>
    <div class="quota-progress">
      <div class="quota-progress-fill" style="width:40%;"></div>
    </div>
  </div>
</div>

<div class="card">
  <h3 style="font-size:16px; font-weight:600; margin-bottom:12px;">上传队列</h3>
  <div class="upload-list">
    <div class="upload-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">产品周会_20260629.txt</div>
        <div class="file-size">2.3 MB</div>
        <div class="progress-bar"><div class="progress-fill done" style="width:100%;"></div></div>
      </div>
      <div class="status done">✅ 已上传，AI解析中...</div>
    </div>
    <div class="upload-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">技术评审_20260629.srt</div>
        <div class="file-size">5.1 MB</div>
        <div class="progress-bar"><div class="progress-fill uploading" style="width:67%;"></div></div>
      </div>
      <div class="status uploading">⏫ 上传中 67%</div>
    </div>
    <div class="upload-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">客户需求沟通_20260628.json</div>
        <div class="file-size">1.8 MB</div>
        <div class="progress-bar"><div class="progress-fill" style="width:0%; background:#e5e7eb;"></div></div>
      </div>
      <div class="status queued">⏳ 等待中</div>
    </div>
    <div class="upload-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">无效文件.pdf</div>
        <div class="file-size">3.2 MB</div>
        <div class="progress-bar"><div class="progress-fill error" style="width:100%;"></div></div>
      </div>
      <div class="status error">❌ 格式不支持</div>
    </div>
  </div>
</div>
</body>
</html>
