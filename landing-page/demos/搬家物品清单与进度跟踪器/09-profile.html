<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人中心 - 搬家物品清单与进度跟踪器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #F8F9FA; color: #2C3E50; max-width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 70px; }
/* Header */
.profile-header { background: linear-gradient(135deg, #4A90D9, #5BA0E6); padding: 32px 20px 40px; text-align: center; color: #fff; position: relative; border-radius: 0 0 24px 24px; }
.avatar { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.3); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid rgba(255,255,255,0.5); }
.nickname { font-size: 18px; font-weight: 600; }
.level-badge { display: inline-block; margin-top: 6px; padding: 4px 12px; border-radius: 12px; font-size: 12px; background: rgba(255,255,255,0.2); }
.upgrade-link { display: block; margin-top: 12px; font-size: 13px; color: #fff; text-decoration: underline; opacity: 0.9; }
/* Quota Card */
.quota-card { background: #fff; margin: -20px 16px 12px; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.quota-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; }
.quota-title a { font-size: 12px; color: #4A90D9; text-decoration: none; }
.quota-item { margin-bottom: 12px; }
.quota-item:last-child { margin-bottom: 0; }
.quota-item .top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.quota-item .used { font-weight: 600; }
.quota-item .limit { color: #95A5A6; }
.quota-bar { height: 8px; background: #EEF2F7; border-radius: 4px; overflow: hidden; }
.quota-bar .fill { height: 100%; border-radius: 4px; }
.quota-bar .fill-safe { background: linear-gradient(90deg, #4A90D9, #7EC8B7); }
.quota-bar .fill-warn { background: linear-gradient(90deg, #F59E0B, #EF4444); }
/* Menu Group */
.menu-group { background: #fff; margin: 8px; border-radius: 12px; overflow: hidden; }
.menu-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #F5F7FA; cursor: pointer; text-decoration: none; color: inherit; }
.menu-item:last-child { border-bottom: none; }
.menu-item .icon { font-size: 20px; margin-right: 12px; }
.menu-item .text { flex: 1; font-size: 14px; }
.menu-item .badge { padding: 2px 8px; border-radius: 8px; font-size: 10px; background: #F0F7FF; color: #4A90D9; margin-right: 8px; }
.menu-item .pro-badge { padding: 2px 8px; border-radius: 8px; font-size: 10px; background: linear-gradient(135deg, #F59E0B, #EF4444); color: #fff; margin-right: 8px; }
.menu-item .arrow { color: #C0C4CC; font-size: 14px; }
/* Current Task Card */
.task-card { background: #fff; margin: 8px; border-radius: 12px; padding: 14px; }
.task-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.task-card .title { font-size: 14px; font-weight: 600; }
.task-card .status { padding: 3px 10px; border-radius: 10px; font-size: 11px; background: #ECFDF5; color: #10B981; }
.task-card .info { font-size: 12px; color: #95A5A6; line-height: 1.6; }
/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 375px; background: #fff; border-top: 1px solid #F0F2F5; display: flex; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
.nav-item { flex: 1; text-align: center; text-decoration: none; color: inherit; }
.nav-item .nav-icon { font-size: 20px; }
.nav-item .nav-label { font-size: 10px; color: #95A5A6; }
.nav-item.active .nav-label { color: #4A90D9; font-weight: 600; }
</style>
</head>
<body>
<div class="profile-header">
  <div class="avatar">😊</div>
  <div class="nickname">小明</div>
  <div class="level-badge">🆓 免费版用户</div>
  <a href="10-upgrade.html" class="upgrade-link">升级专业版，解锁全部功能 →</a>
</div>

<div class="quota-card">
  <div class="quota-title">
    我的权益（免费版）
    <a href="10-upgrade.html">升级 →</a>
  </div>
  <div class="quota-item">
    <div class="top"><span class="used">物品 48件</span><span class="limit">/ 50件上限</span></div>
    <div class="quota-bar"><div class="fill fill-warn" style="width:96%"></div></div>
  </div>
  <div class="quota-item">
    <div class="top"><span class="used">打包箱 8个</span><span class="limit">/ 10个上限</span></div>
    <div class="quota-bar"><div class="fill fill-safe" style="width:80%"></div></div>
  </div>
  <div class="quota-item">
    <div class="top"><span class="used">搬家记录 1次</span><span class="limit">/ 仅保留最近1次</span></div>
    <div class="quota-bar"><div class="fill fill-safe" style="width:100%"></div></div>
  </div>
</div>

<!-- Current Task -->
<div class="task-card">
  <div class="header">
    <div class="title">🏠 当前搬家任务</div>
    <div class="status">打包中</div>
  </div>
  <div class="info">
    搬家去朝阳区新家<br>
    📅 2026-07-01 · 还有2天<br>
    📍 海淀区 → 朝阳区
  </div>
</div>

<!-- Menu -->
<div class="menu-group">
  <a href="03-checklist.html" class="menu-item">
    <span class="icon">📋</span>
    <span class="text">导出清单为Excel</span>
    <span class="arrow">→</span>
  </a>
  <div class="menu-item">
    <span class="icon">🔔</span>
    <span class="text">提醒设置</span>
    <span class="badge">提前1天</span>
    <span class="arrow">→</span>
  </div>
  <div class="menu-item">
    <span class="icon">👥</span>
    <span class="text">协同成员</span>
    <span class="pro-badge">专业版</span>
    <span class="arrow">→</span>
  </div>
  <div class="menu-item">
    <span class="icon">📊</span>
    <span class="text">进度报告导出</span>
    <span class="pro-badge">专业版</span>
    <span class="arrow">→</span>
  </div>
</div>

<div class="menu-group">
  <div class="menu-item">
    <span class="icon">💬</span>
    <span class="text">意见反馈</span>
    <span class="arrow">→</span>
  </div>
  <div class="menu-item">
    <span class="icon">ℹ️</span>
    <span class="text">关于</span>
    <span class="arrow">→</span>
  </div>
  <div class="menu-item">
    <span class="icon">📖</span>
    <span class="text">使用帮助</span>
    <span class="arrow">→</span>
  </div>
</div>

<div class="bottom-nav">
  <a href="01-home.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">首页</div></a>
  <a href="06-dashboard.html" class="nav-item"><div class="nav-icon">📊</div><div class="nav-label">进度</div></a>
  <a href="09-profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">我的</div></a>
</div>
</body>
</html>
