<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>每日记录填写 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f7f7f7; padding: 16px; max-width: 375px; margin: 0 auto; }
.widget { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.widget-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.widget-subtitle { font-size: 12px; color: #888; margin-bottom: 12px; }
.pet-badge { display: inline-flex; align-items: center; gap: 6px; background: #fef3c7; padding: 4px 12px; border-radius: 16px; font-size: 12px; margin-bottom: 12px; }
.dimension { background: #fafafa; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.dim-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
.dim-icon { font-size: 20px; }
.dim-title { font-size: 14px; font-weight: 600; color: #333; }
.form-item { margin-bottom: 8px; }
.form-label { font-size: 12px; color: #666; margin-bottom: 3px; display: block; }
.form-input, .form-select { width: 100%; padding: 8px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; background: #fff; }
.form-row { display: flex; gap: 8px; }
.form-row > * { flex: 1; }
.mood-selector { display: flex; gap: 8px; justify-content: space-around; }
.mood-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 6px; border-radius: 8px; flex: 1; }
.mood-item.active { background: #e8f8ee; }
.mood-item .emoji { font-size: 28px; }
.mood-item .text { font-size: 10px; color: #666; }
.photo-upload { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.photo-slot { aspect-ratio: 1; background: #f7f7f7; border: 1px dashed #d9d9d9; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #ccc; cursor: pointer; }
.photo-slot.filled { background: #fef3c7; border: none; }
.abnormal-section { background: #fff8f8; border: 1px solid #fecaca; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.abnormal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.abnormal-header .icon { font-size: 18px; }
.abnormal-header .title { font-size: 13px; font-weight: 600; color: #ef4444; }
.form-textarea { width: 100%; padding: 8px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; min-height: 50px; resize: none; background: #fff; }
.btn-primary { display: block; width: 100%; padding: 14px; background: #07c160; color: #fff; border: none; border-radius: 24px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.hint { background: #e0f2fe; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #0284c7; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">📝 每日记录填写</div>
  <div class="widget-subtitle">寄养人端 · 核心功能 Widget</div>
  <div class="pet-badge">🐕 豆豆 · 寄养第 4 天</div>
  <div class="hint">💡 支持弱网暂存，联网后自动同步 · 每日 20:00 提醒未填写</div>

  <div class="dimension">
    <div class="dim-header"><span class="dim-icon">🍖</span><span class="dim-title">饮食记录</span></div>
    <div class="form-row">
      <div class="form-item"><label class="form-label">喂食时间</label><input class="form-input" value="08:00, 18:00"></div>
    </div>
    <div class="form-row">
      <div class="form-item"><label class="form-label">食物种类</label><input class="form-input" value="狗粮"></div>
      <div class="form-item"><label class="form-label">食量</label><select class="form-select"><option>正常</option><option>偏多</option><option>偏少</option></select></div>
    </div>
    <div class="form-item"><label class="form-label">饮水量</label><input class="form-input" value="约500ml"></div>
  </div>

  <div class="dimension">
    <div class="dim-header"><span class="dim-icon">🚶</span><span class="dim-title">散步记录</span></div>
    <div class="form-row">
      <div class="form-item"><label class="form-label">散步时间</label><input class="form-input" value="07:30, 19:00"></div>
      <div class="form-item"><label class="form-label">时长(分钟)</label><input class="form-input" value="30"></div>
    </div>
    <div class="form-item"><label class="form-label">散步表现</label><input class="form-input" value="活泼，和其他狗狗玩耍"></div>
  </div>

  <div class="dimension">
    <div class="dim-header"><span class="dim-icon">💩</span><span class="dim-title">排便记录</span></div>
    <div class="form-row">
      <div class="form-item"><label class="form-label">排便次数</label><input class="form-input" value="3"></div>
      <div class="form-item"><label class="form-label">便便状态</label><select class="form-select"><option>正常 ✓</option><option>软便</option><option>腹泻</option></select></div>
    </div>
  </div>

  <div class="dimension">
    <div class="dim-header"><span class="dim-icon">😊</span><span class="dim-title">情绪状态</span></div>
    <div class="mood-selector">
      <div class="mood-item active"><span class="emoji">😊</span><span class="text">开心</span></div>
      <div class="mood-item"><span class="emoji">😐</span><span class="text">正常</span></div>
      <div class="mood-item"><span class="emoji">😰</span><span class="text">紧张</span></div>
      <div class="mood-item"><span class="emoji">😢</span><span class="text">低落</span></div>
    </div>
  </div>

  <div class="dimension">
    <div class="dim-header"><span class="dim-icon">📷</span><span class="dim-title">照片/视频</span></div>
    <div class="photo-upload">
      <div class="photo-slot filled">🐕</div>
      <div class="photo-slot filled">🐕</div>
      <div class="photo-slot filled">🎬</div>
      <div class="photo-slot">+</div>
    </div>
  </div>

  <div class="abnormal-section">
    <div class="abnormal-header"><span class="icon">⚠️</span><span class="title">异常情况（选填）</span></div>
    <div class="form-textarea" placeholder="如有异常请描述，将自动通知主人"></div>
  </div>

  <button class="btn-primary">保存今日日志</button>
</div>
</body>
</html>
