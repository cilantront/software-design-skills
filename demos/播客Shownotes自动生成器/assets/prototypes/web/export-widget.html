<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>导出格式选择 - Widget</title><style>*{box-sizing:border-box}body{margin:0;padding:24px;background:#0D0D1A;color:#E8E8F0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}.label{color:#8A8AA0;font-size:12px;margin-bottom:16px}.modal{max-width:780px;margin:auto;background:#1A1A2E;border:1px solid #2A2A45;border-radius:18px;padding:24px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}.fmt{background:#121225;border:1px solid #2A2A45;border-radius:14px;padding:20px;text-align:center;cursor:pointer}.fmt:hover,.fmt.active{border-color:#7C5CFF;background:rgba(124,92,255,.08)}.btns{display:flex;justify-content:flex-end;gap:10px}.btn{border:0;border-radius:10px;padding:11px 16px;cursor:pointer}.pri{background:linear-gradient(135deg,#7C5CFF,#4A9EFF);color:#fff}.sec{background:#25253D;color:#E8E8F0}</style></head><body><div class="label">Widget: 多格式导出（3.4.1）</div><div class="modal"><h2>导出 Shownotes</h2><p style="color:#8A8AA0">导出前将自动保存当前内容。</p><div class="grid"><div class="fmt active">📝<h3>Markdown</h3><p>.md 文件</p></div><div class="fmt">📄<h3>纯文本</h3><p>.txt 文件</p></div><div class="fmt">🟣<h3>小宇宙</h3><p>平台排版</p></div><div class="fmt">🟠<h3>喜马拉雅</h3><p>平台排版</p></div></div><div class="btns"><button class="btn sec" onclick="alert('已复制到剪贴板')">复制</button><button class="btn pri" onclick="alert('文件已下载')">下载文件</button></div></div></body></html>
