<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>费用 AA 管理 Widget 原型</title>
  <style>
    :root{--bg:#080611;--card:#171024;--line:rgba(239,226,189,.18);--text:#fff7df;--muted:#b8a98a;--purple:#7c3aed;--violet:#a78bfa;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#29134a 0,#080611 45%,#05030a 100%);font-family:"Fira Sans","Microsoft YaHei",Arial,sans-serif;color:var(--text);display:grid;place-items:center;padding:28px}.widget{width:min(1120px,100%);background:linear-gradient(145deg,rgba(23,16,36,.97),rgba(8,6,17,.98));border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}.head{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px}.title{font-size:22px;font-weight:850}.sub{margin-top:6px;color:var(--muted);font-size:13px}.badge{font-size:12px;border:1px solid rgba(34,197,94,.38);background:rgba(34,197,94,.12);color:#bbf7d0;border-radius:999px;padding:8px 12px}.grid{display:grid;grid-template-columns:1fr 1.15fr;gap:18px;padding:22px}@media(max-width:900px){.grid{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}}.panel{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:22px;padding:18px}.panel h2{margin:0 0 14px;font-size:16px}.items{display:grid;gap:10px}.item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04)}.item small{display:block;color:var(--muted);margin-top:4px}.amount{font-family:"Fira Code",monospace;font-weight:800}.input{width:100%;border:1px solid rgba(239,226,189,.2);background:#100a1b;color:var(--text);border-radius:14px;padding:12px 13px;outline:none;min-height:44px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;color:var(--muted);background:transparent;cursor:pointer}.tab.active{background:rgba(124,58,237,.18);color:#ddd6fe;border-color:rgba(167,139,250,.45)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}@media(max-width:620px){.summary,.row{grid-template-columns:1fr}}.stat{border:1px solid rgba(239,226,189,.18);background:rgba(239,226,189,.06);border-radius:16px;padding:12px}.stat b{display:block;font-size:20px;margin-top:6px}.stat span{font-size:12px;color:var(--muted)}.members{display:grid;gap:10px}.member{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);border-radius:16px}.state{font-size:12px;border-radius:999px;padding:5px 9px;background:rgba(245,158,11,.14);color:#fde68a}.paid{background:rgba(34,197,94,.13);color:#bbf7d0}.btn{min-height:44px;border:0;border-radius:14px;padding:0 16px;color:white;font-weight:750;cursor:pointer;transition:.2s;background:rgba(255,255,255,.1)}.btn:hover{filter:brightness(1.12);box-shadow:0 10px 24px rgba(0,0,0,.25)}.primary{background:linear-gradient(135deg,var(--purple),#5b21b6)}.success{background:linear-gradient(135deg,var(--green),#15803d)}.ghost{border:1px solid var(--line);background:transparent}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.note{border-left:3px solid var(--violet);padding:10px 12px;background:rgba(124,58,237,.1);border-radius:12px;color:#ddd6fe;font-size:13px;line-height:1.6}</style>
</head>
<body>
  <main class="widget">
    <header class="head"><div><div class="title">费用 AA 管理</div><div class="sub">Widget 级原型：费用项、分摊规则、个人账单与线下收款追踪</div></div><span class="badge">P0 · 账单透明化</span></header>
    <section class="grid">
      <aside class="panel">
        <h2>费用项录入</h2>
        <div class="items"><div class="item"><div><strong>场地费</strong><small>星门桌游店 · 4小时</small></div><div class="amount">¥180.00</div></div><div class="item"><div><strong>零食饮料</strong><small>餐饮 · 超市采购</small></div><div class="amount">¥76.50</div></div><div class="item"><div><strong>线索卡打印</strong><small>道具 · 彩印</small></div><div class="amount">¥24.00</div></div></div>
        <div style="height:14px"></div><div class="row"><input class="input" value="新费用项名称" /><input class="input" value="¥0.00" /></div>
        <div class="actions"><button class="btn primary">添加费用项</button><button class="btn ghost">导入历史模板</button></div>
        <div class="summary"><div class="stat"><span>总支出</span><b>¥280.50</b></div><div class="stat"><span>分摊人数</span><b>5</b></div><div class="stat"><span>人均</span><b>¥56.10</b></div></div>
        <p class="note">MVP 阶段不接入在线支付，成员线下转账后由 KP 标记已收款。</p>
      </aside>
      <section class="panel">
        <h2>账单生成与收款状态</h2>
        <div class="tabs"><button class="tab active">人头均摊</button><button class="tab">自定义金额</button><button class="tab">自定义比例</button><button class="tab">收款追踪</button></div>
        <div class="members"><div class="member"><strong>林雾</strong><span class="amount">¥56.10</span><span class="state paid">已收款</span></div><div class="member"><strong>南星</strong><span class="amount">¥56.10</span><span class="state">待支付</span></div><div class="member"><strong>白夜</strong><span class="amount">¥56.10</span><span class="state paid">已收款</span></div><div class="member"><strong>清川</strong><span class="amount">¥56.10</span><span class="state">待支付</span></div><div class="member"><strong>小满</strong><span class="amount">¥56.10</span><span class="state">待支付</span></div></div>
        <div class="summary"><div class="stat"><span>已收款</span><b>¥112.20</b></div><div class="stat"><span>未收款</span><b>¥168.30</b></div><div class="stat"><span>收款率</span><b>40%</b></div></div>
        <div class="actions"><button class="btn success">生成并通知成员</button><button class="btn primary">标记选中为已收款</button><button class="btn ghost">导出账单</button></div>
      </section>
    </section>
  </main>
</body>
</html>
