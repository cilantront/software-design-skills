<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成员邀请与管理 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 720px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 8px solid #1a1a1a; position: relative; }
.nav-bar { height: 44px; background: #fff; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
.nav-back { font-size: 20px; color: #333; margin-right: 12px; cursor: pointer; }
.nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.content { padding: 16px; overflow-y: auto; height: calc(100% - 44px); }
.invite-section { background: linear-gradient(135deg, #f0f7ff, #e8f4fd); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.invite-icon { width: 48px; height: 48px; background: #4A90D9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; }
.invite-info { flex: 1; }
.invite-title { font-size: 15px; font-weight: 600; color: #333; }
.invite-desc { font-size: 12px; color: #666; margin-top: 2px; }
.btn-invite { padding: 8px 16px; background: #4A90D9; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.search-bar { display: flex; align-items: center; background: #f5f5f5; border-radius: 8px; padding: 0 12px; height: 40px; margin-bottom: 16px; }
.search-bar input { flex: 1; border: none; background: none; font-size: 14px; outline: none; }
.member-list { list-style: none; }
.member-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
.member-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e8f4fd; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #4A90D9; margin-right: 12px; }
.member-info { flex: 1; }
.member-name { font-size: 15px; font-weight: 500; color: #333; }
.member-time { font-size: 12px; color: #999; margin-top: 2px; }
.role-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.role-admin { background: #fff3e0; color: #f57c00; }
.role-member { background: #e8f5e9; color: #388e3c; }
.member-count { font-size: 13px; color: #999; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">成员管理</span>
  </div>
  <div class="content">
    <div class="invite-section">
      <div class="invite-icon">📤</div>
      <div class="invite-info">
        <div class="invite-title">邀请成员加入</div>
        <div class="invite-desc">分享链接或二维码邀请新成员</div>
      </div>
      <button class="btn-invite">邀请</button>
    </div>

    <div class="member-count">共 8 名成员</div>
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" placeholder="搜索成员姓名">
    </div>

    <ul class="member-list">
      <li class="member-item">
        <div class="member-avatar">👤</div>
        <div class="member-info">
          <div class="member-name">张经理</div>
          <div class="member-time">加入于 2026-06-01</div>
        </div>
        <span class="role-tag role-admin">管理员</span>
      </li>
      <li class="member-item">
        <div class="member-avatar">👤</div>
        <div class="member-info">
          <div class="member-name">李小明</div>
          <div class="member-time">加入于 2026-06-05</div>
        </div>
        <span class="role-tag role-member">成员</span>
      </li>
      <li class="member-item">
        <div class="member-avatar">👤</div>
        <div class="member-info">
          <div class="member-name">王芳</div>
          <div class="member-time">加入于 2026-06-08</div>
        </div>
        <span class="role-tag role-member">成员</span>
      </li>
      <li class="member-item">
        <div class="member-avatar">👤</div>
        <div class="member-info">
          <div class="member-name">赵大勇</div>
          <div class="member-time">加入于 2026-06-10</div>
        </div>
        <span class="role-tag role-member">成员</span>
      </li>
      <li class="member-item">
        <div class="member-avatar">👤</div>
        <div class="member-info">
          <div class="member-name">刘建国</div>
          <div class="member-time">加入于 2026-06-12</div>
        </div>
        <span class="role-tag role-member">成员</span>
      </li>
    </ul>
  </div>
</div>
</body>
</html>
