<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模板管理组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 24px; }
.container { max-width: 900px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h2 { font-size: 18px; color: #333; margin-bottom: 16px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.filter-tabs { display: flex; gap: 8px; }
.filter-tab { padding: 6px 14px; font-size: 13px; border-radius: 6px; border: 1px solid #eee; background: #fff; cursor: pointer; color: #666; }
.filter-tab.active { background: #333; color: #fff; border-color: #333; }
.btn-create { padding: 8px 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
.template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.template-card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
.template-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.15); }
.template-preview { height: 160px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
.template-badge { position: absolute; top: 8px; right: 8px; padding: 2px 8px; font-size: 10px; border-radius: 4px; }
.badge-system { background: #e6f7ff; color: #1890ff; }
.badge-custom { background: #f6ffed; color: #52c41a; }
.template-info { padding: 12px; }
.template-name { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 4px; }
.template-desc { font-size: 12px; color: #999; margin-bottom: 8px; }
.template-meta { display: flex; justify-content: space-between; align-items: center; }
.template-tags { display: flex; gap: 4px; }
.template-tag { padding: 2px 6px; font-size: 10px; background: #f5f5f5; border-radius: 3px; color: #666; }
.template-actions { display: flex; gap: 4px; }
.action-btn { padding: 4px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; color: #666; }
.action-btn:hover { border-color: #667eea; color: #667eea; }
.empty-upgrade { grid-column: 1/-1; padding: 40px; text-align: center; border: 2px dashed #eee; border-radius: 10px; }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: #999; margin-bottom: 12px; }
.empty-btn { padding: 8px 20px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2>🎨 模板管理</h2>

<div class="header">
  <div class="filter-tabs">
    <div class="filter-tab active">全部</div>
    <div class="filter-tab">系统模板</div>
    <div class="filter-tab">我的模板</div>
  </div>
  <button class="btn-create">+ 创建自定义模板</button>
</div>

<div class="template-grid">
  <div class="template-card">
    <div class="template-preview" style="background:#fff5f5;">
      📕
      <span class="template-badge badge-system">系统</span>
    </div>
    <div class="template-info">
      <div class="template-name">小红书标准模板</div>
      <div class="template-desc">短段落+emoji+标签前置风格</div>
      <div class="template-meta">
        <div class="template-tags">
          <span class="template-tag">小红书</span>
          <span class="template-tag">活泼</span>
        </div>
        <div class="template-actions">
          <button class="action-btn">预览</button>
          <button class="action-btn">应用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="template-card">
    <div class="template-preview" style="background:#f0f8ff;">
      📱
      <span class="template-badge badge-system">系统</span>
    </div>
    <div class="template-info">
      <div class="template-name">公众号深度模板</div>
      <div class="template-desc">长段落+结构化+正式语气</div>
      <div class="template-meta">
        <div class="template-tags">
          <span class="template-tag">公众号</span>
          <span class="template-tag">专业</span>
        </div>
        <div class="template-actions">
          <button class="action-btn">预览</button>
          <button class="action-btn">应用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="template-card">
    <div class="template-preview" style="background:#f0fff0;">
      💡
      <span class="template-badge badge-system">系统</span>
    </div>
    <div class="template-info">
      <div class="template-name">知乎专业模板</div>
      <div class="template-desc">深度论述+数据引用+逻辑清晰</div>
      <div class="template-meta">
        <div class="template-tags">
          <span class="template-tag">知乎</span>
          <span class="template-tag">深度</span>
        </div>
        <div class="template-actions">
          <button class="action-btn">预览</button>
          <button class="action-btn">应用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="template-card">
    <div class="template-preview" style="background:#fffef0;">
      🎯
      <span class="template-badge badge-custom">自定义</span>
    </div>
    <div class="template-info">
      <div class="template-name">我的品牌模板 v2</div>
      <div class="template-desc">自定义品牌色系和段落风格</div>
      <div class="template-meta">
        <div class="template-tags">
          <span class="template-tag">通用</span>
          <span class="template-tag">品牌</span>
        </div>
        <div class="template-actions">
          <button class="action-btn">编辑</button>
          <button class="action-btn">应用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="template-card">
    <div class="template-preview" style="background:#f9f0ff;">
      🎨
      <span class="template-badge badge-custom">自定义</span>
    </div>
    <div class="template-info">
      <div class="template-name">知识讲师简约版</div>
      <div class="template-desc">适合课程精要分享</div>
      <div class="template-meta">
        <div class="template-tags">
          <span class="template-tag">通用</span>
          <span class="template-tag">简约</span>
        </div>
        <div class="template-actions">
          <button class="action-btn">编辑</button>
          <button class="action-btn">应用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="template-card" style="border:2px dashed #eee;">
    <div class="template-preview" style="background:#fafafa;">
      <div style="text-align:center;">
        <div style="font-size:32px; margin-bottom:8px;">+</div>
        <div style="font-size:13px; color:#999;">创建新模板</div>
      </div>
    </div>
    <div class="template-info">
      <div class="template-name" style="color:#999;">新建自定义模板</div>
      <div class="template-desc">Pro版专享 · 已用 2/10</div>
    </div>
  </div>
</div>

</div>
</div>
</body>
</html>
