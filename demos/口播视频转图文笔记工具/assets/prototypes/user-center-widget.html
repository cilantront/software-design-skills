<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 24px; }
.container { max-width: 900px; margin: 0 auto; }
.profile-header { display: flex; align-items: center; gap: 20px; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
.avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: 600; }
.profile-info { flex: 1; }
.profile-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 4px; }
.profile-plan { display: inline-block; padding: 2px 10px; background: #f5f5f5; border-radius: 12px; font-size: 12px; color: #666; margin-bottom: 4px; }
.profile-plan.pro { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.profile-meta { font-size: 12px; color: #999; }
.quota-card { padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
.quota-title { font-size: 14px; color: #666; margin-bottom: 12px; }
.quota-bar-bg { width: 100%; height: 12px; background: #f0f0f0; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
.quota-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 6px; }
.quota-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
.quota-upgrade { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: linear-gradient(135deg, #f0f3ff, #faf0ff); border-radius: 8px; margin-top: 16px; }
.upgrade-text { font-size: 14px; color: #333; }
.upgrade-text strong { color: #667eea; }
.upgrade-btn { padding: 8px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card { padding: 16px; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
.stat-num { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: #999; }
.history-section { padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 16px; font-weight: 500; color: #333; }
.section-link { font-size: 13px; color: #667eea; cursor: pointer; }
.history-list { }
.history-item { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.history-item:last-child { border-bottom: none; }
.history-thumb { width: 80px; height: 45px; background: #f5f5f5; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.history-info { flex: 1; }
.history-name { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 4px; }
.history-meta { font-size: 12px; color: #999; }
.history-platform { padding: 2px 8px; background: #f5f5f5; border-radius: 4px; font-size: 11px; color: #666; }
.history-actions { display: flex; gap: 6px; }
.hist-btn { padding: 4px 10px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; color: #666; }
.hist-btn:hover { border-color: #667eea; color: #667eea; }
</style>
</head>
<body>
<div class="container">

<div class="profile-header">
  <div class="avatar">K</div>
  <div class="profile-info">
    <div class="profile-name">知识创作者小明</div>
    <span class="profile-plan">免费版</span>
    <div class="profile-meta">注册于 2026-06-15 · 138****8888</div>
  </div>
  <button class="upgrade-btn" style="margin:0;">升级Pro版</button>
</div>

<div class="quota-card">
  <div class="quota-title">本月使用配额</div>
  <div class="quota-bar-bg">
    <div class="quota-bar-fill" style="width:20%;"></div>
  </div>
  <div class="quota-info">
    <span>已使用 <strong>1</strong> 次</span>
    <span>剩余 <strong>4</strong> 次 / 共 5 次</span>
  </div>
  <div class="quota-upgrade">
    <span class="upgrade-text">升级 <strong>Pro版 ¥29/月</strong>，享受不限次数转换 + 自定义模板 + 批量导出</span>
    <button class="upgrade-btn">立即升级</button>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-num">1</div>
    <div class="stat-label">累计转换</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">3</div>
    <div class="stat-label">导出文件</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">12天</div>
    <div class="stat-label">使用天数</div>
  </div>
</div>

<div class="history-section">
  <div class="section-header">
    <span class="section-title">最近转换记录</span>
    <span class="section-link">查看全部 →</span>
  </div>
  <div class="history-list">
    <div class="history-item">
      <div class="history-thumb">🎬</div>
      <div class="history-info">
        <div class="history-name">知识分享_第12期.mp4</div>
        <div class="history-meta">2026-06-28 14:30 · 时长 08:45</div>
      </div>
      <span class="history-platform">📕 小红书</span>
      <div class="history-actions">
        <button class="hist-btn">查看</button>
        <button class="hist-btn">导出</button>
        <button class="hist-btn">删除</button>
      </div>
    </div>
  </div>
</div>

</div>
</body>
</html>
