<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扫码确认 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; padding: 20px; background: #f5f5f5; }
h2 { font-size: 16px; margin-bottom: 15px; color: #333; }
.widget-container { background: #fff; border-radius: 12px; padding: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.scan-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #333; }
.scan-area { background: #000; height: 220px; display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 15px; border-radius: 8px; }
.scan-frame { width: 180px; height: 180px; border: 2px solid #07c160; border-radius: 8px; position: relative; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.scan-line { position: absolute; left: 5%; right: 5%; height: 2px; background: #07c160; top: 50%; animation: scan 2s infinite; }
@keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
.scan-corner { position: absolute; width: 25px; height: 25px; border: 3px solid #07c160; }
.scan-corner.tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
.scan-corner.tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
.scan-corner.bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
.scan-corner.br { bottom: -3px; right: -3px; border-left: none; border-top: none; }
.scan-hint { text-align: center; font-size: 12px; color: #666; margin-bottom: 15px; }
.material-card { background: #f8f8f8; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
.mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e5e5e5; }
.mc-name { font-size: 15px; font-weight: 600; color: #333; }
.mc-status { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: #fff7e6; color: #fa8c16; }
.mc-row { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
.mc-row-label { color: #999; }
.status-label { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 10px; }
.status-btns { display: flex; gap: 10px; margin-bottom: 15px; }
.status-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.status-btn .icon { font-size: 20px; }
.btn-ok { background: #f6ffed; color: #52c41a; border: 2px solid #b7eb8f; }
.btn-ok.selected { background: #52c41a; color: #fff; }
.btn-miss { background: #fff1f0; color: #f5222d; border: 2px solid #ffa39e; }
.btn-miss.selected { background: #f5222d; color: #fff; }
.btn-damage { background: #fff7e6; color: #fa8c16; border: 2px solid #ffd591; }
.btn-damage.selected { background: #fa8c16; color: #fff; }
.remark-group { margin-bottom: 15px; }
.remark-label { font-size: 12px; color: #666; margin-bottom: 5px; display: block; }
.remark-input { width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 5px; font-size: 12px; }
.photo-upload { display: flex; gap: 8px; margin-bottom: 15px; }
.photo-btn { padding: 8px 15px; background: #f5f5f5; border: 1px dashed #d9d9d9; border-radius: 5px; font-size: 12px; cursor: pointer; }
.photo-preview { width: 50px; height: 50px; background: #e0e0e0; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
.form-actions { display: flex; gap: 10px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-cancel { background: #f5f5f5; color: #666; }
.btn-submit { background: #07c160; color: #fff; }
</style>
</head>
<body>
<h2>📷 扫码确认 Widget</h2>
<div class="widget-container">
  <div class="scan-title">扫码确认物料状态</div>
  <div class="scan-area">
    <div class="scan-frame">
      <div class="scan-line"></div>
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
    </div>
  </div>
  <div class="scan-hint">将二维码放入框内，即可自动扫描</div>

  <div class="material-card">
    <div class="mc-header">
      <div class="mc-name">🖼️ 易拉宝</div>
      <div class="mc-status">待确认</div>
    </div>
    <div class="mc-row">
      <span class="mc-row-label">数量</span>
      <span>2</span>
    </div>
    <div class="mc-row">
      <span class="mc-row-label">分类</span>
      <span>展架</span>
    </div>
    <div class="mc-row">
      <span class="mc-row-label">负责人</span>
      <span>张三</span>
    </div>
    <div class="mc-row">
      <span class="mc-row-label">所属活动</span>
      <span>春季招聘会</span>
    </div>
  </div>

  <div class="status-label">选择状态 <span style="color:#f5222d;">*</span></div>
  <div class="status-btns">
    <button class="status-btn btn-ok selected">
      <span class="icon">✓</span>
      <span>正常</span>
    </button>
    <button class="status-btn btn-miss">
      <span class="icon">✗</span>
      <span>缺失</span>
    </button>
    <button class="status-btn btn-damage">
      <span class="icon">⚠</span>
      <span>损坏</span>
    </button>
  </div>

  <div class="remark-group">
    <label class="remark-label">备注（可选）</label>
    <input class="remark-input" placeholder="如：缺少配件、需要补采等">
  </div>

  <div class="remark-group">
    <label class="remark-label">拍照记录（损坏时必填）</label>
    <div class="photo-upload">
      <div class="photo-preview">📷</div>
      <button class="photo-btn">+ 拍照</button>
      <button class="photo-btn">从相册选择</button>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn btn-cancel">取消</button>
    <button class="btn btn-submit">确认提交</button>
  </div>
</div>
</body>
</html>
