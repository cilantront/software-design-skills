<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>工作台总览 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f3f4f6; padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px; }
.stat-label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-change { font-size: 12px; margin-top: 4px; }
.stat-change.up { color: #10b981; }
.stat-change.down { color: #ef4444; }
.danger .stat-value { color: #ef4444; }
.warning .stat-value { color: #f59e0b; }
.card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.recent-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
.recent-item:last-child { border-bottom: none; }
.file-icon { width: 36px; height: 36px; background: #ede9fe; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
.file-info { flex: 1; }
.file-name { font-size: 14px; font-weight: 500; }
.file-time { font-size: 12px; color: #9ca3af; }
.status-badge { display: inline-flex; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-badge.review { background: #fef3c7; color: #b45309; }
.status-badge.done { background: #d1fae5; color: #047857; }
.status-badge.processing { background: #dbeafe; color: #1d4ed8; }
.chart-container { display: flex; align-items: flex-end; gap: 8px; height: 80px; margin-top: 12px; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; transition: 0.3s; cursor: pointer; }
.chart-bar:hover { opacity: 0.8; }
.chart-labels { display: flex; gap: 8px; margin-top: 8px; }
.chart-labels div { flex: 1; text-align: center; font-size: 11px; color: #9ca3af; }
.widget-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #374151; padding-bottom: 8px; border-bottom: 2px solid #6366f1; display: inline-block; }
</style>
</head>
<body>
<div class="widget-title">📊 工作台总览 Widget</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">总待办数</div>
    <div class="stat-value">47</div>
    <div class="stat-change up">↑ 12% 较上周</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">进行中</div>
    <div class="stat-value">18</div>
    <div class="stat-change up">↑ 3 条新增</div>
  </div>
  <div class="stat-card danger">
    <div class="stat-label">已逾期</div>
    <div class="stat-value">5</div>
    <div class="stat-change down">↑ 2 条新增</div>
  </div>
  <div class="stat-card warning">
    <div class="stat-label">本周到期</div>
    <div class="stat-value">8</div>
    <div class="stat-change">需关注</div>
  </div>
</div>

<div style="display:grid; grid-template-columns:2fr 1fr; gap:16px;">
  <div class="card">
    <h3>最近处理</h3>
    <div class="recent-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">产品周会_20260628.txt</div>
        <div class="file-time">今天 10:30 · 30分钟会议</div>
      </div>
      <span class="status-badge review">待审核</span>
    </div>
    <div class="recent-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">技术评审_前端架构_20260627.json</div>
        <div class="file-time">昨天 14:00 · 45分钟会议</div>
      </div>
      <span class="status-badge done">已完成</span>
    </div>
    <div class="recent-item">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">每日站会_20260624.txt</div>
        <div class="file-time">6月24日 · 15分钟会议</div>
      </div>
      <span class="status-badge processing">解析中</span>
    </div>
  </div>

  <div class="card">
    <h3>📈 本周完成率</h3>
    <div class="chart-container">
      <div class="chart-bar" style="height:40%; background:#e0e7ff;" title="周一: 40%"></div>
      <div class="chart-bar" style="height:60%; background:#e0e7ff;" title="周二: 60%"></div>
      <div class="chart-bar" style="height:80%; background:#c7d2fe;" title="周三: 80%"></div>
      <div class="chart-bar" style="height:50%; background:#c7d2fe;" title="周四: 50%"></div>
      <div class="chart-bar" style="height:70%; background:#818cf8;" title="周五: 70%"></div>
      <div class="chart-bar" style="height:90%; background:#6366f1;" title="周六: 90%"></div>
      <div class="chart-bar" style="height:65%; background:#6366f1;" title="今天: 65%"></div>
    </div>
    <div class="chart-labels">
      <div>周一</div><div>周二</div><div>周三</div><div>周四</div><div>周五</div><div>周六</div><div>今天</div>
    </div>
  </div>
</div>
</body>
</html>
