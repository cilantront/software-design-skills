<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI处理进度 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 24px; }
.widget-container { max-width: 700px; margin: 0 auto; }
.label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 12px; }

.process-card { background: #fff; border-radius: 12px; padding: 24px; }
.process-steps { display: flex; justify-content: space-between; margin-bottom: 24px; position: relative; }
.process-steps::before { content: ''; position: absolute; top: 20px; left: 60px; right: 60px; height: 2px; background: #e0e0e0; }
.step { text-align: center; position: relative; z-index: 1; }
.step-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-weight: 600; font-size: 14px; transition: all 0.3s; }
.step-circle.done { background: #4caf50; color: #fff; }
.step-circle.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; animation: pulse 2s infinite; }
.step-circle.pending { background: #e0e0e0; color: #999; }
.step-label { font-size: 12px; color: #888; }
.step-label.active { color: #667eea; font-weight: 500; }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(102,126,234,0.4); } 50% { box-shadow: 0 0 0 8px rgba(102,126,234,0); } }

.progress-section { margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-header .label { font-size: 14px; font-weight: 500; }
.progress-header .percent { font-size: 14px; color: #667eea; font-weight: 600; }
.progress-bar { height: 10px; background: #e8e8e8; border-radius: 5px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 5px; transition: width 1s; }
.progress-sub { font-size: 12px; color: #888; margin-top: 6px; }

.highlights-preview { margin-top: 20px; }
.highlights-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.highlight-list { display: flex; flex-direction: column; gap: 8px; }
.highlight-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
.highlight-item .hl-icon { font-size: 20px; }
.highlight-item .hl-info { flex: 1; }
.highlight-item .hl-time { font-size: 12px; color: #888; }
.highlight-item .hl-desc { font-size: 13px; margin-top: 2px; }
.highlight-item .hl-score { font-size: 12px; color: #ffd700; font-weight: 600; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
.tag-emotion { background: #fff3e0; color: #e65100; }
.tag-quote { background: #e8f5e9; color: #2e7d32; }
.tag-interaction { background: #e3f2fd; color: #1565c0; }
</style>
</head>
<body>
<div class="widget-container">
  <div class="label">🤖 AI处理进度组件</div>

  <div class="process-card">
    <div class="process-steps">
      <div class="step">
        <div class="step-circle done">✓</div>
        <div class="step-label">上传完成</div>
      </div>
      <div class="step">
        <div class="step-circle done">✓</div>
        <div class="step-label">ASR转写</div>
      </div>
      <div class="step">
        <div class="step-circle active">3</div>
        <div class="step-label active">高光分析</div>
      </div>
      <div class="step">
        <div class="step-circle pending">4</div>
        <div class="step-label">生成缩略图</div>
      </div>
      <div class="step">
        <div class="step-circle pending">5</div>
        <div class="step-label">完成</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="label">整体进度</span>
        <span class="percent">65%</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:65%"></div></div>
      <div class="progress-sub">预计剩余 7 分钟 · 视频时长 1:45:20</div>
    </div>

    <div class="highlights-preview">
      <div class="highlights-title">🎯 已识别的高光片段（实时更新）</div>
      <div class="highlight-list">
        <div class="highlight-item">
          <span class="hl-icon">🎤</span>
          <div class="hl-info">
            <div class="hl-time">00:05:12 - 00:06:30</div>
            <div class="hl-desc"><span class="tag tag-emotion">情绪峰值</span> 讲解YAGNI原则，情绪高涨</div>
          </div>
          <span class="hl-score">⭐ 92</span>
        </div>
        <div class="highlight-item">
          <span class="hl-icon">💡</span>
          <div class="hl-info">
            <div class="hl-time">00:12:20 - 00:13:45</div>
            <div class="hl-desc"><span class="tag tag-quote">卖点金句</span> 如何判断真需求vs伪需求</div>
          </div>
          <span class="hl-score">⭐ 88</span>
        </div>
        <div class="highlight-item">
          <span class="hl-icon">🔥</span>
          <div class="hl-info">
            <div class="hl-time">00:18:10 - 00:19:30</div>
            <div class="hl-desc"><span class="tag tag-interaction">互动热点</span> MVP概念讲解，弹幕密集</div>
          </div>
          <span class="hl-score">⭐ 85</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
