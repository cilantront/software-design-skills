<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频上传 - Widget原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 24px; }
.widget-container { max-width: 600px; margin: 0 auto; }

.upload-zone {
  border: 2px dashed #c0c0c0;
  border-radius: 16px;
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #fff;
}
.upload-zone:hover { border-color: #667eea; background: #f5f5ff; }
.upload-zone.dragover { border-color: #667eea; background: #f0f0ff; transform: scale(1.01); }
.upload-zone .icon { font-size: 48px; margin-bottom: 16px; }
.upload-zone .title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 8px; }
.upload-zone .subtitle { font-size: 14px; color: #888; margin-bottom: 16px; }
.upload-zone .formats { font-size: 12px; color: #aaa; }
.upload-zone .btn-select { display: inline-block; margin-top: 16px; padding: 10px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 8px; font-size: 14px; font-weight: 500; }

.upload-progress { background: #fff; border-radius: 12px; padding: 20px; margin-top: 16px; }
.upload-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.upload-item:last-child { border-bottom: none; }
.upload-item .file-info { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.upload-item .file-icon { font-size: 24px; }
.upload-item .file-name { font-size: 14px; font-weight: 500; flex: 1; }
.upload-item .file-status { font-size: 12px; }
.upload-item .file-status.done { color: #4caf50; }
.upload-item .file-status.uploading { color: #667eea; }
.progress-bar { height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-bar .fill.done { background: #4caf50; }
.progress-bar .fill.uploading { background: linear-gradient(90deg, #667eea, #764ba2); }
.file-meta { font-size: 12px; color: #888; margin-top: 4px; display: flex; justify-content: space-between; }

.label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 12px; }
.section { margin-bottom: 20px; }
</style>
</head>
<body>
<div class="widget-container">
  <div class="label">📤 视频上传组件</div>

  <div class="upload-zone" id="uploadZone">
    <div class="icon">📁</div>
    <div class="title">拖拽直播回放视频到这里</div>
    <div class="subtitle">或点击下方按钮选择文件，支持批量上传</div>
    <div class="btn-select">选择文件</div>
    <div class="formats">支持 MP4 / AVI / MOV / FLV | 单文件最大 4GB</div>
  </div>

  <div class="upload-progress">
    <div class="upload-item">
      <div class="file-info">
        <span class="file-icon">🎬</span>
        <span class="file-name">6月28日直播回放.mp4</span>
        <span class="file-status uploading">上传中 78%</span>
      </div>
      <div class="progress-bar"><div class="fill uploading" style="width:78%"></div></div>
      <div class="file-meta"><span>936MB / 1.2GB · 12.5MB/s</span><span>预计剩余 2分钟</span></div>
    </div>
    <div class="upload-item">
      <div class="file-info">
        <span class="file-icon">🎬</span>
        <span class="file-name">知识分享直播.mp4</span>
        <span class="file-status done">✅ 上传完成</span>
      </div>
      <div class="progress-bar"><div class="fill done" style="width:100%"></div></div>
      <div class="file-meta"><span>860MB · 1:45:20</span><span>已自动开始AI处理</span></div>
    </div>
  </div>
</div>

<script>
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('dragover'); });
</script>
</body>
</html>
