<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>物品详情 - 搬家物品清单与进度跟踪器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #F8F9FA; color: #2C3E50; max-width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.nav-bar { background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #F0F2F5; }
.nav-bar .back { font-size: 20px; cursor: pointer; text-decoration: none; color: #2C3E50; }
.nav-bar h2 { font-size: 17px; font-weight: 600; flex: 1; }
.nav-bar .delete-btn { color: #EF4444; font-size: 14px; cursor: pointer; }
/* Image */
.item-image { background: #fff; padding: 20px; text-align: center; }
.item-image .photo-area { width: 200px; height: 200px; background: #F0F2F5; border-radius: 12px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #95A5A6; font-size: 13px; cursor: pointer; }
.item-image .photo-area .icon { font-size: 40px; margin-bottom: 8px; }
/* Status Selector */
.status-section { background: #fff; margin-top: 8px; padding: 16px; }
.section-title { font-size: 13px; color: #95A5A6; margin-bottom: 12px; }
.status-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.status-option { padding: 10px 4px; border-radius: 10px; text-align: center; font-size: 12px; border: 2px solid #E5E7EB; cursor: pointer; transition: all 0.2s; }
.status-option .s-icon { font-size: 18px; margin-bottom: 4px; }
.status-option.selected-pack { border-color: #10B981; background: #ECFDF5; color: #10B981; }
.status-option.selected-discard { border-color: #EF4444; background: #FEF2F2; color: #EF4444; }
.status-option.selected-donate { border-color: #3B82F6; background: #EFF6FF; color: #3B82F6; }
.status-option.selected-special { border-color: #F59E0B; background: #FFFBEB; color: #F59E0B; }
/* Form */
.form-section { background: #fff; margin-top: 8px; padding: 0 16px; }
.form-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #F0F2F5; }
.form-item:last-child { border-bottom: none; }
.form-item label { width: 72px; font-size: 14px; color: #2C3E50; }
.form-item input, .form-item select { flex: 1; border: none; font-size: 14px; outline: none; text-align: right; background: transparent; color: #2C3E50; }
.form-item input::placeholder { color: #C0C4CC; }
/* Special Attributes */
.attr-section { background: #fff; margin-top: 8px; padding: 16px; }
.attr-options { display: flex; gap: 10px; flex-wrap: wrap; }
.attr-chip { padding: 8px 16px; border-radius: 16px; font-size: 13px; border: 1px solid #E5E7EB; cursor: pointer; }
.attr-chip.selected { background: #FFF7ED; border-color: #F59E0B; color: #F59E0B; }
/* Bottom */
.bottom-action { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 375px; background: #fff; padding: 12px 16px; border-top: 1px solid #F0F2F5; display: flex; gap: 10px; }
.btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
.btn-secondary { background: #F0F2F5; color: #2C3E50; }
.btn-primary { background: #4A90D9; color: #fff; }
</style>
</head>
<body>
<div class="nav-bar">
  <a href="03-checklist.html" class="back">←</a>
  <h2>物品详情</h2>
  <span class="delete-btn">删除</span>
</div>

<div class="item-image">
  <div class="photo-area">
    <div class="icon">📷</div>
    <div>点击拍照或上传</div>
  </div>
</div>

<div class="status-section">
  <div class="section-title">处理状态</div>
  <div class="status-options">
    <div class="status-option">
      <div class="s-icon">○</div>
      <div>待处理</div>
    </div>
    <div class="status-option selected-discard">
      <div class="s-icon">✕</div>
      <div>丢弃</div>
    </div>
    <div class="status-option">
      <div class="s-icon">♡</div>
      <div>捐赠</div>
    </div>
    <div class="status-option">
      <div class="s-icon">▣</div>
      <div>打包带走</div>
    </div>
    <div class="status-option">
      <div class="s-icon">⚡</div>
      <div>单独搬运</div>
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-item">
    <label>物品名称</label>
    <input type="text" value="旧杂志">
  </div>
  <div class="form-item">
    <label>数量</label>
    <input type="text" value="8">
  </div>
  <div class="form-item">
    <label>所属房间</label>
    <select><option>卧室</option></select>
  </div>
  <div class="form-item">
    <label>备注</label>
    <input type="text" placeholder="选填">
  </div>
</div>

<div class="attr-section">
  <div class="section-title">特殊属性（可选）</div>
  <div class="attr-options">
    <div class="attr-chip">🔔 易碎品</div>
    <div class="attr-chip">💎 贵重品</div>
    <div class="attr-chip">💧 需防潮</div>
  </div>
</div>

<div class="bottom-action">
  <a href="03-checklist.html" style="flex:1;text-decoration:none"><button class="btn btn-secondary" style="width:100%">取消</button></a>
  <a href="03-checklist.html" style="flex:1;text-decoration:none"><button class="btn btn-primary" style="width:100%">保存</button></a>
</div>
</body>
</html>
