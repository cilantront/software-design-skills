<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>创建搬家任务 - 搬家物品清单与进度跟踪器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #F8F9FA; color: #2C3E50; max-width: 375px; margin: 0 auto; min-height: 100vh; }
/* Nav */
.nav-bar { background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #F0F2F5; position: sticky; top: 0; z-index: 10; }
.nav-bar .back { font-size: 20px; cursor: pointer; text-decoration: none; color: #2C3E50; }
.nav-bar h2 { font-size: 17px; font-weight: 600; flex: 1; }
/* Form */
.form-section { background: #fff; margin: 12px 0; padding: 0 16px; }
.form-section-title { font-size: 14px; font-weight: 600; color: #4A90D9; padding: 16px 0 8px; border-bottom: 1px solid #F0F2F5; }
.form-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #F0F2F5; }
.form-item:last-child { border-bottom: none; }
.form-item label { width: 80px; font-size: 14px; color: #2C3E50; flex-shrink: 0; }
.form-item label .required { color: #EF4444; margin-left: 2px; }
.form-item .input { flex: 1; }
.form-item input[type="text"], .form-item input[type="date"] { width: 100%; border: none; font-size: 14px; color: #2C3E50; outline: none; background: transparent; text-align: right; }
.form-item input::placeholder { color: #C0C4CC; }
.form-item .arrow { color: #C0C4CC; margin-left: 4px; font-size: 12px; }
/* Radio Group */
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
.radio-option { padding: 6px 14px; border-radius: 16px; font-size: 13px; border: 1px solid #E5E7EB; cursor: pointer; transition: all 0.2s; }
.radio-option.selected { background: #EFF6FF; border-color: #4A90D9; color: #4A90D9; font-weight: 500; }
/* Room Selection */
.room-section { background: #fff; margin: 0; padding: 0 16px 16px; }
.room-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.room-chip { display: flex; align-items: center; gap: 4px; padding: 8px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #E5E7EB; cursor: pointer; transition: all 0.2s; background: #fff; }
.room-chip.selected { background: #EFF6FF; border-color: #4A90D9; color: #4A90D9; }
.room-chip .chip-icon { font-size: 16px; }
.add-room { border: 1px dashed #C0C4CC; color: #95A5A6; background: transparent; }
/* Info Box */
.info-box { background: #F0F7FF; border-radius: 10px; padding: 12px; margin: 12px 16px; font-size: 12px; color: #4A90D9; line-height: 1.6; }
.info-box strong { font-weight: 600; }
/* Bottom Action */
.bottom-action { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 375px; background: #fff; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #F0F2F5; }
.primary-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4A90D9, #5BA0E6); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.primary-btn:disabled { opacity: 0.5; }
.spacer { height: 80px; }
</style>
</head>
<body>
<div class="nav-bar">
  <a href="01-home.html" class="back">←</a>
  <h2>创建搬家任务</h2>
</div>

<div class="form-section">
  <div class="form-section-title">基础信息</div>
  <div class="form-item">
    <label>搬家日期<span class="required">*</span></label>
    <div class="input">
      <input type="date" value="2026-07-01">
    </div>
  </div>
  <div class="form-item">
    <label>搬家类型</label>
    <div class="radio-group">
      <div class="radio-option selected">🏠 个人住宅</div>
      <div class="radio-option">🏢 办公室</div>
      <div class="radio-option">🏘 合租</div>
    </div>
  </div>
  <div class="form-item">
    <label>旧地址</label>
    <div class="input">
      <input type="text" placeholder="点击定位或手动输入" value="海淀区中关村大街XX号">
    </div>
    <span class="arrow">📍</span>
  </div>
  <div class="form-item">
    <label>新地址</label>
    <div class="input">
      <input type="text" placeholder="点击定位或手动输入" value="朝阳区望京SOHO T1">
    </div>
    <span class="arrow">📍</span>
  </div>
  <div class="form-item">
    <label>房屋户型</label>
    <div class="radio-group">
      <div class="radio-option">一室</div>
      <div class="radio-option selected">二室</div>
      <div class="radio-option">三室</div>
      <div class="radio-option">四室+</div>
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">选择房间（可多选）</div>
  <div class="room-grid">
    <div class="room-chip selected"><span class="chip-icon">🛏</span> 卧室</div>
    <div class="room-chip selected"><span class="chip-icon">🍳</span> 厨房</div>
    <div class="room-chip selected"><span class="chip-icon">🛋</span> 客厅</div>
    <div class="room-chip selected"><span class="chip-icon">📚</span> 书房</div>
    <div class="room-chip selected"><span class="chip-icon">🚿</span> 卫生间</div>
    <div class="room-chip"><span class="chip-icon">🌿</span> 阳台</div>
    <div class="room-chip"><span class="chip-icon">📦</span> 储物间</div>
    <div class="room-chip add-room"><span class="chip-icon">＋</span> 自定义</div>
  </div>
</div>

<div class="info-box">
  💡 <strong>提示：</strong>选择房间后，系统将自动填充该房间的常见物品模板，您可以后续在清单中自由增减。同时会根据搬家日期自动生成时间线任务提醒。
</div>

<div class="spacer"></div>
<div class="bottom-action">
  <a href="03-checklist.html" style="text-decoration:none"><button class="primary-btn">创建任务并开始整理</button></a>
</div>
</body>
</html>
