<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>首页 - 搬家物品清单与进度跟踪器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #F8F9FA; color: #2C3E50; max-width: 375px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 60px; }
/* Header */
.header { background: linear-gradient(135deg, #4A90D9, #5BA0E6); color: #fff; padding: 20px 16px 24px; border-radius: 0 0 20px 20px; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.header-top h1 { font-size: 18px; font-weight: 600; }
.header-top .avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 16px; }
/* Active Task Card */
.active-task { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.active-task .task-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.active-task .task-date { font-size: 13px; color: #95A5A6; margin-bottom: 12px; }
.task-stats { display: flex; gap: 12px; }
.stat-item { flex: 1; text-align: center; }
.stat-item .stat-num { font-size: 20px; font-weight: 700; color: #4A90D9; }
.stat-item .stat-label { font-size: 11px; color: #95A5A6; margin-top: 2px; }
.progress-bar { height: 6px; background: #EEF2F7; border-radius: 3px; margin-top: 12px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, #4A90D9, #7EC8B7); border-radius: 3px; transition: width 0.3s; }
.progress-text { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: #95A5A6; }
/* Quick Actions */
.section { padding: 16px; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.section-title a { font-size: 12px; color: #95A5A6; text-decoration: none; }
.quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.action-btn { background: #fff; border-radius: 12px; padding: 14px 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
.action-btn .icon { font-size: 24px; margin-bottom: 6px; }
.action-btn .label { font-size: 11px; color: #2C3E50; }
/* Timeline Preview */
.timeline-card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 10px; }
.timeline-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.timeline-item:not(:last-child) { border-bottom: 1px solid #F0F2F5; }
.timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.timeline-dot.done { background: #10B981; }
.timeline-dot.current { background: #4A90D9; box-shadow: 0 0 0 3px rgba(74,144,217,0.2); }
.timeline-dot.pending { background: #D1D5DB; }
.timeline-dot.overdue { background: #EF4444; }
.timeline-info { flex: 1; }
.timeline-info .name { font-size: 13px; font-weight: 500; }
.timeline-info .date { font-size: 11px; color: #95A5A6; }
.timeline-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-done { background: #ECFDF5; color: #10B981; }
.badge-today { background: #EFF6FF; color: #4A90D9; }
.badge-overdue { background: #FEF2F2; color: #EF4444; }
/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { color: #95A5A6; font-size: 14px; margin-bottom: 16px; }
/* Create button */
.create-btn { display: block; width: calc(100% - 32px); margin: 16px auto; padding: 14px; background: linear-gradient(135deg, #4A90D9, #5BA0E6); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 375px; background: #fff; border-top: 1px solid #F0F2F5; display: flex; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
.nav-item { flex: 1; text-align: center; cursor: pointer; padding: 4px 0; }
.nav-item .nav-icon { font-size: 20px; margin-bottom: 2px; }
.nav-item .nav-label { font-size: 10px; color: #95A5A6; }
.nav-item.active .nav-label { color: #4A90D9; font-weight: 600; }
/* Room tag */
.room-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.room-tag { font-size: 11px; padding: 4px 10px; border-radius: 14px; background: #F0F7FF; color: #4A90D9; }
</style>
</head>
<body>
<!-- Header -->
<div class="header">
  <div class="header-top">
    <h1>🏠 搬家清单</h1>
    <div class="avatar">😊</div>
  </div>
  <!-- Active Task -->
  <div class="active-task">
    <div class="task-title">搬家去朝阳区新家</div>
    <div class="task-date">📅 搬家日期：2026年7月1日 · 还有2天</div>
    <div class="task-stats">
      <div class="stat-item"><div class="stat-num">48</div><div class="stat-label">物品总数</div></div>
      <div class="stat-item"><div class="stat-num">36</div><div class="stat-label">已处理</div></div>
      <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">打包箱</div></div>
    </div>
    <div class="progress-bar"><div class="fill" style="width:68%"></div></div>
    <div class="progress-text"><span>整体进度</span><span>68%</span></div>
  </div>
</div>

<!-- Quick Actions -->
<div class="section">
  <div class="section-title">快速操作</div>
  <div class="quick-actions">
    <a href="03-checklist.html" class="action-btn" style="text-decoration:none;color:inherit">
      <div class="icon">📋</div>
      <div class="label">物品清单</div>
    </a>
    <a href="05-timeline.html" class="action-btn" style="text-decoration:none;color:inherit">
      <div class="icon">📅</div>
      <div class="label">时间线</div>
    </a>
    <a href="07-boxes.html" class="action-btn" style="text-decoration:none;color:inherit">
      <div class="icon">📦</div>
      <div class="label">打包箱</div>
    </a>
    <a href="06-dashboard.html" class="action-btn" style="text-decoration:none;color:inherit">
      <div class="icon">📊</div>
      <div class="label">进度看板</div>
    </a>
  </div>
</div>

<!-- Today's Tasks -->
<div class="section">
  <div class="section-title">
    今日待办
    <a href="05-timeline.html">查看全部 →</a>
  </div>
  <div class="timeline-card">
    <div class="timeline-item">
      <div class="timeline-dot done"></div>
      <div class="timeline-info">
        <div class="name">确认丢弃/捐赠清单</div>
        <div class="date">提前14天节点</div>
      </div>
      <span class="timeline-badge badge-done">已完成</span>
    </div>
    <div class="timeline-item">
      <div class="timeline-dot current"></div>
      <div class="timeline-info">
        <div class="name">准备打包材料</div>
        <div class="date">提前3天 · 今天是截止日</div>
      </div>
      <span class="timeline-badge badge-today">今天</span>
    </div>
    <div class="timeline-item">
      <div class="timeline-dot pending"></div>
      <div class="timeline-info">
        <div class="name">联系搬家公司确认时间</div>
        <div class="date">提前7天节点 · 已逾期</div>
      </div>
      <span class="timeline-badge badge-overdue">逾期</span>
    </div>
  </div>
</div>

<!-- Recent Rooms -->
<div class="section">
  <div class="section-title">
    房间进度
    <a href="03-checklist.html">管理清单 →</a>
  </div>
  <div class="timeline-card">
    <div class="timeline-item">
      <div class="timeline-info">
        <div class="name">🛏 卧室 <span style="color:#95A5A6;font-size:11px">11/12件已处理</span></div>
        <div class="progress-bar" style="margin-top:6px"><div class="fill" style="width:92%"></div></div>
      </div>
      <span style="font-size:13px;font-weight:600;color:#10B981">92%</span>
    </div>
    <div class="timeline-item">
      <div class="timeline-info">
        <div class="name">🍳 厨房 <span style="color:#95A5A6;font-size:11px">5/8件已处理</span></div>
        <div class="progress-bar" style="margin-top:6px"><div class="fill" style="width:60%"></div></div>
      </div>
      <span style="font-size:13px;font-weight:600;color:#4A90D9">60%</span>
    </div>
    <div class="timeline-item">
      <div class="timeline-info">
        <div class="name">🛋 客厅 <span style="color:#95A5A6;font-size:11px">3/6件已处理</span></div>
        <div class="progress-bar" style="margin-top:6px"><div class="fill" style="width:50%"></div></div>
      </div>
      <span style="font-size:13px;font-weight:600;color:#4A90D9">50%</span>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">首页</div>
  </div>
  <a href="06-dashboard.html" class="nav-item" style="text-decoration:none;color:inherit">
    <div class="nav-icon">📊</div>
    <div class="nav-label">进度</div>
  </a>
  <a href="09-profile.html" class="nav-item" style="text-decoration:none;color:inherit">
    <div class="nav-icon">👤</div>
    <div class="nav-label">我的</div>
  </a>
</div>
</body>
</html>
