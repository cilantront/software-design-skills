<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>报告导出按钮 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.file{background:#F8FAFC;border:1px solid var(--line);border-radius:12px;padding:14px;margin:20px 0;color:#334155}.progress{height:8px;background:#E2E8F0;border-radius:4px;margin-top:14px;overflow:hidden;display:none}.progress.show{display:block}.progress i{display:block;width:0;height:100%;background:var(--cta);transition:1.2s}</style></head><body>
<div class="container" style="min-height:100vh;display:grid;place-items:center"><section class="card" style="width:min(520px,100%);padding:28px;text-align:center"><svg class="icon" style="width:54px;height:54px;color:var(--primary)" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6M9 15l3 3 3-3"/></svg><h2>导出完整审查报告</h2><p class="muted">PDF报告将包含风险评分、条款原文、白话解读、协商话术和AI免责声明。</p><div class="file">合同风险报告_商铺租赁合同_20260629.pdf</div><button id="export" class="btn green" style="width:100%">导出PDF</button><div id="progress" class="progress"><i></i></div></section></div><script>export.onclick=()=>{progress.classList.add('show');progress.querySelector('i').style.width='100%';export.textContent='生成中...';setTimeout(()=>export.textContent='下载完成',1200)}</script>
</body></html>
