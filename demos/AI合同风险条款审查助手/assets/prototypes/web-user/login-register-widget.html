<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登录注册表单 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}label{display:block;font-size:13px;font-weight:700;margin:14px 0 8px}input{width:100%;height:44px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:15px}.tab{flex:1;border:0;background:#fff;padding:12px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent}.tab.active{color:var(--primary);border-color:var(--primary)}</style></head><body>
<div class="container" style="min-height:100vh;display:grid;place-items:center"><section class="card" style="width:min(420px,100%);padding:34px"><div style="display:flex;gap:12px;align-items:center;margin-bottom:22px"><div style="width:48px;height:48px;border-radius:14px;background:var(--soft);display:grid;place-items:center;color:var(--primary)"><svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></div><div><h1 style="font-size:20px;margin:0">AI合同风险审查助手</h1><p class="muted" style="margin:4px 0 0;font-size:13px">小商户合同风险快速筛查</p></div></div><div style="display:flex;border-bottom:1px solid var(--line);margin-bottom:22px"><button class="tab active" data-mode="登录">登录</button><button class="tab" data-mode="注册">注册</button></div><label>手机号<input id="phone" maxlength="11" placeholder="请输入11位手机号"></label><label>验证码<div style="display:flex;gap:8px"><input id="code" maxlength="6" placeholder="请输入6位验证码"><button class="btn ghost" id="sms" style="white-space:nowrap">获取验证码</button></div></label><button class="btn" id="submit" style="width:100%;margin-top:14px">登录</button><p class="muted" style="font-size:12px;text-align:center;margin-top:14px">登录即同意《服务条款》和《隐私政策》</p></section></div><div id="toast" class="toast"></div><script>document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');submit.textContent=b.dataset.mode});sms.onclick=()=>show(/^1\d{10}$/.test(phone.value)?'验证码已发送':'请输入正确的手机号');submit.onclick=()=>show(/^1\d{10}$/.test(phone.value)&&/^\d{6}$/.test(code.value)?submit.textContent+'成功':'请填写正确手机号和验证码');function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}</script>
</body></html>
