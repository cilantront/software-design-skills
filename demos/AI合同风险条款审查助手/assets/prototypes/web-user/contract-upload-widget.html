<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>合同上传组件 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.drop{display:flex;flex-direction:column;align-items:center;gap:10px;border:2px dashed #CBD5E1;border-radius:18px;padding:48px;margin:22px 0;background:#fff;color:var(--primary);text-align:center}.drop:hover{background:var(--soft);border-color:var(--primary)}.drop span{color:var(--muted);font-size:13px}.filebox{border:1px solid var(--line);border-radius:14px;padding:16px}.bar{height:8px;background:#E2E8F0;border-radius:4px;margin:10px 0;overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--cta)}</style></head><body>
<div class="container" style="min-height:100vh;display:grid;place-items:center"><section class="card" style="width:min(680px,100%);padding:30px"><h2>上传合同文件</h2><p class="muted">支持PDF、JPG、PNG、DOCX；单文件≤50MB，最多100页。</p><label class="drop" for="file"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8 12 3 7 8"/><path d="M12 3v12"/></svg><b>点击或拖拽文件到此处</b><span>上传后自动开始AI审查</span></label><input id="file" type="file" accept=".pdf,.jpg,.jpeg,.png,.docx" hidden><div id="fileBox" class="filebox" style="display:none"><b id="fname"></b><div class="bar"><i id="prog"></i></div><span id="state" class="muted">准备上传</span></div><button id="start" class="btn" style="display:none;width:100%;margin-top:16px">开始AI审查</button></section></div><script>file.onchange=e=>{let f=e.target.files[0];if(!f)return;fname.textContent=f.name;fileBox.style.display='block';let p=0,t=setInterval(()=>{p+=12;prog.style.width=Math.min(p,100)+'%';state.textContent=p>=100?'上传成功，可开始审查':'正在上传 '+p+'%';if(p>=100){clearInterval(t);start.style.display='block'}},160)}</script>
</body></html>
