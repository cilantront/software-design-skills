<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>支付购买页面 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.plan,.pay{border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.plan{display:block;text-align:center}.plan span{display:block;color:var(--primary);margin-top:6px}.active{border-color:var(--primary)!important;background:var(--soft)!important}.summary{display:flex;justify-content:space-between;align-items:center;border-top:1px dashed var(--line);padding:18px 0;margin-top:8px}.summary b{font-size:24px;color:var(--danger)}</style></head><body>
<div class="container" style="min-height:100vh;display:grid;place-items:center"><section class="card" style="width:min(520px,100%);padding:28px"><h2 style="margin:0 0 18px">购买审查次数</h2><div style="background:var(--soft);border-radius:16px;padding:22px;text-align:center;margin-bottom:18px"><div class="muted">单份合同风险审查</div><div style="font-size:46px;font-weight:800;color:var(--primary)">¥19<span style="font-size:18px">/份</span></div></div><div class="grid"><button class="plan active" data-n="1" data-p="19"><b>1份</b><span>¥19</span></button><button class="plan" data-n="3" data-p="57"><b>3份</b><span>¥57</span></button><button class="plan" data-n="5" data-p="95"><b>5份</b><span>¥95</span></button></div><h3>支付方式</h3><button class="pay active">微信支付</button><button class="pay">支付宝</button><div class="summary"><span>应付金额</span><b id="money">¥19</b></div><button class="btn green" style="width:100%">立即支付</button></section></div><script>document.querySelectorAll('.plan').forEach(b=>b.onclick=()=>{document.querySelectorAll('.plan').forEach(x=>x.classList.remove('active'));b.classList.add('active');money.textContent='¥'+b.dataset.p});document.querySelectorAll('.pay').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pay').forEach(x=>x.classList.remove('active'));b.classList.add('active')})</script>
</body></html>
