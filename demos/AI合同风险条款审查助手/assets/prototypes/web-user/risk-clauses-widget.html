<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>风险条款列表 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.clause{border:1px solid var(--line);border-radius:14px;margin:12px 0;overflow:hidden}.clause header{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}.clause header b{flex:1}.clause header button{border:0;background:#fff;color:var(--primary);font-weight:700}.detail{display:none;border-top:1px solid var(--line);padding:16px;line-height:1.7}.open .detail{display:block}blockquote{margin:0 0 14px;padding:12px;background:#F8FAFC;border-left:4px solid #CBD5E1}.script{background:var(--soft);padding:12px;border-radius:12px}</style></head><body>
<div class="container"><section class="card" style="padding:24px"><h2>风险条款列表</h2><article class="clause open"><header><span class="tag red">高风险</span><span class="tag">违约金</span><b>逾期付款违约金过高</b><button>展开</button></header><div class="detail"><blockquote>乙方逾期支付租金的，每逾期一日，应按应付未付款项的千分之五支付违约金。</blockquote><h4>白话解读 <span class="tag yellow">AI生成，仅供参考</span></h4><p>晚交一天租金需额外支付欠款0.5%的违约金，按年化计算明显偏高，可能给现金流带来压力。</p><h4>协商话术 <span class="tag yellow">AI生成，仅供参考</span></h4><p class="script">建议将违约金调整为每日万分之五，且累计不超过一个月租金。</p><button class="btn green copy">复制话术</button></div></article><article class="clause"><header><span class="tag red">高风险</span><span class="tag">自动续约</span><b>未明确提前通知机制</b><button>展开</button></header><div class="detail"><p>到期后若忘记书面通知，合同自动延长一年，可能导致无法及时退出。</p></div></article><article class="clause"><header><span class="tag yellow">中风险</span><span class="tag">单方解约</span><b>甲方单方解约权过宽</b><button>展开</button></header><div class="detail"><p>房东可因“经营需要”提前解除合同，但未明确装修和搬迁补偿。</p></div></article></section></div><div id="toast" class="toast">已复制到剪贴板</div><script>document.querySelectorAll('.clause header').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));document.querySelectorAll('.copy').forEach(b=>b.onclick=e=>{e.stopPropagation();toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)})</script>
</body></html>
