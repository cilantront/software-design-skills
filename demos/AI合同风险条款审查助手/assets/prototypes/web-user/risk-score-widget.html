<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>风险评分展示 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}.banner{padding:12px 18px;background:#FEF3C7;color:#92400E;font-weight:700}.score{width:190px;height:190px;border-radius:50%;background:conic-gradient(var(--danger) 72%,#E2E8F0 0);display:grid;place-items:center;position:relative}.score:before{content:"";position:absolute;width:140px;height:140px;border-radius:50%;background:#fff}.score span,.score small{position:relative}.score span{font-size:54px;font-weight:800;color:var(--danger)}.score small{display:block;margin-top:64px;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}.stats div{padding:18px;text-align:center}.stats b{display:block;font-size:28px}.stats span{color:var(--muted);font-size:13px}@media(max-width:700px){.card>div:nth-child(2){grid-template-columns:1fr!important}.score{margin:auto}}</style></head><body>
<div class="container"><section class="card" style="overflow:hidden"><div class="banner">本报告由AI生成，仅供参考，不构成法律建议。重要合同请咨询专业律师。</div><div style="padding:30px;display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:center"><div class="score"><span>72</span><small>风险评分</small></div><div><span class="tag red">高风险</span><h2>合同存在较多高风险条款</h2><p class="muted">AI共识别出8条风险条款，其中高风险3条、中风险4条、低风险1条。建议重点关注违约金、自动续约、单方解约相关条款。</p></div></div><div class="stats"><div><b>8</b><span>风险条款</span></div><div><b>3</b><span>高风险</span></div><div><b>5分钟</b><span>审查耗时</span></div></div></section></div>
</body></html>
