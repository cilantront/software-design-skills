<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>风险规则配置 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}table{width:100%;border-collapse:collapse;margin-top:18px}th,td{text-align:left;padding:14px;border-bottom:1px solid var(--line)}th{background:#F8FAFC;color:#475569;font-size:13px}td button{border:0;background:#fff;color:var(--primary);font-weight:700;cursor:pointer}</style></head><body>
<div class="container"><section class="card" style="padding:24px"><div style="display:flex;justify-content:space-between;align-items:center"><h2>风险规则配置</h2><button class="btn">新增规则</button></div><table><thead><tr><th>风险类型</th><th>关键词</th><th>权重</th><th>状态</th><th>操作</th></tr></thead><tbody><tr><td>违约金</td><td>违约金、滞纳金、逾期</td><td>30%</td><td><span class="tag green">启用</span></td><td><button>编辑</button></td></tr><tr><td>自动续约</td><td>自动续期、默示续约</td><td>25%</td><td><span class="tag green">启用</span></td><td><button>编辑</button></td></tr><tr><td>竞业限制</td><td>不得经营、竞业、同类业务</td><td>20%</td><td><span class="tag yellow">待优化</span></td><td><button>编辑</button></td></tr></tbody></table></section></div>
</body></html>
