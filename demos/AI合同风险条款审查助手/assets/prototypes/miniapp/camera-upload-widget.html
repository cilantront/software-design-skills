<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>拍照上传 Widget</title><style>:root{--primary:#6366F1;--primary2:#818CF8;--cta:#10B981;--bg:#F5F3FF;--text:#1E1B4B;--muted:#64748B;--line:#E2E8F0;--danger:#DC2626;--warn:#D97706;--info:#2563EB;--card:#FFFFFF;--soft:#EEF2FF}*{box-sizing:border-box}body{margin:0;font-family:"Open Sans","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}button,.clickable{cursor:pointer}button:focus,input:focus,select:focus{outline:3px solid rgba(99,102,241,.25);outline-offset:2px}.container{max-width:1120px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;background:var(--primary);color:#fff;transition:.2s}.btn:hover{background:#4F46E5}.btn.green{background:var(--cta)}.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--line)}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}.tag.red{background:#FEE2E2;color:#991B1B}.tag.yellow{background:#FEF3C7;color:#92400E}.tag.blue{background:#DBEAFE;color:#1D4ED8}.tag.green{background:#D1FAE5;color:#065F46}.muted{color:var(--muted)}.icon{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--cta);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}@media(prefers-reduced-motion:reduce){*{transition:none!important}}body{display:grid;place-items:center;min-height:100vh}.phone{width:360px;background:#fff;border:10px solid #111827;border-radius:32px;overflow:hidden}.wxbar{height:52px;background:#F8FAFC;display:flex;align-items:center;justify-content:center;font-weight:700;position:relative}.wxbar span{position:absolute;right:14px;color:#64748B}main{padding:20px}.camera{height:260px;border:2px dashed #CBD5E1;border-radius:18px;display:grid;place-items:center;text-align:center;color:var(--muted);margin:18px 0}.camera .icon{width:58px;height:58px;color:var(--primary)}.phone button{width:100%;margin:8px 0}.tip{font-size:12px;color:#64748B;background:#F8FAFC;padding:12px;border-radius:12px;margin-top:12px}</style></head><body>
<div class="phone"><div class="wxbar">AI合同审查助手 <span>••• ○</span></div><main><h2>拍照上传合同</h2><div class="camera"><svg class="icon" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><p>请将合同页面放入取景框</p></div><button class="btn green">拍摄当前页</button><button class="btn ghost">从相册选择</button><div class="tip">拍摄建议：文字清晰、页面完整、避免反光和遮挡。</div></main></div>
</body></html>
