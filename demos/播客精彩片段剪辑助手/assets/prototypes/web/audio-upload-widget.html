<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频上传组件原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 32px; }
        .widget-container { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); max-width: 640px; margin: 0 auto; }
        .widget-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #333; }

        .upload-zone { border: 2px dashed #d9d9d9; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa; }
        .upload-zone:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-zone.dragover { border-color: #667eea; background: #f0f3ff; transform: scale(1.01); }
        .upload-icon { font-size: 56px; margin-bottom: 16px; }
        .upload-text { font-size: 16px; color: #333; font-weight: 500; margin-bottom: 8px; }
        .upload-hint { font-size: 13px; color: #999; line-height: 1.6; }
        .upload-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #667eea; color: #fff; border-radius: 6px; font-size: 14px; cursor: pointer; }

        .file-info { margin-top: 20px; padding: 16px; background: #f8f9ff; border-radius: 8px; display: none; }
        .file-info.show { display: block; }
        .file-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .file-meta { font-size: 13px; color: #666; margin-bottom: 12px; }
        .progress-bar { width: 100%; height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 12px; color: #999; margin-top: 6px; text-align: right; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-top: 8px; }
        .status-uploading { background: #e6f7ff; color: #1890ff; }
        .status-done { background: #f6ffed; color: #52c41a; }
        .status-error { background: #fff2f0; color: #ff4d4f; }

        .format-tags { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
        .format-tag { padding: 4px 12px; background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; font-size: 12px; color: #666; }

        .error-tip { background: #fff2f0; border: 1px solid #ffccc7; border-radius: 8px; padding: 12px 16px; margin-top: 16px; display: none; }
        .error-tip.show { display: block; }
        .error-text { color: #ff4d4f; font-size: 13px; }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-title">📁 上传播客音频</div>

        <div class="upload-zone" id="uploadZone" onclick="simulateUpload()">
            <div class="upload-icon">🎵</div>
            <div class="upload-text">点击或拖拽音频文件到此处上传</div>
            <div class="upload-hint">
                支持格式：MP3 / WAV / M4A / AAC<br>
                单文件最大 2GB | 建议上传网速 ≥ 10Mbps
            </div>
            <div class="format-tags">
                <span class="format-tag">MP3</span>
                <span class="format-tag">WAV</span>
                <span class="format-tag">M4A</span>
                <span class="format-tag">AAC</span>
            </div>
            <div class="upload-btn">选择文件</div>
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName">EP01：如何开始你的第一档播客.mp3</div>
            <div class="file-meta">
                <span id="fileSize">85.3 MB</span> · <span id="fileDuration">时长：45:32</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="status-badge status-uploading" id="statusBadge">上传中...</div>
        </div>

        <div class="error-tip" id="errorTip">
            <div class="error-text" id="errorText">⚠️ 仅支持 MP3/WAV/M4A/AAC 格式，请重新选择文件</div>
        </div>
    </div>

    <script>
        let uploading = false;

        function simulateUpload() {
            if (uploading) return;
            uploading = true;

            const fileInfo = document.getElementById('fileInfo');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const statusBadge = document.getElementById('statusBadge');
            const errorTip = document.getElementById('errorTip');

            errorTip.classList.remove('show');
            fileInfo.classList.add('show');
            statusBadge.textContent = '上传中...';
            statusBadge.className = 'status-badge status-uploading';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    statusBadge.textContent = '✓ 上传完成';
                    statusBadge.className = 'status-badge status-done';
                    uploading = false;

                    setTimeout(() => {
                        statusBadge.textContent = '🔄 ASR 转写中...';
                        statusBadge.className = 'status-badge status-uploading';
                    }, 1000);
                }
                progressFill.style.width = progress + '%';
                progressText.textContent = Math.round(progress) + '%';
            }, 200);
        }

        // Drag and drop simulation
        const zone = document.getElementById('uploadZone');
        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        zone.addEventListener('dragleave', () => {
            zone.classList.remove('dragover');
        });
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            simulateUpload();
        });
    </script>
</body>
</html>
