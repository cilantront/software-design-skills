<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机号绑定 - Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 750px; background: #fff; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #333; font-size: 12px; }
.nav-bar { height: 50px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
.nav-back { font-size: 20px; cursor: pointer; margin-right: 12px; }
.nav-title { font-size: 17px; font-weight: 600; }
.bind-container { padding: 40px 30px; }
.bind-icon { font-size: 64px; text-align: center; margin-bottom: 20px; }
.bind-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 8px; }
.bind-desc { font-size: 14px; color: #999; text-align: center; margin-bottom: 40px; }
.wx-btn { width: 100%; height: 50px; background: #07C160; border-radius: 25px; border: none; color: #fff; font-size: 16px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; margin-bottom: 24px; }
.divider { display: flex; align-items: center; margin: 24px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
.divider span { padding: 0 16px; font-size: 13px; color: #999; }
.manual-input { margin-top: 16px; }
.input-group { margin-bottom: 16px; }
.input-label { font-size: 13px; color: #666; margin-bottom: 6px; }
.input-field { width: 100%; height: 44px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0 12px; font-size: 15px; }
.verify-row { display: flex; gap: 10px; }
.verify-row .input-field { flex: 1; }
.send-btn { width: 110px; height: 44px; background: #FF8C42; border-radius: 8px; border: none; color: #fff; font-size: 14px; cursor: pointer; }
.submit-btn { width: 100%; height: 48px; background: #FF8C42; border-radius: 24px; border: none; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 24px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>📶 📡 🔋</span></div>
  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">绑定手机号</span>
  </div>
  <div class="bind-container">
    <div class="bind-icon">📱</div>
    <div class="bind-title">绑定手机号</div>
    <div class="bind-desc">用于接收理赔进度通知、续保提醒等重要消息</div>
    <button class="wx-btn" onclick="alert('微信授权获取手机号')">🔒 微信手机号一键授权</button>
    <div class="divider"><span>或使用手机号</span></div>
    <div class="manual-input">
      <div class="input-group">
        <div class="input-label">手机号</div>
        <input class="input-field" placeholder="请输入手机号" value="138****8888">
      </div>
      <div class="input-group">
        <div class="input-label">验证码</div>
        <div class="verify-row">
          <input class="input-field" placeholder="请输入验证码">
          <button class="send-btn">获取验证码</button>
        </div>
      </div>
      <button class="submit-btn">确认绑定</button>
    </div>
  </div>
</div>
</body>
</html>
