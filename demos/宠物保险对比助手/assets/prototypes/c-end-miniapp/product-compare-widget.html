<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品横向对比 - Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 750px; background: #fff; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #333; font-size: 12px; }
.nav-bar { height: 50px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; }
.nav-back { font-size: 20px; cursor: pointer; margin-right: 12px; }
.nav-title { font-size: 17px; font-weight: 600; }
.compare-header { display: flex; overflow-x: auto; padding: 12px; gap: 8px; border-bottom: 1px solid #f0f0f0; }
.compare-product { min-width: 100px; text-align: center; padding: 10px; background: #FFF5EE; border-radius: 10px; }
.compare-product .p-icon { font-size: 24px; }
.compare-product .p-name { font-size: 11px; color: #333; margin-top: 4px; font-weight: 500; }
.compare-product .p-remove { font-size: 10px; color: #999; cursor: pointer; }
.compare-table { overflow-y: auto; height: calc(100% - 240px); }
.compare-row { display: flex; border-bottom: 1px solid #f5f5f5; }
.compare-row .dim-label { width: 90px; padding: 12px 10px; font-size: 12px; color: #666; background: #fafafa; flex-shrink: 0; }
.compare-row .dim-values { display: flex; flex: 1; }
.compare-row .dim-value { flex: 1; padding: 12px 8px; font-size: 12px; color: #333; text-align: center; border-left: 1px solid #f5f5f5; }
.compare-row .dim-value.highlight { color: #FF6B35; font-weight: 600; background: #FFF5EE; }
.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px 30px; background: #fff; display: flex; gap: 10px; }
.btn-secondary { flex: 1; height: 44px; border-radius: 22px; border: 1px solid #FF8C42; color: #FF8C42; background: #fff; font-size: 14px; cursor: pointer; }
.btn-primary { flex: 1; height: 44px; border-radius: 22px; border: none; background: #FF8C42; color: #fff; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>📶 📡 🔋</span></div>
  <div class="nav-bar"><span class="nav-back">‹</span><span class="nav-title">产品对比 (3)</span></div>
  <div class="compare-header">
    <div class="compare-product"><div class="p-icon">🛡️</div><div class="p-name">平安萌宠保</div><div class="p-remove">移除 ×</div></div>
    <div class="compare-product"><div class="p-icon">🐾</div><div class="p-name">太平洋宠乐保</div><div class="p-remove">移除 ×</div></div>
    <div class="compare-product"><div class="p-icon">❤️</div><div class="p-name">众安宠物医保</div><div class="p-remove">移除 ×</div></div>
  </div>
  <div class="compare-table">
    <div class="compare-row"><div class="dim-label">保险公司</div><div class="dim-values"><div class="dim-value">平安财险</div><div class="dim-value">太平洋财险</div><div class="dim-value">众安保险</div></div></div>
    <div class="compare-row"><div class="dim-label">产品类型</div><div class="dim-values"><div class="dim-value">综合险</div><div class="dim-value">门诊+住院</div><div class="dim-value">综合险</div></div></div>
    <div class="compare-row"><div class="dim-label">保额上限</div><div class="dim-values"><div class="dim-value">5万元</div><div class="dim-value highlight">8万元</div><div class="dim-value">6万元</div></div></div>
    <div class="compare-row"><div class="dim-label">免赔额</div><div class="dim-values"><div class="dim-value highlight">200元</div><div class="dim-value">500元</div><div class="dim-value">300元</div></div></div>
    <div class="compare-row"><div class="dim-label">赔付比例</div><div class="dim-values"><div class="dim-value">70%</div><div class="dim-value">80%</div><div class="dim-value highlight">90%</div></div></div>
    <div class="compare-row"><div class="dim-label">等待期</div><div class="dim-values"><div class="dim-value">30天</div><div class="dim-value">30天</div><div class="dim-value highlight">15天</div></div></div>
    <div class="compare-row"><div class="dim-label">月保费</div><div class="dim-values"><div class="dim-value">¥45</div><div class="dim-value">¥68</div><div class="dim-value highlight">¥52</div></div></div>
    <div class="compare-row"><div class="dim-label">年保费</div><div class="dim-values"><div class="dim-value">¥540</div><div class="dim-value">¥816</div><div class="dim-value">¥624</div></div></div>
    <div class="compare-row"><div class="dim-label">理赔次数</div><div class="dim-values"><div class="dim-value">不限</div><div class="dim-value">10次/年</div><div class="dim-value">不限</div></div></div>
    <div class="compare-row"><div class="dim-label">匹配度</div><div class="dim-values"><div class="dim-value">85分</div><div class="dim-value">78分</div><div class="dim-value highlight">92分</div></div></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-secondary">调整对比</button>
    <button class="btn-primary">立即投保</button>
  </div>
</div>
</body>
</html>
