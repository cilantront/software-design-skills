<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能推荐 - Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 750px; background: #fff; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #fff; font-size: 12px; }
.nav-bar { height: 50px; background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%); display: flex; align-items: center; padding: 0 16px; color: #fff; }
.nav-back { font-size: 20px; cursor: pointer; margin-right: 12px; }
.nav-title { font-size: 17px; font-weight: 600; }
.pet-selector { display: flex; align-items: center; padding: 12px 16px; background: #FFF5EE; }
.pet-avatar { width: 32px; height: 32px; border-radius: 50%; background: #FF8C42; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 8px; }
.pet-name { font-size: 14px; color: #FF6B35; font-weight: 500; flex: 1; }
.pet-switch { font-size: 12px; color: #FF8C42; }
.question-area { padding: 20px 16px; }
.progress-bar { height: 4px; background: #f0f0f0; border-radius: 2px; margin-bottom: 20px; }
.progress-fill { height: 100%; width: 75%; background: linear-gradient(90deg, #FF8C42, #FF6B35); border-radius: 2px; }
.question-num { font-size: 12px; color: #999; margin-bottom: 8px; }
.question-text { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 20px; }
.option-list { }
.option-item { display: flex; align-items: center; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
.option-item.selected { border-color: #FF8C42; background: #FFF5EE; }
.option-radio { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; margin-right: 12px; }
.option-item.selected .option-radio { border-color: #FF8C42; background: #FF8C42; box-shadow: inset 0 0 0 3px #fff; }
.option-text { font-size: 15px; color: #333; }
.bottom-btn { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 20px 30px; background: #fff; }
.btn-primary { width: 100%; height: 48px; background: #FF8C42; border-radius: 24px; border: none; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>📶 📡 🔋</span></div>
  <div class="nav-bar"><span class="nav-back">‹</span><span class="nav-title">AI智能推荐</span></div>
  <div class="pet-selector">
    <div class="pet-avatar">🐱</div>
    <span class="pet-name">小橘 · 2岁 · 田园猫</span>
    <span class="pet-switch">切换 ›</span>
  </div>
  <div class="question-area">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="question-num">第 3 题 / 共 4 题</div>
    <div class="question-text">您更看重哪方面？</div>
    <div class="option-list">
      <div class="option-item selected"><div class="option-radio"></div><div class="option-text">💰 低免赔额 — 小额也能报</div></div>
      <div class="option-item"><div class="option-radio"></div><div class="option-text">📈 高赔付比例 — 报得多</div></div>
      <div class="option-item"><div class="option-radio"></div><div class="option-text">🏷️ 低保费 — 省钱</div></div>
      <div class="option-item"><div class="option-radio"></div><div class="option-text">🏢 大品牌 — 更放心</div></div>
    </div>
  </div>
  <div class="bottom-btn"><button class="btn-primary">下一题</button></div>
</div>
</body>
</html>
