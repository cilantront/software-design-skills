<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 750px; background: #f5f5f5; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #fff; font-size: 12px; }
.user-card { background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%); padding: 20px 16px 30px; color: #fff; }
.user-info { display: flex; align-items: center; }
.user-avatar { width: 56px; height: 56px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-right: 12px; }
.user-name { font-size: 18px; font-weight: 600; }
.user-phone { font-size: 13px; opacity: 0.9; margin-top: 2px; }
.member-badge { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.3); border-radius: 10px; font-size: 11px; margin-top: 6px; }
.member-badge.vip { background: linear-gradient(90deg, #FFD700, #FFA500); }
.pet-switch { display: flex; align-items: center; margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.2); border-radius: 10px; font-size: 13px; cursor: pointer; }
.menu-list { margin: 12px 16px; background: #fff; border-radius: 12px; overflow: hidden; }
.menu-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
.menu-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 12px; }
.menu-label { flex: 1; font-size: 15px; color: #333; }
.menu-arrow { color: #ccc; font-size: 16px; }
.menu-badge { background: #FF6B35; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 8px; margin-right: 8px; }
.bottom-tab { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #f0f0f0; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #999; }
.tab-item.active { color: #FF8C42; }
.tab-icon { font-size: 20px; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>📶 📡 🔋</span></div>
  <div class="user-card">
    <div class="user-info">
      <div class="user-avatar">🐱</div>
      <div>
        <div class="user-name">小花花</div>
        <div class="user-phone">138****8888</div>
        <div class="member-badge">免费用户</div>
      </div>
    </div>
    <div class="pet-switch">🐱 小橘 · 2岁 · 田园猫 <span style="margin-left:auto;font-size:11px">切换 ›</span></div>
  </div>
  <div class="menu-list">
    <div class="menu-item"><div class="menu-icon" style="background:#FFF5EE">🐾</div><div class="menu-label">我的宠物</div><span class="menu-arrow">›</span></div>
    <div class="menu-item"><div class="menu-icon" style="background:#E3F2FD">📋</div><div class="menu-label">我的保单</div><span class="menu-arrow">›</span></div>
    <div class="menu-item"><div class="menu-icon" style="background:#FFF3E0">🏥</div><div class="menu-label">我的理赔</div><span class="menu-arrow">›</span></div>
    <div class="menu-item"><div class="menu-icon" style="background:#F3E5F5">👑</div><div class="menu-label">会员中心</div><span style="color:#FF8C42;font-size:12px">升级VIP ›</span></div>
    <div class="menu-item"><div class="menu-icon" style="background:#E8F5E9">🔔</div><div class="menu-label">消息通知</div><span class="menu-badge">3</span><span class="menu-arrow">›</span></div>
    <div class="menu-item"><div class="menu-icon" style="background:#f5f5f5">⚙️</div><div class="menu-label">设置</div><span class="menu-arrow">›</span></div>
  </div>
  <div class="bottom-tab">
    <div class="tab-item"><div class="tab-icon">🏠</div>首页</div>
    <div class="tab-item"><div class="tab-icon">🔍</div>对比</div>
    <div class="tab-item"><div class="tab-icon">🏥</div>理赔</div>
    <div class="tab-item active"><div class="tab-icon">👤</div>我的</div>
  </div>
</div>
</body>
</html>
