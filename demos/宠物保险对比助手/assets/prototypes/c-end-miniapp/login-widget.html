<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信授权登录 - Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 375px; height: 750px; background: #fff; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; position: relative; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: #fff; font-size: 12px; }
.login-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; height: calc(100% - 44px - 60px); background: linear-gradient(180deg, #FFF5EE 0%, #FFFFFF 50%); }
.logo-area { text-align: center; margin-bottom: 50px; }
.logo { width: 80px; height: 80px; background: linear-gradient(135deg, #FF8C42, #FF6B35); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 40px; }
.app-name { font-size: 22px; font-weight: 600; color: #333; }
.app-desc { font-size: 14px; color: #999; margin-top: 8px; }
.login-btn { width: 100%; height: 48px; background: #07C160; border-radius: 24px; border: none; color: #fff; font-size: 16px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; margin-bottom: 16px; }
.login-btn:hover { background: #06AD56; }
.login-btn svg { width: 24px; height: 24px; }
.skip-btn { color: #999; font-size: 13px; text-decoration: underline; cursor: pointer; }
.bottom-bar { height: 60px; display: flex; align-items: center; justify-content: center; }
.home-indicator { width: 134px; height: 5px; background: #333; border-radius: 3px; }
.agreement { font-size: 11px; color: #bbb; text-align: center; margin-top: 20px; }
.agreement a { color: #FF8C42; text-decoration: none; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 📡 🔋</span>
  </div>
  <div class="login-container">
    <div class="logo-area">
      <div class="logo">🐾</div>
      <div class="app-name">宠物保险对比助手</div>
      <div class="app-desc">帮宠物主人选对保险、用好保险</div>
    </div>
    <button class="login-btn" onclick="alert('微信授权登录弹窗')">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.714 1.852-1.826 4.278-2.678 6.5-2.678.143 0 .285.005.426.015-.71-3.462-4.27-5.855-8.369-5.855z"/></svg>
      微信一键登录
    </button>
    <span class="skip-btn">暂不登录，先看看</span>
    <div class="agreement">
      登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="home-indicator"></div>
  </div>
</div>
</body>
</html>
