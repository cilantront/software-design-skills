<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据统计 - Admin Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; padding: 20px; }
.admin-frame { width: 1100px; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
.page-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 18px; font-weight: 600; }
.time-tabs { display: flex; gap: 8px; }
.time-tab { padding: 4px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; }
.time-tab.active { background: #FF8C42; color: #fff; border-color: #FF8C42; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; }
.stat-card { padding: 20px; background: linear-gradient(135deg, #FFF5EE 0%, #FFFFFF 100%); border-radius: 12px; border: 1px solid #FFD9B8; }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; color: #FF6B35; }
.stat-label { font-size: 13px; color: #666; margin-top: 4px; }
.stat-trend { font-size: 11px; color: #4CAF50; margin-top: 4px; }
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 0 24px 24px; }
.chart-card { padding: 20px; background: #fff; border: 1px solid #f0f0f0; border-radius: 12px; }
.chart-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; }
.chart-placeholder { height: 200px; background: repeating-linear-gradient(45deg, #fafafa, #fafafa 10px, #f5f5f5 10px, #f5f5f5 20px); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }
.rank-list { }
.rank-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.rank-num { width: 24px; height: 24px; border-radius: 50%; background: #f0f0f0; color: #666; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 10px; }
.rank-num.top { background: #FF8C42; color: #fff; }
.rank-name { flex: 1; font-size: 13px; color: #333; }
.rank-value { font-size: 13px; color: #FF6B35; font-weight: 600; }
</style>
</head>
<body>
<div class="admin-frame">
  <div class="page-header">
    <span class="page-title">📊 数据统计</span>
    <div class="time-tabs">
      <div class="time-tab">今日</div>
      <div class="time-tab active">近7天</div>
      <div class="time-tab">近30天</div>
      <div class="time-tab">自定义</div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">🔍</div><div class="stat-value">8,542</div><div class="stat-label">产品对比次数</div><div class="stat-trend">↑ 12.5% vs 上周</div></div>
    <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">1,234</div><div class="stat-label">点击投保次数</div><div class="stat-trend">↑ 8.3% vs 上周</div></div>
    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value">18.6%</div><div class="stat-label">投保转化率</div><div class="stat-trend">↑ 2.1% vs 上周</div></div>
    <div class="stat-card"><div class="stat-icon">🏥</div><div class="stat-value">256</div><div class="stat-label">理赔申请数</div><div class="stat-trend">↑ 5.7% vs 上周</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">对比热度趋势</div>
      <div class="chart-placeholder">📈 趋势图表区域</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">产品对比热度 Top5</div>
      <div class="rank-list">
        <div class="rank-item"><div class="rank-num top">1</div><div class="rank-name">众安宠物综合医保</div><div class="rank-value">1,256</div></div>
        <div class="rank-item"><div class="rank-num top">2</div><div class="rank-name">平安萌宠保</div><div class="rank-value">1,089</div></div>
        <div class="rank-item"><div class="rank-num top">3</div><div class="rank-name">太平洋宠乐保</div><div class="rank-value">956</div></div>
        <div class="rank-item"><div class="rank-num">4</div><div class="rank-name">人保宠物险</div><div class="rank-value">782</div></div>
        <div class="rank-item"><div class="rank-num">5</div><div class="rank-name">泰康在线宠物保</div><div class="rank-value">654</div></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
