<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 - Admin Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; padding: 20px; }
.admin-frame { width: 1100px; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
.page-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 18px; font-weight: 600; color: #333; }
.breadcrumb { font-size: 12px; color: #999; }
.filter-bar { padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #f0f0f0; }
.filter-input { height: 32px; padding: 0 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.filter-input.search { width: 240px; }
.filter-select { height: 32px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; background: #fff; }
.btn { height: 32px; padding: 0 16px; border-radius: 4px; border: 1px solid #d9d9d9; background: #fff; font-size: 13px; cursor: pointer; }
.btn-primary { background: #FF8C42; color: #fff; border-color: #FF8C42; }
.stats-row { display: flex; gap: 16px; padding: 16px 24px; }
.stat-card { flex: 1; padding: 16px; background: linear-gradient(135deg, #FFF5EE 0%, #FFFFFF 100%); border-radius: 8px; border: 1px solid #FFD9B8; }
.stat-value { font-size: 24px; font-weight: 700; color: #FF6B35; }
.stat-label { font-size: 13px; color: #666; margin-top: 4px; }
.table-container { padding: 0 24px 16px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #fafafa; text-align: left; padding: 12px; color: #666; font-weight: 500; border-bottom: 1px solid #f0f0f0; }
td { padding: 12px; border-bottom: 1px solid #f5f5f5; color: #333; }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.status-badge.active { background: #E8F5E9; color: #4CAF50; }
.status-badge.banned { background: #FFEBEE; color: #F44336; }
.status-badge.vip { background: #FFF3E0; color: #FF8C42; }
.action-link { color: #FF8C42; cursor: pointer; margin-right: 12px; font-size: 12px; }
.pagination { padding: 12px 24px; display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
.page-btn { width: 28px; height: 28px; border: 1px solid #d9d9d9; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
.page-btn.active { background: #FF8C42; color: #fff; border-color: #FF8C42; }
</style>
</head>
<body>
<div class="admin-frame">
  <div class="page-header">
    <span class="breadcrumb">运营管理后台 / 用户管理</span>
    <span class="page-title">用户列表</span>
  </div>
  <div class="filter-bar">
    <input class="filter-input search" placeholder="搜索手机号/昵称">
    <select class="filter-select"><option>全部会员状态</option><option>免费用户</option><option>付费会员</option></select>
    <select class="filter-select"><option>全部状态</option><option>正常</option><option>已封禁</option></select>
    <button class="btn btn-primary">查询</button>
    <button class="btn">导出</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value">12,580</div><div class="stat-label">注册用户总数</div></div>
    <div class="stat-card"><div class="stat-value">3,245</div><div class="stat-label">今日活跃用户</div></div>
    <div class="stat-card"><div class="stat-value">856</div><div class="stat-label">付费会员数</div></div>
    <div class="stat-card"><div class="stat-value">6.8%</div><div class="stat-label">付费转化率</div></div>
  </div>
  <div class="table-container">
    <table>
      <tr><th>用户ID</th><th>头像</th><th>昵称</th><th>手机号</th><th>注册时间</th><th>会员状态</th><th>宠物数</th><th>账户状态</th><th>操作</th></tr>
      <tr><td>U001</td><td>🐱</td><td>小花花</td><td>138****8888</td><td>2026-06-01</td><td><span class="status-badge vip">VIP</span></td><td>2</td><td><span class="status-badge active">正常</span></td><td><span class="action-link">详情</span><span class="action-link">封禁</span></td></tr>
      <tr><td>U002</td><td>🐶</td><td>狗爸爸</td><td>139****6666</td><td>2026-06-05</td><td><span class="status-badge">免费</span></td><td>1</td><td><span class="status-badge active">正常</span></td><td><span class="action-link">详情</span><span class="action-link">封禁</span></td></tr>
      <tr><td>U003</td><td>🐱</td><td>猫咪控</td><td>137****5555</td><td>2026-06-10</td><td><span class="status-badge">免费</span></td><td>3</td><td><span class="status-badge banned">已封禁</span></td><td><span class="action-link">详情</span><span class="action-link">解封</span></td></tr>
    </table>
  </div>
  <div class="pagination">
    <span style="font-size:12px;color:#999;margin-right:12px">共 12,580 条</span>
    <div class="page-btn">‹</div>
    <div class="page-btn active">1</div>
    <div class="page-btn">2</div>
    <div class="page-btn">3</div>
    <div class="page-btn">›</div>
  </div>
</div>
</body>
</html>
