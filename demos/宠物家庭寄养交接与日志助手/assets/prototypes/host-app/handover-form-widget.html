<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>交接单生成 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f7f7f7; padding: 16px; max-width: 375px; margin: 0 auto; }
.widget { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.widget-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.widget-subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
.preview-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.preview-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 4px; }
.preview-id { text-align: center; font-size: 11px; color: #888; margin-bottom: 12px; }
.pet-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f5f5f5; }
.pet-avatar { width: 44px; height: 44px; border-radius: 10px; background: #fef3c7; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.pet-name { font-size: 16px; font-weight: 600; }
.pet-breed { font-size: 12px; color: #888; }
.preview-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.preview-row .label { color: #888; }
.preview-row .value { color: #333; font-weight: 500; text-align: right; max-width: 60%; }
.preview-row .value.highlight { color: #07c160; }
.preview-row .value.price { color: #ef4444; font-size: 15px; font-weight: 600; }
.special-req { background: #fff8ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 10px; margin: 10px 0; }
.special-req .title { font-size: 13px; font-weight: 600; color: #d97706; margin-bottom: 4px; }
.special-req .item { font-size: 12px; color: #333; padding: 2px 0; }
.host-info { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f0fdf4; border-radius: 8px; margin-top: 10px; }
.host-avatar { width: 36px; height: 36px; border-radius: 50%; background: #dcfce7; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.host-name { font-size: 13px; font-weight: 600; }
.host-detail { font-size: 11px; color: #888; }
.actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.btn { display: block; width: 100%; padding: 12px; border-radius: 24px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; }
.btn-primary { background: #07c160; color: #fff; }
.btn-outline { background: #fff; color: #07c160; border: 1px solid #07c160; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">📋 寄养交接单预览</div>
  <div class="widget-subtitle">寄养人端 · 核心功能 Widget</div>

  <div class="preview-card">
    <div class="preview-title">🐾 寄养交接单</div>
    <div class="preview-id">编号：HY20260625001</div>

    <div class="pet-row">
      <div class="pet-avatar">🐕</div>
      <div>
        <div class="pet-name">豆豆</div>
        <div class="pet-breed">柯基 · 公 · 3岁 · 12kg</div>
      </div>
    </div>

    <div class="preview-row"><span class="label">疫苗接种</span><span class="value">已完成三针 ✓</span></div>
    <div class="preview-row"><span class="label">绝育状态</span><span class="value">已绝育</span></div>
    <div class="preview-row"><span class="label">过敏史</span><span class="value">无</span></div>
    <div class="preview-row"><span class="label">既往病史</span><span class="value">无</span></div>

    <div class="special-req">
      <div class="title">⚠ 特殊要求</div>
      <div class="item">💊 每天早晚各一次肠胃药</div>
      <div class="item">🚫 不能吃鸡肉</div>
      <div class="item">💤 晚上需开小夜灯</div>
    </div>

    <div class="preview-row"><span class="label">寄养日期</span><span class="value">2026.06.25 - 07.02</span></div>
    <div class="preview-row"><span class="label">寄养天数</span><span class="value">8 天</span></div>
    <div class="preview-row"><span class="label">寄养费用</span><span class="value highlight">80 元/天</span></div>
    <div class="preview-row"><span class="label">预计总额</span><span class="value price">640 元</span></div>

    <div class="host-info">
      <div class="host-avatar">👤</div>
      <div>
        <div class="host-name">寄养人：小王</div>
        <div class="host-detail">138****8888 · XX小区</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary">分享给主人确认</button>
    <button class="btn btn-outline">修改内容</button>
  </div>
</div>
</body>
</html>
