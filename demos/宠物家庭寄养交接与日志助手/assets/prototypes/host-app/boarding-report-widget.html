<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>寄养报告 Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f7f7f7; padding: 16px; max-width: 375px; margin: 0 auto; }
.widget { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.widget-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.widget-subtitle { font-size: 12px; color: #888; margin-bottom: 14px; }
.report-banner { background: linear-gradient(135deg, #f59e0b, #d97706); padding: 20px; color: #fff; border-radius: 12px; margin-bottom: 14px; text-align: center; }
.report-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.report-subtitle { font-size: 12px; opacity: 0.9; }
.report-message { font-size: 13px; font-style: italic; margin-top: 10px; opacity: 0.95; }
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #f0f0f0; }
.stat-num { font-size: 22px; font-weight: 600; color: #07c160; }
.stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.card { background: #fafafa; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #333; }
.summary-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #555; padding: 4px 0; }
.summary-icon { font-size: 15px; }
.photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.photo-grid-item { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.fee-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
.fee-table th { background: #f7f7f7; padding: 8px; text-align: left; font-weight: 500; }
.fee-table td { padding: 8px; border-bottom: 1px solid #f5f5f5; }
.fee-total { font-size: 18px; font-weight: 600; color: #ef4444; text-align: right; }
.message-area { width: 100%; padding: 10px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 13px; min-height: 60px; resize: none; background: #fff; margin-bottom: 10px; }
.actions { display: flex; flex-direction: column; gap: 8px; }
.btn { display: block; width: 100%; padding: 12px; border-radius: 24px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; }
.btn-primary { background: #07c160; color: #fff; }
.btn-outline { background: #fff; color: #07c160; border: 1px solid #07c160; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-title">📊 完整寄养报告</div>
  <div class="widget-subtitle">寄养人端 · 核心功能 Widget</div>

  <div class="report-banner">
    <div class="report-title">🐾 豆豆的寄养报告</div>
    <div class="report-subtitle">2026.06.25 - 2026.07.02 · 共 8 天</div>
    <div class="report-message">"豆豆很乖，这几天相处很愉快！"</div>
  </div>

  <div class="stat-row">
    <div class="stat-card"><div class="stat-num">8</div><div class="stat-label">寄养天数</div></div>
    <div class="stat-card"><div class="stat-num">8</div><div class="stat-label">日志记录</div></div>
    <div class="stat-card"><div class="stat-num">24</div><div class="stat-label">照片数量</div></div>
  </div>

  <div class="card">
    <div class="card-title">📊 每日汇总</div>
    <div class="summary-item"><span class="summary-icon">🍖</span><span>饮食：食量正常 7 天，偏少 1 天</span></div>
    <div class="summary-item"><span class="summary-icon">🚶</span><span>散步：平均 28 分钟/天</span></div>
    <div class="summary-item"><span class="summary-icon">💩</span><span>排便：全部正常</span></div>
    <div class="summary-item"><span class="summary-icon">😊</span><span>情绪：开心 5 天，正常 2 天，紧张 1 天</span></div>
  </div>

  <div class="card">
    <div class="card-title">📷 精选照片</div>
    <div class="photo-grid">
      <div class="photo-grid-item" style="background:#fef3c7;">🐕</div>
      <div class="photo-grid-item" style="background:#e0f2fe;">🐕</div>
      <div class="photo-grid-item" style="background:#fce7f3;">🐕</div>
      <div class="photo-grid-item" style="background:#f0fdf4;">🐕</div>
      <div class="photo-grid-item" style="background:#fef3c7;">🐕</div>
      <div class="photo-grid-item" style="background:#e0f2fe;">🐕</div>
      <div class="photo-grid-item" style="background:#fce7f3;">🎬</div>
      <div class="photo-grid-item" style="background:#f0fdf4;">🐕</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💰 费用明细</div>
    <table class="fee-table">
      <tr><th>项目</th><th>金额</th></tr>
      <tr><td>寄养费（8天 × 80元/天）</td><td>640 元</td></tr>
      <tr><td>加餐费</td><td>50 元</td></tr>
      <tr><td>其他费用</td><td>0 元</td></tr>
    </table>
    <div class="fee-total">合计：690 元</div>
  </div>

  <div class="card-title" style="margin-top:10px;">💬 寄养人寄语</div>
  <textarea class="message-area" placeholder="给主人和宠物说几句话吧~">豆豆很乖，这几天相处很愉快！第二天有轻微不适，已及时调整，后续状态很好。希望下次再见！</textarea>

  <div class="actions">
    <button class="btn btn-primary">分享给主人</button>
    <button class="btn btn-outline">重新编辑</button>
  </div>
</div>
</body>
</html>
