<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选题看板</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --border: #E5E7EB;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --xiaohongshu: #FF2442;
            --bilibili: #FB7299;
            --douyin: #000000;
            --wechat-mp: #07C160;
            --shipinhao: #FA9D3B;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            padding: var(--spacing-md);
        }

        .kanban-widget {
            max-width: 1400px;
            margin: 0 auto;
        }

        .kanban-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .kanban-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-primary {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .btn-primary:hover {
            background: #4338CA;
        }

        .kanban-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            overflow-x: auto;
        }

        .kanban-column {
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm);
            min-height: 500px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
            border-radius: var(--radius-sm);
        }

        .column-title {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .column-count {
            background: var(--surface);
            padding: 2px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .btn-small {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .btn-small:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .kanban-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
            cursor: grab;
            transition: all 0.2s;
            position: relative;
        }

        .kanban-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .kanban-card:active {
            cursor: grabbing;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--spacing-sm);
            padding-top: var(--spacing-sm);
            border-top: 1px solid var(--border);
        }

        .platform-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .platform-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: white;
            font-weight: 600;
        }

        .date-tag {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }

        .assignee-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 600;
        }

        /* Column specific colors */
        .column-ideas .column-header {
            background: #FEF3C7;
        }

        .column-draft .column-header {
            background: #DBEAFE;
        }

        .column-pending .column-header {
            background: #E0E7FF;
        }

        .column-published .column-header {
            background: #D1FAE5;
        }

        .dragging {
            opacity: 0.6;
            box-shadow: var(--shadow-md);
        }

        .drop-zone {
            min-height: 100px;
            transition: background 0.2s;
        }

        .drop-zone.drag-over {
            background: var(--primary-light);
            border: 2px dashed var(--primary);
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>
    <div class="kanban-widget">
        <div class="kanban-header">
            <h2 class="kanban-title">📋 选题看板</h2>
            <button class="btn-primary">➕ 新建选题</button>
        </div>

        <div class="kanban-container">
            <!-- Ideas Column -->
            <div class="kanban-column column-ideas">
                <div class="column-header">
                    <div class="column-title">💡 灵感 <span class="column-count">3</span></div>
                    <button class="btn-small">+ 新建</button>
                </div>
                <div class="drop-zone">
                    <div class="kanban-card" draggable="true">
                        <div class="card-title">秋季护肤新品测评</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--xiaohongshu);" title="小红书">红</div>
                                <div class="platform-badge" style="background: var(--douyin);" title="抖音">抖</div>
                            </div>
                            <span class="date-tag">待定</span>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">职场新人沟通技巧</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--wechat-mp);" title="公众号">公</div>
                            </div>
                            <span class="date-tag">待定</span>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">城市骑行路线推荐</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--bilibili);" title="B站">B</div>
                                <div class="platform-badge" style="background: var(--shipinhao);" title="视频号">视</div>
                            </div>
                            <span class="date-tag">待定</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Draft Column -->
            <div class="kanban-column column-draft">
                <div class="column-header">
                    <div class="column-title">📝 草稿 <span class="column-count">2</span></div>
                    <button class="btn-small">+ 新建</button>
                </div>
                <div class="drop-zone">
                    <div class="kanban-card" draggable="true">
                        <div class="card-title">30天打卡挑战复盘</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--xiaohongshu);" title="小红书">红</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-xs);">
                                <span class="date-tag">计划 7/5</span>
                                <div class="assignee-avatar">张</div>
                            </div>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">Python入门教程第四讲</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--bilibili);" title="B站">B</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-xs);">
                                <span class="date-tag">计划 7/8</span>
                                <div class="assignee-avatar">李</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Column -->
            <div class="kanban-column column-pending">
                <div class="column-header">
                    <div class="column-title">📋 待发布 <span class="column-count">2</span></div>
                    <button class="btn-small">+ 新建</button>
                </div>
                <div class="drop-zone">
                    <div class="kanban-card" draggable="true">
                        <div class="card-title">夏日防晒好物推荐</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--xiaohongshu);" title="小红书">红</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-xs);">
                                <span class="date-tag">计划 6/29</span>
                                <div class="assignee-avatar">王</div>
                            </div>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">办公室舞蹈挑战</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--douyin);" title="抖音">抖</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: var(--spacing-xs);">
                                <span class="date-tag">计划 6/30</span>
                                <div class="assignee-avatar">赵</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Published Column -->
            <div class="kanban-column column-published">
                <div class="column-header">
                    <div class="column-title">✅ 已发布 <span class="column-count">3</span></div>
                </div>
                <div class="drop-zone">
                    <div class="kanban-card" draggable="true">
                        <div class="card-title">毕业季穿搭灵感</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--xiaohongshu);" title="小红书">红</div>
                            </div>
                            <span class="date-tag">已发布 6/28</span>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">如何提升工作效率</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--wechat-mp);" title="公众号">公</div>
                            </div>
                            <span class="date-tag">已发布 6/27</span>
                        </div>
                    </div>

                    <div class="kanban-card" draggable="true">
                        <div class="card-title">平价护肤品测评合集</div>
                        <div class="card-footer">
                            <div class="platform-badges">
                                <div class="platform-badge" style="background: var(--bilibili);" title="B站">B</div>
                            </div>
                            <span class="date-tag">已发布 6/25</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Drag and drop functionality
        let draggedCard = null;

        document.querySelectorAll('.kanban-card').forEach(card => {
            card.addEventListener('dragstart', function(e) {
                draggedCard = this;
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            card.addEventListener('dragend', function() {
                this.classList.remove('dragging');
                draggedCard = null;

                // Remove drag-over from all drop zones
                document.querySelectorAll('.drop-zone').forEach(zone => {
                    zone.classList.remove('drag-over');
                });
            });
        });

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (draggedCard) {
                    this.classList.add('drag-over');
                }
            });

            zone.addEventListener('dragleave', function() {
                this.classList.remove('drag-over');
            });

            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');

                if (draggedCard) {
                    this.appendChild(draggedCard);
                    updateCounts();
                }
            });
        });

        function updateCounts() {
            document.querySelectorAll('.kanban-column').forEach(column => {
                const count = column.querySelectorAll('.kanban-card').length;
                const countElement = column.querySelector('.column-count');
                if (countElement) {
                    countElement.textContent = count;
                }
            });
        }

        // New button handlers
        document.querySelectorAll('.btn-small').forEach(btn => {
            btn.addEventListener('click', function() {
                const columnName = this.closest('.kanban-column').querySelector('.column-title').textContent.trim();
                alert(`新建选题到：${columnName}\n\n（原型演示功能）`);
            });
        });

        // Main new button
        document.querySelector('.btn-primary').addEventListener('click', function() {
            alert('创建新选题\n\n（原型演示功能）');
        });
    </script>
</body>
</html>
