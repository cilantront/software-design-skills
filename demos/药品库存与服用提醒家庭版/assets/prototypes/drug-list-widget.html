<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药品列表组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Member Tabs */
        .member-tabs {
            display: flex;
            background: #f0fdfa;
            border-bottom: 1px solid #e0f2fe;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #0891b2;
            border-bottom-color: #0891b2;
            background: white;
        }

        .tab-name {
            font-size: 14px;
            font-weight: 500;
        }

        .tab-count {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        /* Search Bar */
        .search-bar {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e0f2fe;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid #22d3ee;
            border-radius: 8px;
            font-size: 14px;
            background: #ecfeff;
        }

        .search-input:focus {
            outline: none;
            border-color: #0891b2;
        }

        /* Drug List */
        .drug-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .drug-card {
            padding: 16px;
            border-bottom: 1px solid #f0fdfa;
            cursor: pointer;
            transition: background 0.2s;
        }

        .drug-card:hover {
            background: #f0fdfa;
        }

        .drug-card:last-child {
            border-bottom: none;
        }

        .drug-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .drug-name {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
        }

        .status-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .status-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-normal {
            background: #dcfce7;
            color: #166534;
        }

        .tag-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .tag-low-stock {
            background: #fed7aa;
            color: #9a3412;
        }

        .tag-urgent {
            background: #fee2e2;
            color: #991b1b;
        }

        .drug-info {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .info-label {
            opacity: 0.7;
        }

        .info-value {
            font-weight: 500;
            color: #164E63;
        }

        /* Empty State */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #64748b;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        /* FAB Button */
        .fab-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #059669;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab-button:hover {
            background: #047857;
            transform: scale(1.05);
        }

        .fab-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Member Tabs -->
        <div class="member-tabs">
            <div class="tab active">
                <div class="tab-name">全部成员</div>
                <div class="tab-count">8种药品</div>
            </div>
            <div class="tab">
                <div class="tab-name">👴 爷爷</div>
                <div class="tab-count">3种</div>
            </div>
            <div class="tab">
                <div class="tab-name">👵 奶奶</div>
                <div class="tab-count">5种</div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="搜索药品名称...">
            </div>
        </div>

        <!-- Drug List -->
        <div class="drug-list">
            <!-- Normal Status -->
            <div class="drug-card">
                <div class="drug-header">
                    <div class="drug-name">阿莫西林胶囊</div>
                    <div class="status-tags">
                        <span class="status-tag tag-normal">正常</span>
                    </div>
                </div>
                <div class="drug-info">
                    <div class="info-item">
                        <span class="info-label">剩余：</span>
                        <span class="info-value">18粒</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">有效期至：</span>
                        <span class="info-value">2027-06</span>
                    </div>
                </div>
            </div>

            <!-- Near Expiry -->
            <div class="drug-card">
                <div class="drug-header">
                    <div class="drug-name">降压灵片</div>
                    <div class="status-tags">
                        <span class="status-tag tag-warning">近效期</span>
                    </div>
                </div>
                <div class="drug-info">
                    <div class="info-item">
                        <span class="info-label">剩余：</span>
                        <span class="info-value">24片</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">有效期至：</span>
                        <span class="info-value">2024-09</span>
                    </div>
                </div>
            </div>

            <!-- Low Stock -->
            <div class="drug-card">
                <div class="drug-header">
                    <div class="drug-name">维生素D滴剂</div>
                    <div class="status-tags">
                        <span class="status-tag tag-low-stock">库存不足</span>
                    </div>
                </div>
                <div class="drug-info">
                    <div class="info-item">
                        <span class="info-label">剩余：</span>
                        <span class="info-value">3粒</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">有效期至：</span>
                        <span class="info-value">2025-12</span>
                    </div>
                </div>
            </div>

            <!-- Urgent/Expired -->
            <div class="drug-card">
                <div class="drug-header">
                    <div class="drug-name">感冒清热颗粒</div>
                    <div class="status-tags">
                        <span class="status-tag tag-urgent">已过期</span>
                    </div>
                </div>
                <div class="drug-info">
                    <div class="info-item">
                        <span class="info-label">剩余：</span>
                        <span class="info-value">5袋</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">有效期至：</span>
                        <span class="info-value" style="color: #ef4444;">2024-03</span>
                    </div>
                </div>
            </div>

            <!-- Another Normal Drug -->
            <div class="drug-card">
                <div class="drug-header">
                    <div class="drug-name">钙尔奇D</div>
                    <div class="status-tags">
                        <span class="status-tag tag-normal">正常</span>
                    </div>
                </div>
                <div class="drug-info">
                    <div class="info-item">
                        <span class="info-label">剩余：</span>
                        <span class="info-value">60片</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">有效期至：</span>
                        <span class="info-value">2026-03</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab-button" title="添加药品">+</button>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Card click
        const drugCards = document.querySelectorAll('.drug-card');
        drugCards.forEach(card => {
            card.addEventListener('click', function() {
                const drugName = this.querySelector('.drug-name').textContent;
                console.log('Navigating to detail for:', drugName);
            });
        });

        // FAB button
        document.querySelector('.fab-button').addEventListener('click', function() {
            alert('打开添加药品页面');
        });

        // Search functionality
        const searchInput = document.querySelector('.search-input');
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            drugCards.forEach(card => {
                const drugName = card.querySelector('.drug-name').textContent.toLowerCase();
                if (drugName.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
