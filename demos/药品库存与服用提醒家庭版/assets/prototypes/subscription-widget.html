<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅管理组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Current Plan Header */
        .plan-header {
            padding: 24px;
            background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%);
            color: white;
            text-align: center;
        }

        .plan-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .plan-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .plan-status {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Feature Comparison */
        .comparison-section {
            padding: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
            margin-bottom: 16px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th {
            padding: 12px;
            background: #f0fdfa;
            font-size: 14px;
            font-weight: 600;
            color: #164E63;
            text-align: center;
        }

        .comparison-table th:first-child {
            text-align: left;
        }

        .comparison-table td {
            padding: 12px;
            border-top: 1px solid #e0f2fe;
            font-size: 14px;
            color: #64748b;
            text-align: center;
        }

        .comparison-table td:first-child {
            text-align: left;
            font-weight: 500;
            color: #164E63;
        }

        .check-icon {
            color: #22c55e;
            font-size: 18px;
        }

        .cross-icon {
            color: #cbd5e1;
            font-size: 18px;
        }

        .highlight-col {
            background: #f0fdfa;
        }

        /* Price Display */
        .price-section {
            padding: 20px;
            text-align: center;
            background: #f8fafc;
        }

        .price-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .price-value {
            font-size: 36px;
            font-weight: 700;
            color: #0891b2;
            margin-bottom: 4px;
        }

        .price-unit {
            font-size: 16px;
            color: #64748b;
        }

        .price-note {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* Renewal Button */
        .renewal-btn {
            width: calc(100% - 32px);
            margin: 0 16px 20px;
            padding: 16px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .renewal-btn:hover {
            background: #047857;
        }

        .renewal-btn:active {
            transform: scale(0.98);
        }

        /* Upgrade Banner */
        .upgrade-banner {
            margin: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upgrade-icon {
            font-size: 32px;
        }

        .upgrade-content {
            flex: 1;
        }

        .upgrade-title {
            font-size: 14px;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 4px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: #a16207;
        }

        .upgrade-btn {
            padding: 8px 16px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Trial Info */
        .trial-info {
            margin: 16px;
            padding: 12px;
            background: #dbeafe;
            border-radius: 8px;
            font-size: 12px;
            color: #1e40af;
            line-height: 1.5;
        }

        /* Auto-renewal Toggle */
        .auto-renewal {
            margin: 16px;
            padding: 12px;
            background: white;
            border: 1px solid #e0f2fe;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-label {
            font-size: 14px;
            color: #164E63;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 24px;
            background: #059669;
            border-radius: 12px;
            cursor: pointer;
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 26px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: left 0.2s;
        }

        /* FAQ Link */
        .faq-link {
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: #0891b2;
            cursor: pointer;
        }

        .faq-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Current Plan Header -->
        <div class="plan-header">
            <div class="plan-badge">👑 当前套餐</div>
            <div class="plan-name">家庭版</div>
            <div class="plan-status">有效期至 2024-12-31</div>
        </div>

        <!-- Feature Comparison -->
        <div class="comparison-section">
            <div class="section-title">📊 功能对比</div>
            <table class="comparison-table">
                <thead>
                    <tr>
                        <th>功能</th>
                        <th>免费版</th>
                        <th class="highlight-col">家庭版 ⭐</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>成员数量</td>
                        <td>2人</td>
                        <td class="highlight-col">不限</td>
                    </tr>
                    <tr>
                        <td>药品库存</td>
                        <td>最多10种</td>
                        <td class="highlight-col">不限</td>
                    </tr>
                    <tr>
                        <td>提醒次数</td>
                        <td>每日3次</td>
                        <td class="highlight-col">不限</td>
                    </tr>
                    <tr>
                        <td>用药记录</td>
                        <td>30天</td>
                        <td class="highlight-col">永久保存</td>
                    </tr>
                    <tr>
                        <td>库存预警</td>
                        <td>✗</td>
                        <td class="highlight-col"><span class="check-icon">✓</span></td>
                    </tr>
                    <tr>
                        <td>补药清单</td>
                        <td>✗</td>
                        <td class="highlight-col"><span class="check-icon">✓</span></td>
                    </tr>
                    <tr>
                        <td>数据导出</td>
                        <td>✗</td>
                        <td class="highlight-col"><span class="check-icon">✓</span></td>
                    </tr>
                    <tr>
                        <td>多设备同步</td>
                        <td>✗</td>
                        <td class="highlight-col"><span class="check-icon">✓</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Price Display -->
        <div class="price-section">
            <div class="price-label">订阅价格</div>
            <div class="price-value">¥12<span class="price-unit">/月</span></div>
            <div class="price-note">年付仅需 ¥120，省 ¥24</div>
        </div>

        <!-- Renewal Button -->
        <button class="renewal-btn">续费订阅</button>

        <!-- Upgrade Banner (for free users) -->
        <div class="upgrade-banner" style="display: none;">
            <div class="upgrade-icon">🚀</div>
            <div class="upgrade-content">
                <div class="upgrade-title">升级到家庭版</div>
                <div class="upgrade-desc">解锁全部功能，畅享无限可能</div>
            </div>
            <button class="upgrade-btn">立即升级</button>
        </div>

        <!-- Trial Info -->
        <div class="trial-info">
            💡 您还有 7 天试用期，试用期间可享受家庭版全部功能
        </div>

        <!-- Auto-renewal Toggle -->
        <div class="auto-renewal">
            <span class="toggle-label">自动续费</span>
            <div class="toggle-switch" onclick="this.classList.toggle('active')">
                <div class="toggle-knob"></div>
            </div>
        </div>

        <!-- FAQ Link -->
        <div class="faq-link">
            ❓ 常见问题解答 ›
        </div>
    </div>

    <script>
        // Renewal button
        document.querySelector('.renewal-btn').addEventListener('click', function() {
            alert('跳转到支付页面');
        });

        // Upgrade button
        document.querySelector('.upgrade-btn')?.addEventListener('click', function() {
            alert('选择支付方式并升级到家庭版');
        });

        // Toggle switch
        const toggleSwitch = document.querySelector('.toggle-switch');
        if (toggleSwitch) {
            toggleSwitch.addEventListener('click', function() {
                const knob = this.querySelector('.toggle-knob');
                if (knob.style.left === '26px' || !knob.style.left) {
                    knob.style.left = '2px';
                    this.style.background = '#cbd5e1';
                } else {
                    knob.style.left = '26px';
                    this.style.background = '#059669';
                }
            });
        }

        // FAQ link
        document.querySelector('.faq-link').addEventListener('click', function() {
            alert('打开常见问题页面');
        });
    </script>
</body>
</html>
