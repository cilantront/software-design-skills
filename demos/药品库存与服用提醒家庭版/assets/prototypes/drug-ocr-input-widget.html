<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR识别输入组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Photo Preview */
        .photo-preview {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f0fdfa 0%, #ecfeff 100%);
            border: 2px dashed #22d3ee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .photo-placeholder {
            text-align: center;
            color: #0891b2;
        }

        .photo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .photo-text {
            font-size: 14px;
        }

        .confidence-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(8, 145, 178, 0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* OCR Results */
        .ocr-results {
            margin-bottom: 20px;
        }

        .result-item {
            margin-bottom: 16px;
            padding: 12px;
            background: #f0fdfa;
            border-radius: 8px;
            border-left: 3px solid #0891b2;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .confidence-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .confidence-high {
            background: #dcfce7;
            color: #166534;
        }

        .confidence-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .confidence-low {
            background: #fee2e2;
            color: #991b1b;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #22d3ee;
            border-radius: 6px;
            font-size: 16px;
            background: white;
            color: #164E63;
        }

        .form-input:focus {
            outline: none;
            border-color: #0891b2;
        }

        /* Edit indicator */
        .edit-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-retake {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-confirm {
            background: #059669;
            color: white;
        }

        .btn-confirm:hover {
            background: #047857;
        }

        .overall-confidence {
            text-align: center;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .confidence-title {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .confidence-value {
            font-size: 24px;
            font-weight: 700;
            color: #0891b2;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Photo Preview -->
        <div class="photo-preview">
            <div class="photo-placeholder">
                <div class="photo-icon">📸</div>
                <div class="photo-text">药品包装照片</div>
            </div>
            <div class="confidence-badge">识别完成</div>
        </div>

        <!-- Overall Confidence -->
        <div class="overall-confidence">
            <div class="confidence-title">整体识别准确率</div>
            <div class="confidence-value">89%</div>
        </div>

        <!-- OCR Results -->
        <div class="ocr-results">
            <div class="result-item">
                <div class="result-header">
                    <span class="result-label">药品名称</span>
                    <span class="confidence-tag confidence-high">
                        ✓ 96%
                    </span>
                </div>
                <input type="text" class="form-input" value="阿莫西林胶囊">
                <div class="edit-hint">✏️ 点击可编辑</div>
            </div>

            <div class="result-item">
                <div class="result-header">
                    <span class="result-label">规格</span>
                    <span class="confidence-tag confidence-high">
                        ✓ 92%
                    </span>
                </div>
                <input type="text" class="form-input" value="0.25g × 24粒">
                <div class="edit-hint">✏️ 点击可编辑</div>
            </div>

            <div class="result-item">
                <div class="result-header">
                    <span class="result-label">有效期至</span>
                    <span class="confidence-tag confidence-medium">
                        ⚠ 78%
                    </span>
                </div>
                <input type="text" class="form-input" value="2027年06月">
                <div class="edit-hint">⚠️ 建议核对原件</div>
            </div>

            <div class="result-item">
                <div class="result-header">
                    <span class="result-label">生产厂家</span>
                    <span class="confidence-tag confidence-high">
                        ✓ 94%
                    </span>
                </div>
                <input type="text" class="form-input" value="华北制药股份有限公司">
                <div class="edit-hint">✏️ 点击可编辑</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-retake">重新拍照</button>
            <button class="btn btn-confirm">确认结果</button>
        </div>
    </div>

    <script>
        // Interaction simulation
        document.querySelector('.btn-confirm').addEventListener('click', function() {
            alert('识别结果已确认，药品信息已保存！');
        });

        document.querySelector('.btn-retake').addEventListener('click', function() {
            alert('请重新拍摄药品包装照片');
        });

        // Highlight low confidence fields
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.backgroundColor = '#fffbeb';
            });
            input.addEventListener('blur', function() {
                this.style.backgroundColor = 'white';
            });
        });
    </script>
</body>
</html>
