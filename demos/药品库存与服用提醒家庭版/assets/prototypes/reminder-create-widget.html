<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建提醒组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0fdfa;
        }

        .form-title {
            font-size: 18px;
            font-weight: 700;
            color: #0891b2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #164E63;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Drug Selector */
        .drug-selector {
            width: 100%;
            padding: 12px;
            border: 1px solid #22d3ee;
            border-radius: 8px;
            font-size: 16px;
            background: #ecfeff;
            cursor: pointer;
        }

        .drug-selector:focus {
            outline: none;
            border-color: #0891b2;
        }

        /* Time Pills */
        .time-pills-section {
            background: #f0fdfa;
            border-radius: 8px;
            padding: 16px;
        }

        .time-pills-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .add-time-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #0891b2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .time-pill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .time-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: white;
            border: 1px solid #22d3ee;
            border-radius: 20px;
            font-size: 14px;
        }

        .remove-pill {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fee2e2;
            color: #ef4444;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* Dosage Input */
        .dosage-input-group {
            display: flex;
            gap: 8px;
        }

        .dosage-amount {
            flex: 1;
        }

        .dosage-unit {
            width: 100px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #22d3ee;
            border-radius: 8px;
            font-size: 16px;
            background: #ecfeff;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #0891b2;
        }

        /* Cycle Type Tabs */
        .cycle-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .cycle-tab {
            flex: 1;
            padding: 10px;
            border: 1px solid #22d3ee;
            background: white;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cycle-tab.active {
            background: #0891b2;
            color: white;
            border-color: #0891b2;
        }

        .date-range-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-input {
            flex: 1;
        }

        /* Reminder Method Toggle */
        .method-toggles {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f0fdfa;
            border-radius: 8px;
        }

        .toggle-label {
            font-size: 14px;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 24px;
            background: #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: #059669;
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.active .toggle-knob {
            transform: translateX(24px);
        }

        /* Save Button */
        .save-btn {
            width: 100%;
            padding: 16px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .save-btn:hover {
            background: #047857;
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        /* Info tip */
        .info-tip {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            padding: 8px;
            background: #fef3c7;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="form-header">
            <div class="form-title">🔔 创建用药提醒</div>
        </div>

        <!-- Drug Selection -->
        <div class="form-group">
            <label class="form-label">选择药品</label>
            <select class="drug-selector">
                <option value="">请选择要提醒的药品</option>
                <option value="amoxicillin">阿莫西林胶囊 (爷爷)</option>
                <option value="calcium">钙尔奇D (奶奶)</option>
                <option value="vitamin">维生素D滴剂 (宝宝)</option>
            </select>
        </div>

        <!-- Time Pills -->
        <div class="form-group">
            <label class="form-label">提醒时间</label>
            <div class="time-pills-section">
                <div class="time-pills-header">
                    <span style="font-size: 14px; color: #64748b;">已设置的时间</span>
                    <button class="add-time-btn">+ 添加时间</button>
                </div>
                <div class="time-pill-list">
                    <div class="time-pill">
                        <span>08:00</span>
                        <button class="remove-pill">×</button>
                    </div>
                    <div class="time-pill">
                        <span>12:00</span>
                        <button class="remove-pill">×</button>
                    </div>
                    <div class="time-pill">
                        <span>20:00</span>
                        <button class="remove-pill">×</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dosage -->
        <div class="form-group">
            <label class="form-label">每次用量</label>
            <div class="dosage-input-group">
                <input type="number" class="form-input dosage-amount" placeholder="剂量" value="2">
                <select class="form-select dosage-unit">
                    <option value="pills">粒</option>
                    <option value="tablets">片</option>
                    <option value="capsules">胶囊</option>
                    <option value="ml">毫升</option>
                </select>
            </div>
        </div>

        <!-- Cycle Type -->
        <div class="form-group">
            <label class="form-label">提醒周期</label>
            <div class="cycle-tabs">
                <div class="cycle-tab active">长期服用</div>
                <div class="cycle-tab">指定日期</div>
            </div>

            <!-- Date range (hidden by default) -->
            <div class="date-range-input" style="display: none;">
                <input type="date" class="form-input date-input">
                <span>至</span>
                <input type="date" class="form-input date-input">
            </div>

            <div class="info-tip">
                💡 长期服用：每天提醒，直到手动停止<br>
                指定日期：在设定的日期范围内提醒
            </div>
        </div>

        <!-- Reminder Method -->
        <div class="form-group">
            <label class="form-label">提醒方式</label>
            <div class="method-toggles">
                <div class="toggle-item">
                    <span class="toggle-label">推送通知</span>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="toggle-item">
                    <span class="toggle-label">声音提醒</span>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="toggle-item">
                    <span class="toggle-label">振动</span>
                    <div class="toggle-switch" onclick="this.classList.toggle('active')">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Save Button -->
        <button class="save-btn">保存提醒</button>
    </div>

    <script>
        // Cycle tab switching
        const cycleTabs = document.querySelectorAll('.cycle-tab');
        const dateRangeInput = document.querySelector('.date-range-input');

        cycleTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                cycleTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                if (this.textContent === '指定日期') {
                    dateRangeInput.style.display = 'flex';
                } else {
                    dateRangeInput.style.display = 'none';
                }
            });
        });

        // Remove time pill
        document.querySelectorAll('.remove-pill').forEach(btn => {
            btn.addEventListener('click', function() {
                this.parentElement.remove();
            });
        });

        // Add time pill
        document.querySelector('.add-time-btn').addEventListener('click', function() {
            const newTime = prompt('请输入提醒时间 (HH:MM格式):', '08:00');
            if (newTime && /^\d{2}:\d{2}$/.test(newTime)) {
                const pillList = document.querySelector('.time-pill-list');
                const newPill = document.createElement('div');
                newPill.className = 'time-pill';
                newPill.innerHTML = `
                    <span>${newTime}</span>
                    <button class="remove-pill">×</button>
                `;
                pillList.appendChild(newPill);

                // Add remove handler to new pill
                newPill.querySelector('.remove-pill').addEventListener('click', function() {
                    this.parentElement.remove();
                });
            }
        });

        // Save button
        document.querySelector('.save-btn').addEventListener('click', function() {
            alert('提醒已成功创建！');
        });
    </script>
</body>
</html>
