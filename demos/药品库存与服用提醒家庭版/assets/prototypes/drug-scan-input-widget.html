<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药品扫描输入组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Scan Area */
        .scan-area {
            background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .scan-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .scan-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .scanned-code {
            margin-top: 12px;
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #164E63;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #22d3ee;
            border-radius: 8px;
            font-size: 16px;
            background: #ecfeff;
            color: #164E63;
        }

        .form-input:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 2px rgba(8, 145, 178, 0.1);
        }

        .form-input[readonly] {
            background: #f0fdfa;
            color: #64748b;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-rescan {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-rescan:hover {
            background: #e2e8f0;
        }

        .btn-confirm {
            background: #059669;
            color: white;
        }

        .btn-confirm:hover {
            background: #047857;
        }

        .btn-confirm:active {
            transform: scale(0.98);
        }

        /* Status indicator */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #22c55e;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Scanned Result Area -->
        <div class="scan-area">
            <div class="scan-icon">📷</div>
            <div class="scan-text">扫描成功</div>
            <div class="scanned-code">条码：6901234567890</div>
        </div>

        <!-- Pre-filled Form -->
        <div class="form-group">
            <label class="form-label">药品名称 <span style="color: #ef4444;">*</span></label>
            <input type="text" class="form-input" value="阿莫西林胶囊" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">规格</label>
            <input type="text" class="form-input" value="0.25g × 24粒" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">生产厂家</label>
            <input type="text" class="form-input" value="华北制药股份有限公司" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">有效期至</label>
            <input type="date" class="form-input" value="2027-06-30">
        </div>

        <div class="form-group">
            <label class="form-label">数量</label>
            <input type="number" class="form-input" value="1" min="1">
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
            <button class="btn btn-rescan">重新扫描</button>
            <button class="btn btn-confirm">确认添加</button>
        </div>
    </div>

    <script>
        // Simulate interaction
        document.querySelector('.btn-confirm').addEventListener('click', function() {
            alert('药品已成功添加到库存！');
        });

        document.querySelector('.btn-rescan').addEventListener('click', function() {
            alert('请对准药品条形码进行扫描');
        });
    </script>
</body>
</html>
