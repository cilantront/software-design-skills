<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭管理组件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ecfeff;
            color: #164E63;
            padding: 16px;
            max-width: 375px;
            margin: 0 auto;
        }

        .widget-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Family Header */
        .family-header {
            padding: 20px;
            background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%);
            color: white;
            text-align: center;
        }

        .family-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .family-count {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Member List */
        .member-section {
            padding: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .member-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f0fdfa;
            border-radius: 8px;
        }

        .member-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
            margin-bottom: 2px;
        }

        .member-role {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .role-admin {
            background: #dbeafe;
            color: #1e40af;
        }

        .role-patient {
            background: #dcfce7;
            color: #166534;
        }

        .role-caregiver {
            background: #fef3c7;
            color: #92400e;
        }

        .member-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            background: white;
            border: 1px solid #22d3ee;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #f0fdfa;
        }

        /* Invite Section */
        .invite-section {
            margin-top: 24px;
            padding: 20px;
            background: #f0fdfa;
            border-radius: 8px;
            border: 2px dashed #22d3ee;
        }

        .invite-title {
            font-size: 16px;
            font-weight: 600;
            color: #164E63;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .invite-code-section {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .code-display {
            flex: 1;
            padding: 12px;
            background: white;
            border: 1px solid #22d3ee;
            border-radius: 8px;
            text-align: center;
        }

        .code-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .code-value {
            font-size: 20px;
            font-weight: 700;
            color: #0891b2;
            letter-spacing: 2px;
        }

        .copy-btn {
            padding: 12px 16px;
            background: #0891b2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #0e7490;
        }

        .share-btn {
            width: 100%;
            padding: 14px;
            background: #059669;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-btn:hover {
            background: #047857;
        }

        .invite-tip {
            margin-top: 12px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }

        /* Add member button */
        .add-member-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px dashed #22d3ee;
            border-radius: 8px;
            color: #0891b2;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-member-btn:hover {
            background: #f0fdfa;
        }

        /* Settings link */
        .settings-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-top: 16px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .settings-text {
            font-size: 14px;
            color: #64748b;
        }

        .chevron {
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Family Header -->
        <div class="family-header">
            <div class="family-name">🏠 王家药箱</div>
            <div class="family-count">4位家庭成员</div>
        </div>

        <!-- Member List -->
        <div class="member-section">
            <div class="section-title">家庭成员</div>

            <div class="member-list">
                <!-- Admin -->
                <div class="member-card">
                    <div class="member-avatar">👨</div>
                    <div class="member-info">
                        <div class="member-name">王大明</div>
                        <span class="member-role role-admin">👑 管理员</span>
                    </div>
                    <div class="member-actions">
                        <button class="icon-btn" title="编辑">✏️</button>
                    </div>
                </div>

                <!-- Patient -->
                <div class="member-card">
                    <div class="member-avatar">👴</div>
                    <div class="member-info">
                        <div class="member-name">爷爷（王建国）</div>
                        <span class="member-role role-patient">💊 用药人</span>
                    </div>
                    <div class="member-actions">
                        <button class="icon-btn" title="编辑">✏️</button>
                    </div>
                </div>

                <!-- Caregiver -->
                <div class="member-card">
                    <div class="member-avatar">👵</div>
                    <div class="member-info">
                        <div class="member-name">奶奶（李秀英）</div>
                        <span class="member-role role-caregiver">❤️ 照护者</span>
                    </div>
                    <div class="member-actions">
                        <button class="icon-btn" title="编辑">✏️</button>
                    </div>
                </div>

                <!-- Another member -->
                <div class="member-card">
                    <div class="member-avatar">👶</div>
                    <div class="member-info">
                        <div class="member-name">宝宝（王小宝）</div>
                        <span class="member-role role-patient">💊 用药人</span>
                    </div>
                    <div class="member-actions">
                        <button class="icon-btn" title="编辑">✏️</button>
                    </div>
                </div>
            </div>

            <button class="add-member-btn">+ 添加成员</button>

            <div class="settings-link">
                <span class="settings-text">⚙️ 成员权限管理</span>
                <span class="chevron">›</span>
            </div>
        </div>

        <!-- Invite Section -->
        <div class="member-section" style="padding-top: 0;">
            <div class="invite-section">
                <div class="invite-title">
                    📧 邀请新成员
                </div>

                <div class="invite-code-section">
                    <div class="code-display">
                        <div class="code-label">邀请码</div>
                        <div class="code-value">A7K9M2</div>
                    </div>
                    <button class="copy-btn">复制</button>
                </div>

                <button class="share-btn">
                    🔗 分享邀请链接
                </button>

                <div class="invite-tip">
                    💡 邀请码有效期为7天，分享给家人后，他们可以使用此码加入您的家庭药箱
                </div>
            </div>
        </div>
    </div>

    <script>
        // Copy invitation code
        document.querySelector('.copy-btn').addEventListener('click', function() {
            const code = 'A7K9M2';
            navigator.clipboard.writeText(code).then(() => {
                alert('邀请码已复制到剪贴板');
            }).catch(() => {
                alert('复制失败，请手动记录：' + code);
            });
        });

        // Share button
        document.querySelector('.share-btn').addEventListener('click', function() {
            if (navigator.share) {
                navigator.share({
                    title: '加入王家药箱',
                    text: '邀请您加入家庭药箱，共同管理用药提醒',
                    url: window.location.href
                });
            } else {
                alert('分享链接已生成，可通过微信发送给家人');
            }
        });

        // Add member button
        document.querySelector('.add-member-btn').addEventListener('click', function() {
            alert('打开添加成员对话框');
        });

        // Edit buttons
        document.querySelectorAll('.icon-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.title === '编辑') {
                    alert('编辑成员信息');
                }
            });
        });

        // Settings link
        document.querySelector('.settings-link').addEventListener('click', function() {
            alert('打开成员权限管理页面');
        });
    </script>
</body>
</html>
