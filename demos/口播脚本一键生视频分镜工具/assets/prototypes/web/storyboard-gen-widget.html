<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI分镜生成组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.gen-widget { max-width: 600px; background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.gen-header { text-align: center; margin-bottom: 24px; }
.gen-icon { font-size: 48px; margin-bottom: 8px; }
.gen-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.gen-desc { font-size: 13px; color: #666; }
.script-preview { background: #f5f7fa; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
.preview-label { font-size: 12px; color: #999; margin-bottom: 6px; }
.preview-text { font-size: 13px; color: #333; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.preview-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #667eea; }
.gen-options { margin-bottom: 20px; }
.option-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.option-label { font-size: 13px; color: #333; }
.option-value { font-size: 13px; color: #667eea; font-weight: 600; }
.gen-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.cost-hint { text-align: center; font-size: 12px; color: #999; margin-top: 12px; }
.progress-section { display: none; }
.progress-section.active { display: block; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-title { font-size: 14px; font-weight: 600; color: #667eea; }
.progress-percent { font-size: 14px; color: #667eea; font-weight: 600; }
.progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); animation: progress 3s ease-in-out infinite; }
@keyframes progress { 0% { width: 0; } 50% { width: 70%; } 100% { width: 95%; } }
.progress-steps { list-style: none; }
.progress-steps li { padding: 8px 0; font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; }
.step-icon { width: 20px; height: 20px; border-radius: 50%; background: #f0f2ff; color: #667eea; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.step-icon.done { background: #4caf50; color: #fff; }
.step-icon.active { background: #667eea; color: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
</style>
</head>
<body>
<div class="widget-title">✨ AI分镜生成 Widget</div>
<div class="gen-widget">
  <div class="gen-header">
    <div class="gen-icon">✨</div>
    <div class="gen-title">AI 一键生成分镜</div>
    <div class="gen-desc">AI 将根据你的脚本自动拆分段落并生成画面建议</div>
  </div>

  <div class="script-preview">
    <div class="preview-label">📜 待处理脚本</div>
    <div class="preview-text">大家好，今天给大家分享5个我亲测有效的晨间习惯，坚持一个月你会发现整个人的状态完全不一样。第一个习惯，早起后先喝一杯温水...</div>
    <div class="preview-stats">
      <span>📝 1,230字</span>
      <span>⏱️ 预计10-15秒</span>
      <span>💰 消耗1个额度</span>
    </div>
  </div>

  <div class="gen-options">
    <div class="option-row">
      <span class="option-label">分镜数量</span>
      <span class="option-value">AI 智能决定</span>
    </div>
    <div class="option-row">
      <span class="option-label">画面描述风格</span>
      <span class="option-value">详细</span>
    </div>
    <div class="option-row">
      <span class="option-label">剩余脚本额度</span>
      <span class="option-value">3/10</span>
    </div>
  </div>

  <button class="gen-btn" onclick="document.querySelector('.gen-options').style.display='none';document.querySelector('.progress-section').classList.add('active');this.style.display='none';document.querySelector('.cost-hint').style.display='none';">✨ 开始生成分镜</button>
  <div class="cost-hint">本次操作将消耗 1 个脚本额度</div>

  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-title">🔄 AI 正在处理中...</div>
      <div class="progress-percent">约8秒</div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <ul class="progress-steps">
      <li><span class="step-icon done">✓</span> 脚本语义分析</li>
      <li><span class="step-icon done">✓</span> 段落智能拆分</li>
      <li><span class="step-icon active">⋯</span> 生成画面描述建议</li>
      <li><span class="step-icon">4</span> 提取关键词</li>
      <li><span class="step-icon">5</span> 渲染分镜卡片</li>
    </ul>
  </div>
</div>
</body>
</html>
