<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>套餐管理组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.sub-widget { max-width: 480px; background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.current-plan { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 20px; color: #fff; margin-bottom: 20px; }
.plan-label { font-size: 12px; opacity: 0.8; }
.plan-name { font-size: 22px; font-weight: 700; margin: 4px 0; }
.plan-meta { font-size: 13px; opacity: 0.9; }
.quota-section { margin-bottom: 20px; }
.quota-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
.quota-bar { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
.quota-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); }
.quota-hint { font-size: 12px; color: #999; margin-top: 6px; }
.upgrade-card { border: 2px solid #667eea; border-radius: 12px; padding: 20px; background: linear-gradient(135deg, rgba(102,126,234,0.03), rgba(118,75,162,0.03)); }
.upgrade-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.upgrade-price { font-size: 28px; font-weight: 700; color: #667eea; margin: 8px 0; }
.upgrade-price span { font-size: 13px; color: #999; font-weight: 400; }
.upgrade-features { list-style: none; margin: 12px 0; }
.upgrade-features li { padding: 6px 0; font-size: 13px; color: #555; }
.upgrade-features li::before { content: '✓ '; color: #4caf50; font-weight: 700; }
.upgrade-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.alert-box { background: #fff3e0; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 13px; color: #e65100; display: flex; gap: 8px; align-items: flex-start; }
</style>
</head>
<body>
<div class="widget-title">💎 套餐管理 Widget</div>
<div class="sub-widget">
  <div class="current-plan">
    <div class="plan-label">当前套餐</div>
    <div class="plan-name">免费版</div>
    <div class="plan-meta">到期日：— · 本月剩余 3 个脚本额度</div>
  </div>
  <div class="quota-section">
    <div class="quota-header">
      <span>本月脚本额度</span>
      <span style="color:#667eea;font-weight:600;">7/10</span>
    </div>
    <div class="quota-bar"><div class="quota-fill" style="width:70%;"></div></div>
    <div class="quota-hint">每月1日重置额度，未使用不累计</div>
  </div>
  <div class="upgrade-card">
    <div class="upgrade-title">🚀 升级 Pro 版</div>
    <div class="upgrade-price">¥15 <span>/月</span></div>
    <ul class="upgrade-features">
      <li>无限脚本额度</li>
      <li>AI 素材智能匹配</li>
      <li>内置专业提词器</li>
      <li>多平台尺寸适配导出</li>
      <li>图片 / PDF 高质量导出</li>
    </ul>
    <button class="upgrade-btn">立即升级 Pro</button>
  </div>
  <div class="alert-box">
    <span>⚠️</span>
    <div>额度用尽后将无法新建分镜，升级 Pro 版即可无限使用全部功能。</div>
  </div>
</div>
</body>
</html>
