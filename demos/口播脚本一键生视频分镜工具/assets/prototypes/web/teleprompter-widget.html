<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>提词器组件原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px; }
.widget-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
.tele-widget { max-width: 720px; background: #1a1a2e; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; }
.tele-header { padding: 12px 20px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; color: #fff; }
.tele-title { font-size: 14px; }
.tele-close { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
.tele-screen { height: 320px; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%); }
.tele-scroll { animation: scroll 15s linear infinite; }
@keyframes scroll { 0% { transform: translateY(50%); } 100% { transform: translateY(-100%); } }
.tele-text { font-size: 24px; line-height: 2; color: #fff; text-align: center; padding: 0 40px; }
.tele-text .kw { color: #ffd700; font-weight: 700; }
.tele-sep { border-top: 2px dashed rgba(255,255,255,0.3); margin: 20px 40px; }
.tele-panel { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 180px; background: rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; backdrop-filter: blur(10px); }
.panel-title { color: #fff; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
.slider-group { margin-bottom: 10px; }
.slider-label { color: rgba(255,255,255,0.7); font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 4px; }
.slider { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #667eea; cursor: pointer; }
.tele-controls { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; }
.ctrl-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; cursor: pointer; font-size: 16px; }
.ctrl-btn.primary { width: 52px; height: 52px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; font-size: 20px; }
.pro-tag { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
</style>
</head>
<body>
<div class="widget-title" style="color:#333;">📺 提词器 Widget <span style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:2px 8px;border-radius:10px;font-size:12px;">Pro</span></div>
<div class="tele-widget">
  <span class="pro-tag">Pro 功能</span>
  <div class="tele-header">
    <div class="tele-title">📺 提词器 · 5个晨间习惯</div>
    <button class="tele-close">✕</button>
  </div>
  <div class="tele-screen">
    <div class="tele-scroll">
      <div class="tele-text">
        大家好，今天给大家分享<span class="kw">5个</span>我<span class="kw">亲测有效</span>的<span class="kw">晨间习惯</span>
        <div class="tele-sep"></div>
        第一个习惯，早起后先喝一杯<span class="kw">温水</span>
        <div class="tele-sep"></div>
        第二个习惯，做10分钟的<span class="kw">拉伸运动</span>
        <div class="tele-sep"></div>
        第三个习惯，吃一顿<span class="kw">营养均衡</span>的早餐
      </div>
    </div>
    <div class="tele-panel">
      <div class="panel-title">⚙️ 参数</div>
      <div class="slider-group">
        <div class="slider-label"><span>速度</span><span>5级</span></div>
        <input type="range" class="slider" min="1" max="10" value="5" />
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>字号</span><span>36px</span></div>
        <input type="range" class="slider" min="24" max="72" value="36" />
      </div>
    </div>
  </div>
  <div class="tele-controls">
    <button class="ctrl-btn">⏮</button>
    <button class="ctrl-btn primary">⏸</button>
    <button class="ctrl-btn">⏭</button>
  </div>
</div>
</body>
</html>
