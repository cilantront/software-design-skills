<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>注册登录组件原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3FF;padding:32px;color:#312E81;}
.widget{max-width:380px;margin:0 auto;background:white;border-radius:16px;border:1px solid #E5E7EB;padding:32px;box-shadow:0 8px 24px rgba(99,102,241,0.12);}
.logo{text-align:center;margin-bottom:24px;}
.logo h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#6366F1,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo p{font-size:12px;color:#6B7280;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;}
.form-input{width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;}
.form-input:focus{outline:none;border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.code-row{display:flex;gap:8px;}
.code-row input{flex:1;}
.code-btn{padding:10px 14px;background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;font-size:12px;font-weight:600;color:#6366F1;cursor:pointer;white-space:nowrap;}
.btn-login{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:#9CA3AF;font-size:11px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E5E7EB;}
.wechat-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;cursor:pointer;width:100%;background:white;}
.wechat-btn:hover{border-color:#07C160;color:#07C160;}
</style>
</head>
<body>
<div class="widget">
  <div class="logo">
    <h1>内容跨平台格式适配工具</h1>
    <p>一份内容，多平台适配，一键分发</p>
  </div>
  <div class="form-group">
    <label class="form-label">手机号</label>
    <input type="tel" class="form-input" placeholder="请输入手机号" maxlength="11">
  </div>
  <div class="form-group">
    <label class="form-label">验证码</label>
    <div class="code-row">
      <input type="text" class="form-input" placeholder="请输入验证码" maxlength="6">
      <button class="code-btn">获取验证码</button>
    </div>
  </div>
  <button class="btn-login">登录 / 注册</button>
  <div class="divider">其他登录方式</div>
  <button class="wechat-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#07C160"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z"/></svg>
    微信扫码登录
  </button>
</div>
</body>
</html>
