<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>素材上传组件原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3FF;padding:32px;color:#312E81;}
.widget{max-width:640px;margin:0 auto;background:white;border-radius:16px;border:1px solid #E5E7EB;padding:32px;box-shadow:0 4px 12px rgba(99,102,241,0.08);}
.title{font-size:14px;font-weight:600;margin-bottom:16px;color:#312E81;}
.upload-zone{border:2px dashed #D5D8DC;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover{border-color:#818CF8;background:#FAFAFE;}
.upload-zone.dragover{border-color:#6366F1;background:#EEF2FF;}
.upload-icon{width:48px;height:48px;margin:0 auto 12px;background:linear-gradient(135deg,#EEF2FF,#EDE9FE);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.upload-icon svg{width:24px;height:24px;stroke:#6366F1;stroke-width:2;fill:none;}
.upload-zone h3{font-size:15px;font-weight:600;margin-bottom:4px;}
.upload-zone p{font-size:13px;color:#6B7280;}
.file-list{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.file-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #E5E7EB;border-radius:10px;}
.file-thumb{width:40px;height:40px;background:linear-gradient(135deg,#EEF2FF,#EDE9FE);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.file-info{flex:1;}
.file-name{font-size:13px;font-weight:600;}
.file-meta{font-size:11px;color:#6B7280;margin-top:2px;}
.progress{height:4px;background:#F3F4F6;border-radius:2px;margin-top:6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366F1,#8B5CF6);border-radius:2px;width:75%;}
.file-status{font-size:11px;font-weight:600;}
.status-ok{color:#10B981;}
.status-loading{color:#6366F1;}
</style>
</head>
<body>
<div class="widget">
  <div class="title">素材上传组件</div>
  <div class="upload-zone" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="this.classList.remove('dragover')">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>拖拽文件到此处，或点击上传</h3>
    <p>支持 jpg/png/webp/mp4/mov/txt/md/docx，单文件最大 100MB</p>
  </div>
  <div class="file-list">
    <div class="file-item">
      <div class="file-thumb">🖼️</div>
      <div class="file-info">
        <div class="file-name">产品宣传图.jpg</div>
        <div class="file-meta">3.2 MB · 2400×3200px</div>
        <div class="progress"><div class="progress-fill" style="width:100%"></div></div>
      </div>
      <div class="file-status status-ok">✓ 完成</div>
    </div>
    <div class="file-item">
      <div class="file-thumb">📝</div>
      <div class="file-info">
        <div class="file-name">新品发布文案.md</div>
        <div class="file-meta">28 KB · 1260字</div>
        <div class="progress"><div class="progress-fill" style="width:60%"></div></div>
      </div>
      <div class="file-status status-loading">60%</div>
    </div>
  </div>
</div>
</body>
</html>
