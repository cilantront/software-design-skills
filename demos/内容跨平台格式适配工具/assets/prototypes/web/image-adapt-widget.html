<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图片适配处理组件原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3FF;padding:32px;color:#312E81;}
.widget{max-width:720px;margin:0 auto;background:white;border-radius:16px;border:1px solid #E5E7EB;padding:32px;box-shadow:0 4px 12px rgba(99,102,241,0.08);}
.title{font-size:14px;font-weight:600;margin-bottom:16px;}
.source{display:flex;gap:16px;align-items:center;padding:16px;background:#F9FAFB;border-radius:10px;margin-bottom:20px;}
.source-img{width:80px;height:100px;background:linear-gradient(135deg,#EEF2FF,#EDE9FE);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;}
.source-info h4{font-size:14px;font-weight:600;}
.source-info p{font-size:12px;color:#6B7280;margin-top:4px;}
.results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.result-card{border:1px solid #E5E7EB;border-radius:10px;padding:12px;text-align:center;}
.result-preview{aspect-ratio:3/4;background:linear-gradient(135deg,#EEF2FF,#EDE9FE);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#6B7280;margin-bottom:8px;}
.result-preview.ratio-916{aspect-ratio:9/16;}
.result-preview.ratio-235{aspect-ratio:2.35/1;}
.result-preview.ratio-1610{aspect-ratio:16/10;}
.result-name{font-size:11px;font-weight:600;}
.result-size{font-size:10px;color:#6B7280;margin-top:2px;}
.result-status{font-size:10px;color:#10B981;margin-top:4px;font-weight:600;}
.adjust-bar{margin-top:20px;padding:14px;background:#F9FAFB;border-radius:10px;display:flex;align-items:center;justify-content:space-between;}
.slider-wrap{flex:1;margin:0 16px;}
.slider-wrap label{font-size:12px;color:#6B7280;display:block;margin-bottom:4px;}
.slider-wrap input[type=range]{width:100%;}
</style>
</head>
<body>
<div class="widget">
  <div class="title">图片适配处理</div>
  <div class="source">
    <div class="source-img">🖼️</div>
    <div class="source-info">
      <h4>产品宣传图.jpg</h4>
      <p>原始尺寸：2400×3200px · 3:4比例</p>
      <p>主体区域：居中，占比 68%</p>
    </div>
  </div>
  <div class="results">
    <div class="result-card">
      <div class="result-preview">3:4</div>
      <div class="result-name">小红书</div>
      <div class="result-size">1080×1440</div>
      <div class="result-status">✓ 完成</div>
    </div>
    <div class="result-card">
      <div class="result-preview ratio-916">9:16</div>
      <div class="result-name">抖音</div>
      <div class="result-size">1080×1920</div>
      <div class="result-status">✓ 完成</div>
    </div>
    <div class="result-card">
      <div class="result-preview ratio-235">2.35:1</div>
      <div class="result-name">公众号封面</div>
      <div class="result-size">900×383</div>
      <div class="result-status">✓ 完成</div>
    </div>
    <div class="result-card">
      <div class="result-preview ratio-1610">16:10</div>
      <div class="result-name">B站封面</div>
      <div class="result-size">960×600</div>
      <div class="result-status">✓ 完成</div>
    </div>
    <div class="result-card">
      <div class="result-preview">多种</div>
      <div class="result-name">视频号</div>
      <div class="result-size">多尺寸</div>
      <div class="result-status">✓ 完成</div>
    </div>
  </div>
  <div class="adjust-bar">
    <span style="font-size:12px;color:#6B7280;">裁切微调</span>
    <div class="slider-wrap">
      <label>主体保留比例</label>
      <input type="range" min="50" max="100" value="68">
    </div>
    <button style="background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">手动调整</button>
  </div>
</div>
</body>
</html>
